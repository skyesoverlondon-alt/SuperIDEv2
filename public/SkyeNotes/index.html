<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyeNotes Platform</title>
  <script src="/_shared/auth-unlock.js"></script>
  <script src="/_shared/standalone-session.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
    :root { --bg:#060d13; --bg2:#0d1d27; --line:rgba(44,230,255,.34); --line2:rgba(191,238,255,.2); --text:#f6fbff; --muted:#9ab6c4; --gold:#ffcb47; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--text); font-family:"Space Grotesk",sans-serif; background:radial-gradient(circle at 14% 0, rgba(44,230,255,.14), transparent 40%), linear-gradient(155deg,var(--bg),var(--bg2)); }
    .shell { max-width:1150px; margin:0 auto; padding:16px; display:grid; gap:12px; }
    .topbar,.card{border:1px solid var(--line); border-radius:14px; background:rgba(7,15,21,.9);} .topbar{padding:12px 14px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
    .brand { font-family:"Orbitron",sans-serif; text-transform:uppercase; letter-spacing:.09em; }
    .muted { color:var(--muted); font-size:.82rem; }
    .chip { border:1px solid rgba(255,203,71,.42); border-radius:999px; padding:5px 10px; color:#ffe6a5; background:rgba(255,203,71,.08); font-size:.74rem; }
    .card { padding:12px; display:grid; gap:10px; }
    .row { display:grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap:8px; }
    .row.two { grid-template-columns: 1fr 1fr; }
    .diag { border:1px solid var(--line2); border-radius:10px; padding:8px; font-size:.8rem; color:var(--muted); }
    input,textarea,button { width:100%; border:1px solid var(--line2); border-radius:10px; background:rgba(0,0,0,.34); color:var(--text); padding:9px 10px; font:inherit; }
    button { cursor:pointer; border-color:var(--line); background:rgba(44,230,255,.12); }
    button.primary { background:linear-gradient(135deg, rgba(255,203,71,.9), rgba(44,230,255,.78)); color:#03131a; font-weight:700; border-color:rgba(255,203,71,.5); }
    .list { display:grid; gap:8px; }
    .item { border:1px solid var(--line2); border-radius:12px; padding:10px; background:rgba(255,255,255,.03); }
    textarea { min-height:84px; resize:vertical; }
    a { color:#d8f7ff; }
    @media (max-width:900px){ .row{grid-template-columns:1fr 1fr;} .row.two{grid-template-columns:1fr;} }
    @media (max-width:560px){ .row{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div class="shell">
  <section class="topbar">
    <div>
      <div class="brand">SkyeNotes Command Surface</div>
      <div class="muted">Knowledge workspace with tagged notes and persistent storage model.</div>
      <div class="muted"><a href="/index.html?app=SkyeNotes">Return to IDE</a></div>
    </div>
    <div class="chip" id="meta">ws_id=primary-workspace</div>
  </section>

  <section class="card">
    <div class="row">
      <input id="email" placeholder="email" />
      <input id="password" type="password" placeholder="password" />
      <input id="org" value="SkyeNotes Org" />
      <button id="login">Login or Signup</button>
    </div>
    <div class="row">
      <input id="ws" placeholder="workspace" />
      <input id="notebook" placeholder="Notebook" value="General" />
      <input id="title" placeholder="Note title" />
      <input id="tags" placeholder="tags" />
      <button class="primary" id="add">Add Note</button>
    </div>
    <div class="row two">
      <input id="search" placeholder="search notes" />
      <button id="sync">Load + Save</button>
    </div>
    <div class="row two">
      <button id="buildGraph">Build Knowledge Graph</button>
      <button id="extractTasks">Decision -> Tasks</button>
    </div>
    <div class="muted" id="status">Ready.</div>
    <div class="diag" id="hierarchyInfo">Notebook hierarchy not loaded.</div>
    <div class="diag" id="staleInfo">Stale-note detector pending.</div>
    <div class="diag" id="sourceInfo">Canonical source pinning pending.</div>
    <div class="diag" id="taskInfo">Decision extraction pending.</div>
  </section>

  <section class="card"><div class="list" id="list"></div></section>
</div>

<script>
const qs = new URLSearchParams(location.search);
document.getElementById('ws').value = qs.get('ws_id') || 'primary-workspace';
document.getElementById('meta').textContent = `ws_id=${document.getElementById('ws').value}`;
let notes = [];
const status = document.getElementById('status');
const hierarchyInfo = document.getElementById('hierarchyInfo');
const staleInfo = document.getElementById('staleInfo');
const sourceInfo = document.getElementById('sourceInfo');
const taskInfo = document.getElementById('taskInfo');
function setStatus(t){ status.textContent = t; }

async function call(path, opt = {}) {
  if (window.SkyeStandaloneSession?.request) {
    return window.SkyeStandaloneSession.request(path, opt, { appId:'skyenotes', prompt:false });
  }
  const res = await fetch(path, { credentials:'include', ...opt });
  const txt = await res.text();
  let data = {};
  try { data = txt ? JSON.parse(txt) : {}; } catch { data = { raw: txt }; }
  if (!res.ok) throw new Error(data.error || `${path} failed (${res.status})`);
  return data;
}

async function auth() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const org = document.getElementById('org').value.trim() || 'SkyeNotes Org';
  if (window.SkyeStandaloneSession?.ensureSignedIn) {
    return window.SkyeStandaloneSession.ensureSignedIn({ appId:'skyenotes', email, password, orgName:org, labelPrefix:'skyenotes' });
  }
  if (!email || !password) throw new Error('email/password required');
}

async function load() {
  await auth();
  const ws = document.getElementById('ws').value.trim();
  const d = await call('/api/app-record-list?ws_id=' + encodeURIComponent(ws) + '&app=SkyeNotes&limit=1');
  notes = Array.isArray(d.records) && d.records[0]?.payload && Array.isArray(d.records[0].payload.notes) ? d.records[0].payload.notes : [];
  render();
  setStatus('Loaded notes.');
}

async function save() {
  await auth();
  const ws = document.getElementById('ws').value.trim();
  await call('/api/app-record-save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ ws_id:ws, app:'SkyeNotes', title:'SkyeNotes Workspace', model:{ notes } }) });
  setStatus('Saved notes.');
}

function add() {
  const title = document.getElementById('title').value.trim();
  if (!title) return setStatus('title required');
  notes.unshift({ id:'note-' + Date.now(), notebook:document.getElementById('notebook').value.trim() || 'General', title, body:'', tags:document.getElementById('tags').value.trim(), owner:'owner', updated_at:new Date().toISOString() });
  document.getElementById('title').value = '';
  render();
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const list = document.getElementById('list');
  list.innerHTML = '';
  const grouped = new Map();
  notes.forEach((n) => {
    const bucket = n.notebook || 'General';
    if (!grouped.has(bucket)) grouped.set(bucket, []);
    grouped.get(bucket).push(n);
  });
  hierarchyInfo.textContent = `Hierarchy: ${grouped.size} notebook(s) -> ${Array.from(grouped.keys()).join(', ')}`;
  runStaleDetection();
  checkCanonicalConflicts();

  notes
    .filter(n => (`${n.title} ${n.body} ${n.tags}`).toLowerCase().includes(q))
    .forEach(n => {
      const item = document.createElement('div');
      item.className = 'item';
      item.innerHTML = `<strong>${n.title}</strong><div class="muted">notebook=${n.notebook || 'General'} | tags=${n.tags || ''} | source=${n.source || 'none'} ${n.canonical ? '| canonical=pin' : ''}</div>`;
      const ta = document.createElement('textarea');
      ta.value = n.body || '';
      ta.onchange = () => { notes = notes.map(x => x.id === n.id ? { ...x, body: ta.value, updated_at:new Date().toISOString() } : x); };
      const nb = document.createElement('input');
      nb.value = n.notebook || 'General';
      nb.onchange = () => { notes = notes.map(x => x.id === n.id ? { ...x, notebook: nb.value.trim() || 'General', updated_at:new Date().toISOString() } : x); render(); };
      const tg = document.createElement('input');
      tg.value = n.tags || '';
      tg.onchange = () => { notes = notes.map(x => x.id === n.id ? { ...x, tags: tg.value, updated_at:new Date().toISOString() } : x); };
      const src = document.createElement('input');
      src.placeholder = 'source URL or citation id';
      src.value = n.source || '';
      src.onchange = () => { notes = notes.map(x => x.id === n.id ? { ...x, source: src.value.trim(), updated_at:new Date().toISOString() } : x); checkCanonicalConflicts(); };
      const pin = document.createElement('button');
      pin.textContent = n.canonical ? 'Canonical Pinned' : 'Pin Canonical';
      pin.onclick = () => {
        notes = notes.map(x => x.id === n.id ? { ...x, canonical: !x.canonical, updated_at:new Date().toISOString() } : x);
        render();
      };
      item.appendChild(ta);
      item.appendChild(nb);
      item.appendChild(tg);
      item.appendChild(src);
      item.appendChild(pin);
      list.appendChild(item);
    });
}

function runStaleDetection() {
  const now = Date.now();
  const stale = notes.filter((n) => (now - new Date(n.updated_at || 0).getTime()) > (14 * 86400000));
  staleInfo.textContent = stale.length
    ? `Stale-note detector: ${stale.length} note(s) older than 14 days. Prompt refresh: ${stale.map((x) => x.title).join(', ')}`
    : 'Stale-note detector: all notes updated in the last 14 days.';
}

function checkCanonicalConflicts() {
  const bySource = new Map();
  notes.forEach((n) => {
    const source = String(n.source || '').trim();
    if (!source) return;
    const arr = bySource.get(source) || [];
    arr.push(n);
    bySource.set(source, arr);
  });
  const conflicts = [];
  bySource.forEach((arr, source) => {
    const pinned = arr.filter((n) => n.canonical);
    if (pinned.length > 1) conflicts.push(`source ${source} has ${pinned.length} canonical pins`);
  });
  sourceInfo.textContent = conflicts.length
    ? `Canonical conflict warnings: ${conflicts.join(' | ')}`
    : 'Canonical source pinning: no conflicts detected.';
}

function buildKnowledgeGraph() {
  const edges = [];
  notes.forEach((a) => {
    const tagsA = new Set(String(a.tags || '').split(',').map((t) => t.trim().toLowerCase()).filter(Boolean));
    notes.forEach((b) => {
      if (a.id === b.id) return;
      const tagsB = String(b.tags || '').split(',').map((t) => t.trim().toLowerCase()).filter(Boolean);
      if (tagsB.some((t) => tagsA.has(t))) edges.push(`${a.title} -> ${b.title}`);
    });
  });
  hierarchyInfo.textContent = `Knowledge graph edges: ${edges.length}${edges.length ? ' | ' + edges.slice(0, 6).join(' ; ') : ''}`;
}

function extractTasksFromDecisions() {
  const tasks = [];
  notes.forEach((n) => {
    const body = String(n.body || '');
    body.split(/\n+/).forEach((line) => {
      const t = line.trim();
      if (/^(decision:|decide:|action:|next:)/i.test(t)) {
        tasks.push({ note: n.title, task: t.replace(/^(decision:|decide:|action:|next:)/i, '').trim() });
      }
    });
  });
  localStorage.setItem(`skye.notes.tasks.${document.getElementById('ws').value.trim()}`, JSON.stringify(tasks));
  taskInfo.textContent = tasks.length
    ? `Decision-to-task helper: ${tasks.length} task(s) extracted and staged to local task queue.`
    : 'Decision-to-task helper: no decision markers found.';
}

document.getElementById('login').onclick = () => auth().then(() => setStatus('Session ready.')).catch(e => setStatus(e.message));
document.getElementById('add').onclick = add;
document.getElementById('search').oninput = render;
document.getElementById('sync').onclick = () => load().then(save).catch(e => setStatus(e.message));
document.getElementById('buildGraph').onclick = buildKnowledgeGraph;
document.getElementById('extractTasks').onclick = extractTasksFromDecisions;
render();
</script>
<button id="skye-tutorial-fab" type="button" style="position:fixed;right:16px;bottom:16px;z-index:10000;padding:10px 14px;border-radius:999px;border:1px solid rgba(191,238,255,.42);background:rgba(44,230,255,.2);color:#eff9ff;font-weight:700;cursor:pointer;">Start Tutorial</button>
<div id="skye-tutorial-modal" style="display:none;position:fixed;inset:0;z-index:10001;background:rgba(2,6,23,.72);"></div>
<script>
(function(){
  const fab=document.getElementById('skye-tutorial-fab');
  const modal=document.getElementById('skye-tutorial-modal');
  if(!fab||!modal) return;
  const app=(document.title||'App').replace(/Standalone|Workspace|Command Surface|Platform/gi,'').trim();
  modal.innerHTML='<div style="max-width:520px;margin:10vh auto;background:#07131a;color:#eff9ff;border:1px solid rgba(191,238,255,.32);border-radius:14px;padding:18px"><h3 style="margin:0 0 8px">'+app+' Quick Start</h3><ol style="margin:0 0 12px 18px;line-height:1.5"><li>Review auth and active workspace context.</li><li>Run one core workflow action in this app.</li><li>Save/export/share output and verify completion state.</li></ol><div style="display:flex;justify-content:flex-end"><button id="skye-tutorial-close" type="button" style="padding:8px 12px;border-radius:10px;border:1px solid rgba(191,238,255,.32);background:rgba(0,0,0,.34);color:#eff9ff;cursor:pointer;">Close</button></div></div>';
  fab.addEventListener('click',()=>{modal.style.display='block';});
  modal.addEventListener('click',(e)=>{if(e.target===modal||e.target.id==='skye-tutorial-close') modal.style.display='none';});
})();
</script>
</body>
</html>
