<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smokehouse | SuperIDE</title>
  <script src="/_shared/auth-unlock.js"></script>
  <script src="/_shared/standalone-session.js"></script>
  <script src="/_shared/gateway-retry.js"></script>
  <style>
    :root { --bg:#140f21; --card:#231a36; --ink:#f4f0ff; --muted:#b7abcf; --good:#22c55e; --bad:#ef4444; --accent:#f97316; }
    *{box-sizing:border-box;} body{margin:0;font-family:"Space Grotesk","Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 80% 10%,#3b1f6d,var(--bg));}
    .wrap{max-width:1200px;margin:0 auto;padding:20px;} .card{background:color-mix(in oklab,var(--card),black 10%);border:1px solid #4d3a73;border-radius:14px;padding:14px;}
    button,input{border-radius:10px;border:1px solid #5c4a84;background:#1c1330;color:var(--ink);padding:10px;} button{cursor:pointer;font-weight:700;}
    .primary{background:linear-gradient(120deg,#fb923c,#f43f5e);border:none;} .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;} .muted{color:var(--muted);} table{width:100%;border-collapse:collapse;font-size:12px;} th,td{padding:8px;border-bottom:1px solid #463760;text-align:left;} .good{color:var(--good);} .bad{color:var(--bad);} .warn{color:#fbbf24;}
    .truthbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0 16px;}
    .truth{border:1px solid #4d3a73;border-radius:12px;padding:10px 12px;background:rgba(7,3,18,0.35);}
    .truth strong{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .truth span{font-weight:700;font-size:13px;}
    .status-ok{color:var(--good);} .status-fail{color:var(--bad);} .status-warn{color:#fbbf24;} .status-idle{color:var(--muted);}
    .auth-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;}
    .auth-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
    .proof-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
    .proof-links a{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border:1px solid #5c4a84;border-radius:10px;background:#1c1330;color:var(--ink);padding:10px 12px;font-weight:700;}
    .status-panel{margin-top:10px;padding:10px 12px;border-radius:12px;border:1px solid #4d3a73;background:rgba(0,0,0,0.14);min-height:64px;line-height:1.5;}
    .status-panel[data-tone="ok"]{border-color:rgba(34,197,94,.45);}
    .status-panel[data-tone="fail"]{border-color:rgba(239,68,68,.45);}
    .status-panel[data-tone="warn"]{border-color:rgba(251,191,36,.45);}
    @media(max-width:900px){.grid,.truthbar,.auth-grid,.auth-actions{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Smokehouse Standalone</h1>
    <p class="muted">Contract checks with persistent hash-linked run history for audit evidence.</p>
    <div class="truthbar">
      <div class="truth"><strong>Session</strong><span id="truthSession" class="status-idle">Checking</span></div>
      <div class="truth"><strong>Key</strong><span id="truthKey" class="status-idle">Missing</span></div>
      <div class="truth"><strong>Smoke</strong><span id="truthSmoke" class="status-idle">Not run</span></div>
      <div class="truth"><strong>Worker</strong><span id="truthWorker" class="status-idle">Unknown</span></div>
    </div>

    <div class="grid">
      <section class="card">
        <label>Base URL</label>
        <input id="baseUrl" />
        <label style="display:block;margin-top:8px;">Worker URL (optional override)</label>
        <input id="workerUrl" placeholder="https://kaixu-superide-runner.skyesoverlondon.workers.dev" />
        <label style="display:block;margin-top:8px;">kAIxU Access Key (optional)</label>
        <input id="token" type="password" placeholder="kx_at_..." />
        <label style="display:block;margin-top:8px;">Key Lock Email (optional)</label>
        <input id="tokenEmail" placeholder="owner@company.com" />
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;">
          <button id="runBtn" class="primary">Run Smoke</button>
          <button id="exportBtn">Export Runs</button>
          <button id="clearBtn">Clear Runs</button>
        </div>
        <div class="proof-links">
          <a id="openLiveSmokeLink" href="/Smokehouse/index.html?auto_smoke=1&smoke_interval_ms=45000" target="_blank" rel="noopener">Open Live Smoke</a>
          <a href="/pricing.html#proof" target="_blank" rel="noopener">Investor Proof Page</a>
        </div>
        <h3 style="margin:16px 0 0;">Session + Key Flow</h3>
        <div class="auth-grid">
          <div>
            <label>Email</label>
            <input id="authEmail" type="email" placeholder="founder@company.com" />
          </div>
          <div>
            <label>Org Name</label>
            <input id="authOrgName" placeholder="Skye Workspace" />
          </div>
          <div>
            <label>Password</label>
            <input id="authPassword" type="password" placeholder="Your password" />
          </div>
          <div>
            <label>Session PIN</label>
            <input id="authPin" type="password" placeholder="4-12 chars" />
          </div>
        </div>
        <div class="auth-actions">
          <button id="loginBtn">Login</button>
          <button id="signupBtn">Create Account</button>
          <button id="unlockPinBtn">Unlock PIN</button>
          <button id="requestKeyBtn">Request 30-Day Key</button>
          <button id="refreshSessionBtn">Refresh Session</button>
          <button id="clearSessionBtn">Clear Session</button>
        </div>
        <div id="status" class="status-panel" data-tone="idle">Idle.</div>
      </section>
      <section class="card">
        <h3 style="margin-top:0;">Latest Summary</h3>
        <pre id="summary" style="white-space:pre-wrap">No run yet.</pre>
      </section>
    </div>

    <section class="card" style="margin-top:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
        <h3 style="margin:0;">Run Ledger</h3>
        <span id="chain" class="muted">Chain unchecked</span>
      </div>
      <div style="overflow:auto;max-height:360px;">
        <table>
          <thead><tr><th>At</th><th>Pass/Total</th><th>Hash</th><th>Prev</th></tr></thead>
          <tbody id="runs"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const LOG_KEY = "superide.smokehouse.hashruns.v1";
    const LEDGER_VERSION = 2;
    const gatewayFetch = (window.SkyeGateway && window.SkyeGateway.fetchWithRetry) || fetch;
    const truthSessionEl = document.getElementById("truthSession");
    const truthKeyEl = document.getElementById("truthKey");
    const truthSmokeEl = document.getElementById("truthSmoke");
    const truthWorkerEl = document.getElementById("truthWorker");
    const statusEl = document.getElementById("status");
    const smokeState = { lastPass: 0, lastTotal: 0, lastWorkerOk: null };

    async function recordSuiteIntent(intentName, status, options = {}) {
      if (!window.SkyeStandaloneSession?.recordSuiteIntent) return null;
      const wsId = new URLSearchParams(window.location.search).get("ws_id") || "primary-workspace";
      return window.SkyeStandaloneSession.recordSuiteIntent({
        sourceApp: "Smokehouse-Standalone",
        targetApp: options.targetApp || "SkyeAnalytics",
        intent: { name: intentName, status, summary: options.summary || "" },
        context: { workspace_id: wsId, asset_ids: options.assetIds || [] },
        detail: options.detail || "",
        badge: options.badge || "",
        payload: options.payload || {},
      });
    }

    async function sha256(text) {
      const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
    }
    function readRuns() { try { return JSON.parse(localStorage.getItem(LOG_KEY) || "[]"); } catch { return []; } }
    function writeRuns(v) { localStorage.setItem(LOG_KEY, JSON.stringify(v)); }
    function toCanonical(run, prevHash) {
      return {
        v: LEDGER_VERSION,
        seq: run.seq,
        at: run.at,
        pass: run.pass,
        total: run.total,
        checks: run.checks,
        prev_hash: prevHash,
      };
    }
    function setTruth(el, label, tone) {
      el.textContent = label;
      el.className = tone === "ok" ? "status-ok" : tone === "fail" ? "status-fail" : tone === "warn" ? "status-warn" : "status-idle";
    }

    function renderTruth() {
      const token = window.SkyeStandaloneSession?.readToken?.() || window.SkyeAuthUnlock?.readToken?.() || "";
      const email = window.SkyeStandaloneSession?.readTokenEmail?.() || window.SkyeAuthUnlock?.readTokenEmail?.() || "";
      setTruth(truthKeyEl, token ? `Loaded${email ? ` · ${email}` : ""}` : "Missing", token ? "ok" : "fail");
      if (smokeState.lastTotal > 0) {
        const tone = smokeState.lastPass === smokeState.lastTotal ? "ok" : smokeState.lastPass > 0 ? "warn" : "fail";
        setTruth(truthSmokeEl, `${smokeState.lastPass}/${smokeState.lastTotal} passing`, tone);
      } else {
        setTruth(truthSmokeEl, "Not run", "idle");
      }
      if (smokeState.lastWorkerOk === true) setTruth(truthWorkerEl, "Healthy", "ok");
      else if (smokeState.lastWorkerOk === false) setTruth(truthWorkerEl, "Failing", "fail");
      else setTruth(truthWorkerEl, "Unknown", "idle");
    }

    function setStatus(s, tone = "idle") {
      statusEl.textContent = s;
      statusEl.dataset.tone = tone;
    }

    async function parseJsonResponse(response, fallback) {
      const text = await response.text();
      try {
        return text ? JSON.parse(text) : {};
      } catch {
        return { error: text || fallback || "Unknown response" };
      }
    }

    async function refreshSessionStatus() {
      try {
        const res = await fetch("/api/auth-me", { method: "GET", credentials: "include" });
        const data = await parseJsonResponse(res, "auth-me failed");
        if (!res.ok || !data?.email) {
          setTruth(truthSessionEl, "Not signed in", "fail");
          renderTruth();
          return null;
        }
        document.getElementById("authEmail").value = data.email || "";
        setTruth(truthSessionEl, data.has_pin ? `Signed in · PIN ready` : `Signed in · no PIN`, "ok");
        renderTruth();
        return data;
      } catch (error) {
        setTruth(truthSessionEl, "Session check failed", "fail");
        setStatus(error?.message || "Session check failed.", "fail");
        renderTruth();
        return null;
      }
    }

    async function authRequest(path, body) {
      const res = await fetch(path, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body || {}),
      });
      const data = await parseJsonResponse(res, `${path} failed`);
      if (!res.ok) throw new Error(data?.error || `${path} failed (${res.status})`);
      return data;
    }

    async function login() {
      const email = String(document.getElementById("authEmail").value || "").trim().toLowerCase();
      const password = String(document.getElementById("authPassword").value || "");
      if (!email || !password) {
        setStatus("Email and password are required.", "fail");
        return;
      }
      setStatus(`Logging in ${email}...`, "warn");
      try {
        await authRequest("/api/auth-login", { email, password });
        await refreshSessionStatus();
        setStatus(`Signed in as ${email}. Request or unlock a key next if needed.`, "ok");
      } catch (error) {
        setStatus(error.message || "Login failed.", "fail");
      }
    }

    async function signup() {
      const email = String(document.getElementById("authEmail").value || "").trim().toLowerCase();
      const password = String(document.getElementById("authPassword").value || "");
      const orgName = String(document.getElementById("authOrgName").value || "").trim() || "Skye Workspace";
      if (!email || !password) {
        setStatus("Email and password are required.", "fail");
        return;
      }
      setStatus(`Creating account for ${email}...`, "warn");
      try {
        const data = await authRequest("/api/auth-signup", { email, password, orgName });
        if (data?.kaixu_token?.token && window.SkyeStandaloneSession?.saveManualToken) {
          window.SkyeStandaloneSession.saveManualToken(data.kaixu_token.token, data.kaixu_token.locked_email || email);
        }
        if (window.SkyeStandaloneSession?.hydrateInputs) window.SkyeStandaloneSession.hydrateInputs("token", "tokenEmail");
        await refreshSessionStatus();
        setStatus(`Account created for ${email}. Starter key loaded if signup returned one.`, "ok");
      } catch (error) {
        setStatus(error.message || "Signup failed.", "fail");
      }
    }

    async function unlockPin() {
      const pin = String(document.getElementById("authPin").value || "").trim();
      if (!pin) {
        setStatus("Enter your session PIN first.", "fail");
        return;
      }
      setStatus("Unlocking session PIN...", "warn");
      try {
        const data = await authRequest("/api/auth-pin-unlock", { pin, label_prefix: "smokehouse-unlock", ttl_preset: "day" });
        if (window.SkyeStandaloneSession?.saveManualToken) {
          window.SkyeStandaloneSession.saveManualToken(data.token, data.locked_email || "");
        }
        if (window.SkyeStandaloneSession?.hydrateInputs) window.SkyeStandaloneSession.hydrateInputs("token", "tokenEmail");
        await refreshSessionStatus();
        setStatus(`Session unlocked for ${data.locked_email || "current user"}.`, "ok");
      } catch (error) {
        setStatus(error.message || "PIN unlock failed.", "fail");
      }
    }

    async function requestStarterKey() {
      setStatus("Requesting 30-day starter key...", "warn");
      try {
        const data = await authRequest("/api/token-issue", { count: 1, ttl_preset: "month", label_prefix: "smokehouse-starter" });
        const issued = Array.isArray(data?.issued) ? data.issued[0] : null;
        if (!issued?.token) throw new Error("Token issue succeeded but no key was returned.");
        if (window.SkyeStandaloneSession?.saveManualToken) {
          window.SkyeStandaloneSession.saveManualToken(issued.token, issued.locked_email || "");
        }
        if (window.SkyeStandaloneSession?.hydrateInputs) window.SkyeStandaloneSession.hydrateInputs("token", "tokenEmail");
        renderTruth();
        setStatus(`30-day starter key loaded for ${issued.locked_email || "current user"}.`, "ok");
      } catch (error) {
        setStatus(error.message || "Key request failed.", "fail");
      }
    }

    function clearSession() {
      if (window.SkyeStandaloneSession?.clearToken) window.SkyeStandaloneSession.clearToken();
      document.getElementById("token").value = "";
      document.getElementById("tokenEmail").value = "";
      renderTruth();
      setStatus("Cleared local key context for Smokehouse.", "warn");
    }

    let periodicSmokeTimer = null;

    function configurePeriodicSmoke() {
      const params = new URLSearchParams(location.search);
      const auto = params.get("auto_smoke") === "1";
      if (!auto) return;
      const raw = Number(params.get("smoke_interval_ms") || "45000");
      const interval = Math.min(300000, Math.max(15000, Number.isFinite(raw) ? raw : 45000));

      if (periodicSmokeTimer) clearInterval(periodicSmokeTimer);
      setStatus(`Auto smoke enabled: every ${Math.round(interval / 1000)}s.`);

      void runSmoke();
      periodicSmokeTimer = setInterval(() => {
        void runSmoke();
      }, interval);
    }

    async function runCheck(name, method, url, payload, headers, opts = {}) {
      const start = performance.now();
      const authExpected = Boolean(opts.authExpected);
      try {
        const res = await gatewayFetch(url, {
          method,
          headers,
          credentials: "include",
          body: payload ? JSON.stringify(payload) : undefined,
        });
        const text = await res.text();
        const okStatus = res.status >= 200 && res.status < 300;
        const gatedStatus = authExpected && [401, 403].includes(res.status);
        const ok = okStatus || gatedStatus;
        const detail = gatedStatus ? `Gated (${res.status})` : text.slice(0, 180);
        return { name, status: res.status, ok, ms: Math.round(performance.now() - start), detail, url };
      } catch (e) {
        return { name, status: 0, ok: false, ms: Math.round(performance.now() - start), detail: String(e?.message || e), url };
      }
    }

    async function runSmoke() {
      const base = (document.getElementById("baseUrl").value || location.origin).replace(/\/$/, "");
      const workerUrlInput = String(document.getElementById("workerUrl").value || "").trim();
      const token = document.getElementById("token").value.trim();
      const tokenEmail = String(document.getElementById("tokenEmail").value || "").trim();
      const headers = { "Content-Type": "application/json" };
      if (token) headers.Authorization = `Bearer ${token}`;
      if (tokenEmail) headers["X-Token-Email"] = tokenEmail;
      setStatus("Running checks...");

      const wsId = new URLSearchParams(location.search).get("ws_id") || "primary-workspace";
      const workerUrl = workerUrlInput || localStorage.getItem("kx.worker.url") || "https://kaixu-superide-runner.skyesoverlondon.workers.dev";
      const checks = [];
      checks.push(await runCheck("Site Root", "GET", `${base}/`, null, headers));
      checks.push(await runCheck("Auth Me", "GET", `${base}/api/auth-me`, null, headers));
      checks.push(await runCheck("Worker Health", "GET", `${workerUrl.replace(/\/+$/, "")}/health`, null, headers));
      checks.push(
        await runCheck(
          "Generate API",
          "POST",
          `${base}/api/kaixu-generate`,
          { ws_id: wsId, activePath: "/Smokehouse/index.html", prompt: "smokehouse ping" },
          headers,
          { authExpected: true }
        )
      );
      checks.push(await runCheck("Workspace Get", "GET", `${base}/api/ws-get?id=${encodeURIComponent(wsId)}`, null, headers, { authExpected: true }));
      const tree = await runCheck("IDE Tree", "GET", `${base}/api/ide/tree?id=${encodeURIComponent(wsId)}`, null, headers, { authExpected: true });
      checks.push(tree);

      let filePath = "README.md";
      try {
        const treeRes = await gatewayFetch(`${base}/api/ide/tree?id=${encodeURIComponent(wsId)}`, {
          method: "GET",
          headers,
          credentials: "include",
        });
        if (treeRes.ok) {
          const treeData = await treeRes.json();
          const firstPath = Array.isArray(treeData?.files) && treeData.files[0] && String(treeData.files[0].path || "").trim();
          if (firstPath) filePath = firstPath;
        }
      } catch {
      }
      checks.push(
        await runCheck(
          "IDE File",
          "GET",
          `${base}/api/ide/file?id=${encodeURIComponent(wsId)}&path=${encodeURIComponent(filePath)}`,
          null,
          headers,
          { authExpected: true }
        )
      );
      checks.push(await runCheck("Team Members", "GET", `${base}/api/team-members`, null, headers, { authExpected: true }));

      const pass = checks.filter((c) => c.ok).length;
      smokeState.lastPass = pass;
      smokeState.lastTotal = checks.length;
      const workerCheck = checks.find((c) => c.name === "Worker Health");
      smokeState.lastWorkerOk = workerCheck ? Boolean(workerCheck.ok) : null;
      document.getElementById("summary").textContent = checks
        .map((c) => `${c.ok ? "PASS" : "FAIL"} | ${c.name} | ${c.status} | ${c.ms}ms | ${c.url} | ${c.detail}`)
        .join("\n");

      const runs = readRuns();
      const prev = runs.length ? runs[0].hash : "GENESIS";
      const seq = runs.length ? (Number(runs[0].seq) || runs.length) + 1 : 1;
      const run = { at: new Date().toISOString(), pass, total: checks.length, checks, seq };
      run.prev_hash = prev;
      run.v = LEDGER_VERSION;
      run.hash = await sha256(JSON.stringify(toCanonical(run, prev)));
      runs.unshift(run);
      writeRuns(runs.slice(0, 300));
      setStatus(`Smoke complete: ${pass}/${checks.length} pass. ${pass === checks.length ? "System truth is green." : "Failures are present and visible in the summary below."}`, pass === checks.length ? "ok" : pass > 0 ? "warn" : "fail");
      await recordSuiteIntent('open-proof', pass > 0 ? 'completed' : 'failed', {
        targetApp: 'SkyeAnalytics',
        summary: 'Route smoke evidence into analytics proof.',
        detail: `Smokehouse finished with ${pass}/${checks.length} passing checks.`,
        badge: `${pass}/${checks.length}`,
        payload: { pass, total: checks.length, worker_ok: smokeState.lastWorkerOk },
      });
      renderTruth();
      await renderRuns();
    }

    async function renderRuns() {
      const rows = readRuns();
      document.getElementById("runs").innerHTML = rows.map((r) => `<tr><td>${new Date(r.at).toLocaleString()}</td><td class="${r.pass === r.total ? "good" : "bad"}">${r.pass}/${r.total}</td><td title="${r.hash}">${r.hash.slice(0, 12)}...</td><td title="${r.prev_hash}">${String(r.prev_hash).slice(0, 12)}...</td></tr>`).join("");

      let prev = "GENESIS";
      let ok = true;
      let reason = "";
      let expectedSeq = 1;
      for (let i = rows.length - 1; i >= 0; i -= 1) {
        const r = rows[i];
        if (Number(r.seq) !== expectedSeq) {
          ok = false;
          reason = `Sequence mismatch at seq=${r.seq}, expected=${expectedSeq}`;
          break;
        }
        const hash = await sha256(JSON.stringify(toCanonical(r, prev)));
        if (r.prev_hash !== prev) {
          ok = false;
          reason = `Broken prev_hash link at seq=${r.seq}`;
          break;
        }
        if (r.hash !== hash) {
          ok = false;
          reason = `Hash mismatch at seq=${r.seq}`;
          break;
        }
        prev = r.hash;
        expectedSeq += 1;
      }
      const stamp = new Date().toLocaleTimeString();
      document.getElementById("chain").textContent = ok
        ? `Chain: VALID (v${LEDGER_VERSION}, verified ${stamp})`
        : `Chain: INVALID (${reason || "unknown"}, verified ${stamp})`;
      document.getElementById("chain").className = ok ? "good" : "bad";
    }

    document.getElementById("baseUrl").value = location.origin;
    document.getElementById("workerUrl").value = localStorage.getItem("kx.worker.url") || "";
    if (window.SkyeStandaloneSession?.hydrateInputs) {
      window.SkyeStandaloneSession.hydrateInputs("token", "tokenEmail");
    } else {
      document.getElementById("token").value = window.SkyeAuthUnlock?.readToken?.() || "";
      document.getElementById("tokenEmail").value = window.SkyeAuthUnlock?.readTokenEmail?.() || localStorage.getItem("kx.auth.user") || "";
    }
    document.getElementById("runBtn").onclick = () => runSmoke();
    document.getElementById("loginBtn").onclick = () => login();
    document.getElementById("signupBtn").onclick = () => signup();
    document.getElementById("unlockPinBtn").onclick = () => unlockPin();
    document.getElementById("requestKeyBtn").onclick = () => requestStarterKey();
    document.getElementById("refreshSessionBtn").onclick = () => refreshSessionStatus();
    document.getElementById("clearSessionBtn").onclick = () => clearSession();
    document.getElementById("exportBtn").onclick = () => {
      const blob = new Blob([JSON.stringify(readRuns(), null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `smokehouse-ledger-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      void recordSuiteIntent('open-proof', 'completed', {
        targetApp: 'SkyeAnalytics',
        summary: 'Export smoke proof package.',
        detail: 'Smokehouse exported the tamper-evident run ledger for suite proof review.',
        badge: 'export',
      });
    };
    document.getElementById("clearBtn").onclick = () => { localStorage.removeItem(LOG_KEY); renderRuns(); setStatus("Run history cleared."); };

    renderRuns();
    renderTruth();
    refreshSessionStatus();
    configurePeriodicSmoke();
  </script>
</body>
</html>
