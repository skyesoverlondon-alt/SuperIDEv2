<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kAIxU Matrix</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script src="/_shared/gateway-retry.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    window.fb = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
  </script>
  <style>
    body { background:#020617; color:#e2e8f0; }
    .card { background:#0f172a; border:1px solid #1e293b; }
    @media print {
      #editor { display:none !important; }
      #preview { display:block !important; }
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-6xl mx-auto p-6 space-y-4" id="editor">
    <header class="flex items-center justify-between card rounded-xl p-4">
      <h1 class="text-xl font-black">kAIxU Matrix</h1>
      <div class="flex items-center gap-2">
        <input id="openai-key" type="password" placeholder="kAIxU Gate Key" class="bg-slate-900 border border-slate-700 rounded px-3 py-2 text-xs" />
        <button id="btn-preview" class="bg-indigo-600 px-4 py-2 rounded font-bold text-xs">Compile Preview</button>
        <button id="btn-pdf" class="bg-emerald-600 px-4 py-2 rounded font-bold text-xs">Export PDF</button>
      </div>
    </header>

    <section class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <div class="lg:col-span-2 card rounded-xl p-4 space-y-3">
        <input id="title" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 font-bold" placeholder="Entry title" />
        <textarea id="content" class="w-full h-64 bg-slate-900 border border-slate-700 rounded px-3 py-2" placeholder="Write your content..."></textarea>
        <div class="flex gap-2">
          <button id="btn-generate" class="bg-indigo-600 px-3 py-2 rounded text-xs font-bold">Generate via Gateway</button>
          <button id="btn-expand" class="bg-slate-700 px-3 py-2 rounded text-xs font-bold">Expand via Gateway</button>
        </div>
      </div>
      <div class="card rounded-xl p-4 space-y-3">
        <div id="image" class="aspect-square bg-slate-900 rounded border border-slate-700 flex items-center justify-center text-xs text-slate-400">No visual yet</div>
        <button id="btn-visual" class="w-full bg-indigo-600 px-3 py-2 rounded text-xs font-bold">Render Visual via Gateway</button>
      </div>
    </section>
  </div>

  <div id="preview" class="hidden max-w-4xl mx-auto p-8 prose prose-invert">
    <h1 id="pv-title"></h1>
    <div id="pv-image"></div>
    <div id="pv-content"></div>
  </div>

  <script type="module">
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'matrix-studio';
    let state = { title: 'kAIxU Matrix', content: '', image: '', openaiKey: '' };
    let user = null, isSaving = false, saveTimeout = null;

    const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot } = window.fb;
    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
    let auth = null;
    let db = null;
    try {
      if (firebaseConfig && typeof firebaseConfig === 'object' && Object.keys(firebaseConfig).length > 0) {
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
      }
    } catch (err) {
      console.warn('Firebase bootstrap disabled in', appId, err);
    }

    const gatewayFetch = (window.SkyeGateway && window.SkyeGateway.fetchWithRetry) || fetch;
    function wsId() { return new URLSearchParams(window.location.search).get('ws_id') || 'primary-workspace'; }
    function headers() {
      const key = (state.openaiKey || document.getElementById('openai-key').value || localStorage.getItem('kx.api.accessToken') || '').trim();
      const h = { 'Content-Type': 'application/json' };
      if (key) h.Authorization = 'Bearer ' + key;
      if (window.SkyeCorrelation && typeof window.SkyeCorrelation.nextId === 'function') h['x-correlation-id'] = window.SkyeCorrelation.nextId('kaixu-standalone');
      return h;
    }
    async function callGatewayText(prompt, system) {
      const res = await gatewayFetch('/api/kaixu-generate', {
        method: 'POST', headers: headers(), credentials: 'include',
        body: JSON.stringify({ ws_id: wsId(), activePath: window.location.pathname, prompt: String(system || '').trim() + '\n\n' + String(prompt || '').trim() })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data?.error || data?.message || ('Gateway failure (' + res.status + ')'));
      return data?.text || data?.output || '';
    }
    function poster(text, label) {
      const esc = (s) => String(s || '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
      const body = esc(String(text || '').slice(0, 520));
      const tag = esc(label || 'kAIxU Gateway Render');
      const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024>';
      const full = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#312e81"/></linearGradient></defs><rect width="1024" height="1024" fill="url(#g)"/><rect x="44" y="44" width="936" height="936" rx="24" fill="none" stroke="#eab308" stroke-opacity="0.55" stroke-width="4"/><text x="72" y="118" fill="#eab308" font-size="36" font-family="Arial,sans-serif" font-weight="700">' + tag + '</text><foreignObject x="72" y="168" width="880" height="780"><div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,sans-serif;color:#e2e8f0;font-size:30px;line-height:1.35;white-space:pre-wrap;">' + body + '</div></foreignObject></svg>';
      return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(full)));
    }

    function refresh() {
      document.getElementById('title').value = state.title;
      document.getElementById('content').value = state.content;
      document.getElementById('openai-key').value = state.openaiKey || '';
      document.getElementById('image').innerHTML = state.image ? '<img src="' + state.image + '" class="w-full h-full object-cover rounded" />' : 'No visual yet';
      document.getElementById('pv-title').textContent = state.title;
      document.getElementById('pv-content').textContent = state.content;
      document.getElementById('pv-image').innerHTML = state.image ? '<img src="' + state.image + '" style="max-width:100%;border-radius:12px;" />' : '';
    }
    function debounceSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(save, 800); }
    async function save() {
      if (!user || !db) return;
      isSaving = true;
      try {
        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'workspace', 'current'), { ...state }, { merge: true });
      } finally { setTimeout(() => isSaving = false, 150); }
    }
    function sync() {
      if (!user || !db || !onSnapshot) return;
      onSnapshot(doc(db, 'artifacts', appId, 'users', user.uid, 'workspace', 'current'), (snap) => {
        if (snap.exists() && !isSaving) { state = { ...state, ...snap.data() }; refresh(); }
      });
    }

    document.getElementById('title').addEventListener('input', (e) => { state.title = e.target.value; debounceSave(); });
    document.getElementById('content').addEventListener('input', (e) => { state.content = e.target.value; debounceSave(); });
    document.getElementById('openai-key').addEventListener('input', (e) => { state.openaiKey = e.target.value; debounceSave(); });

    document.getElementById('btn-generate').addEventListener('click', async () => {
      const out = await callGatewayText('Generate a concise high-quality draft for: ' + (state.title || 'kAIxU Matrix'), 'You are an expert creative assistant. Return plain text.');
      state.content = out || state.content; refresh(); debounceSave();
    });
    document.getElementById('btn-expand').addEventListener('click', async () => {
      const out = await callGatewayText('Expand and improve this draft:\n' + state.content, 'You are an expert editor. Return plain text.');
      state.content = (state.content ? state.content + '\n\n' : '') + out; refresh(); debounceSave();
    });
    document.getElementById('btn-visual').addEventListener('click', async () => {
      const p = await callGatewayText('Create a concise visual direction for: ' + state.title + '. Context: ' + state.content.slice(0, 500), 'You are a visual art director. Return plain text.');
      state.image = poster(p || state.title, 'kAIxU Matrix Render');
      refresh(); debounceSave();
    });
    document.getElementById('btn-preview').addEventListener('click', () => {
      document.getElementById('editor').classList.add('hidden');
      document.getElementById('preview').classList.remove('hidden');
      refresh();
    });
    document.getElementById('btn-pdf').addEventListener('click', () => { window.focus(); window.print(); });

    if (auth) {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
        else await signInAnonymously(auth);
      } catch {}
      onAuthStateChanged(auth, (u) => { user = u; if (u) sync(); });
    }

    refresh();
  </script>
</body>
</html>
