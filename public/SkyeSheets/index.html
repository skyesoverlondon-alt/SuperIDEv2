<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyeSheets Standalone</title>
  <script src="/_shared/auth-unlock.js"></script>
  <script src="/_shared/standalone-session.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
    :root { --bg:#060d13; --bg2:#0d1d27; --line:rgba(44,230,255,.34); --line2:rgba(191,238,255,.2); --text:#f6fbff; --muted:#9ab6c4; --gold:#ffcb47; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Space Grotesk",sans-serif; color:var(--text); background:radial-gradient(circle at 90% 0, rgba(255,203,71,.14), transparent 40%), linear-gradient(155deg,var(--bg),var(--bg2)); }
    .shell { max-width:1200px; margin:0 auto; padding:16px; display:grid; gap:12px; }
    .topbar, .panel { border:1px solid var(--line); border-radius:14px; background:rgba(7,15,21,.9); }
    .topbar { padding:12px 14px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
    .brand { font-family:"Orbitron",sans-serif; text-transform:uppercase; letter-spacing:.09em; }
    .meta { color:var(--muted); font-size:.82rem; }
    .chip { border:1px solid rgba(255,203,71,.42); border-radius:999px; padding:5px 10px; color:#ffe6a5; background:rgba(255,203,71,.08); font-size:.74rem; }
    .panel { padding:12px; display:grid; gap:10px; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; }
    button, input { border-radius:10px; border:1px solid var(--line2); background:rgba(0,0,0,.34); color:var(--text); padding:9px 10px; font:inherit; }
    button { cursor:pointer; border-color:var(--line); background:rgba(44,230,255,.12); }
    button.primary { background:linear-gradient(135deg, rgba(255,203,71,.9), rgba(44,230,255,.78)); color:#03131a; font-weight:700; border-color:rgba(255,203,71,.5); }
    .grid-wrap { overflow:auto; border:1px solid var(--line2); border-radius:12px; }
    .row { display:grid; grid-template-columns: repeat(5, minmax(130px, 1fr)); gap:6px; padding:6px; border-bottom:1px solid rgba(191,238,255,.09); min-width:740px; }
    .row.head { position:sticky; top:0; background:rgba(10,20,28,.95); z-index:2; }
    .row:last-child { border-bottom:none; }
    .status { color:var(--muted); font-size:.82rem; }
    .diag { border:1px solid var(--line2); border-radius:10px; padding:8px; color:var(--muted); font-size:.8rem; }
    .brand-preview { max-height:42px; max-width:220px; object-fit:contain; border:1px solid rgba(191,238,255,.22); border-radius:8px; padding:4px; background:rgba(0,0,0,.2); }
  </style>
</head>
<body data-app-id="SkyeSheets">
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="brand">SkyeSheets Command Surface</div>
        <div class="meta">Workbook operations and autosave persistence</div>
      </div>
      <div class="chip" id="meta">ws_id=default</div>
    </header>
    <section class="panel">
      <div class="toolbar">
        <button id="add">Add Row</button>
        <button class="primary" id="save">Save</button>
        <button id="lint">Formula Lint</button>
        <button id="exportPdf">Export Branded PDF</button>
        <button id="auditDeps">Formula Dependency Map</button>
        <button id="validateRows">Row Validation</button>
        <button id="scheduleReport">Schedule Report</button>
        <button id="signedSummary">Signed Integrity Summary</button>
        <input id="brandUpload" type="file" accept="image/*" />
        <img id="brandPreview" class="brand-preview" alt="brand preview" style="display:none;" />
      </div>
      <div class="diag" id="lintOut">Formula lint output pending.</div>
      <div class="diag" id="depOut">Dependency audit map pending.</div>
      <div class="diag" id="validationOut">Row-level validation pending.</div>
      <div class="diag" id="scheduleOut">Scheduled report generator idle.</div>
      <div class="diag" id="signedOut">Signed workbook integrity summary pending.</div>
      <div class="grid-wrap" id="grid"></div>
      <div class="status" id="status"></div>
    </section>
  </div>

<script>
const qs = new URLSearchParams(location.search);
const ws = qs.get("ws_id") || "default";
document.getElementById("meta").textContent = `ws_id=${ws}`;
const key = `skye.sheets.${ws}`;
let rows = JSON.parse(localStorage.getItem(key) || "null") || Array.from({length:5},()=>Array.from({length:5},()=>""));
let brandImage = localStorage.getItem(`${key}.brand`) || '';
const grid = document.getElementById("grid");
const status = document.getElementById("status");
const lintOut = document.getElementById('lintOut');
const depOut = document.getElementById('depOut');
const validationOut = document.getElementById('validationOut');
const scheduleOut = document.getElementById('scheduleOut');
const signedOut = document.getElementById('signedOut');
const brandPreview = document.getElementById('brandPreview');

if (brandImage) {
  brandPreview.src = brandImage;
  brandPreview.style.display = 'block';
}

function render() {
  grid.innerHTML = "";
  const head = document.createElement("div");
  head.className = "row head";
  ["A","B","C","D","E"].forEach(c => {
    const i = document.createElement("input");
    i.value = c;
    i.readOnly = true;
    head.appendChild(i);
  });
  grid.appendChild(head);

  rows.forEach((r, ri) => {
    const row = document.createElement("div");
    row.className = "row";
    r.forEach((v, ci) => {
      const i = document.createElement("input");
      i.value = v;
      i.oninput = e => rows[ri][ci] = e.target.value;
      row.appendChild(i);
    });
    grid.appendChild(row);
  });
}

function save() {
  localStorage.setItem(key, JSON.stringify(rows));
  localStorage.setItem(`${key}.brand`, brandImage || '');
  status.textContent = `Saved ${new Date().toLocaleString()}`;
}

function lintFormulas() {
  const issues = [];
  for (let r = 0; r < rows.length; r += 1) {
    for (let c = 0; c < rows[r].length; c += 1) {
      const value = String(rows[r][c] || '');
      if (!value.startsWith('=')) continue;
      const formula = value.slice(1);
      const opens = (formula.match(/\(/g) || []).length;
      const closes = (formula.match(/\)/g) || []).length;
      if (opens !== closes) issues.push(`R${r+1}C${c+1}: unbalanced parentheses`);
      if (/[^A-Z0-9_+\-*/().,: ]/i.test(formula)) issues.push(`R${r+1}C${c+1}: unsupported characters`);
      if (/\b[A-Z]{1,2}[0-9]{1,3}\b/.test(formula) === false) issues.push(`R${r+1}C${c+1}: no cell references detected`);
    }
  }
  lintOut.textContent = issues.length ? `Formula lint: ${issues.join(' | ')}` : 'Formula lint: no obvious formula issues found.';
}

function buildDependencyAuditMap() {
  const edges = [];
  rows.forEach((row, rIdx) => {
    row.forEach((value, cIdx) => {
      const text = String(value || '');
      if (!text.startsWith('=')) return;
      const refs = text.match(/\b[A-E][1-9][0-9]{0,2}\b/g) || [];
      refs.forEach((ref) => edges.push(`R${rIdx + 1}C${cIdx + 1}->${ref}`));
    });
  });
  depOut.textContent = edges.length
    ? `Dependency-aware formula audit map: ${edges.join(' | ')}`
    : 'Dependency-aware formula audit map: no formula links found.';
}

function validateRowsWithExceptions() {
  const exceptions = [];
  rows.forEach((row, rIdx) => {
    const empties = row.filter((cell) => String(cell || '').trim() === '').length;
    if (empties >= 4) exceptions.push(`row ${rIdx + 1}: mostly empty`);
    if (row.some((cell) => String(cell || '').length > 120)) exceptions.push(`row ${rIdx + 1}: overlong cell`);
  });
  validationOut.textContent = exceptions.length
    ? `Row-level validation exceptions: ${exceptions.join(' | ')}`
    : 'Row-level validation: no exceptions.';
}

function generateScheduledReport() {
  const schedule = {
    generated_at: new Date().toISOString(),
    ws_id: ws,
    row_count: rows.length,
    next_run_hint: new Date(Date.now() + 24 * 3600 * 1000).toISOString(),
    brand_attached: Boolean(brandImage),
  };
  localStorage.setItem(`${key}.scheduledReport`, JSON.stringify(schedule));
  scheduleOut.textContent = `Branded scheduled report generated. Next run hint: ${schedule.next_run_hint}`;
}

function emitSignedIntegritySummary() {
  const payload = JSON.stringify({ ws, rows, brand: Boolean(brandImage) });
  const sig = Math.abs(payload.split('').reduce((a, ch) => ((a << 5) - a) + ch.charCodeAt(0), 0));
  const summary = {
    ws_id: ws,
    row_count: rows.length,
    signature: `sig-${sig}`,
    issued_at: new Date().toISOString(),
  };
  signedOut.textContent = `Signed workbook export integrity summary: ${summary.signature} @ ${summary.issued_at}`;
  const blob = new Blob([JSON.stringify(summary, null, 2)], { type: 'application/json' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'skyesheets-integrity-summary.json';
  link.click();
}

function exportBrandedPdf() {
  const rowsHtml = rows.map((r) => '<tr>' + r.map((v) => `<td style="border:1px solid #94a3b8;padding:6px;">${String(v).replace(/</g,'&lt;')}</td>`).join('') + '</tr>').join('');
  const brandHtml = brandImage ? `<img src="${brandImage}" style="max-height:44px;max-width:200px;object-fit:contain;" alt="Brand" />` : '<strong>SkyeSheets</strong>';
  const w = window.open('', '_blank');
  if (!w) return;
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>SkyeSheets Export</title></head><body style="font-family:Arial,sans-serif;padding:18px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">${brandHtml}<div>Workspace: ${ws}</div></div><table style="border-collapse:collapse;width:100%;">${rowsHtml}</table><div style="margin-top:10px;font-size:12px;color:#334155;">Generated ${new Date().toLocaleString()}</div></body></html>`);
  w.document.close();
  w.focus();
  w.print();
}

document.getElementById("add").onclick = () => { rows.push(Array.from({length:5},()=>"")); render(); };
document.getElementById("save").onclick = save;
document.getElementById('lint').onclick = lintFormulas;
document.getElementById('exportPdf').onclick = exportBrandedPdf;
document.getElementById('auditDeps').onclick = buildDependencyAuditMap;
document.getElementById('validateRows').onclick = validateRowsWithExceptions;
document.getElementById('scheduleReport').onclick = generateScheduledReport;
document.getElementById('signedSummary').onclick = emitSignedIntegritySummary;
document.getElementById('brandUpload').onchange = (event) => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    brandImage = String(reader.result || '');
    brandPreview.src = brandImage;
    brandPreview.style.display = 'block';
    save();
  };
  reader.readAsDataURL(file);
};
setInterval(save, 12000);
render();
</script>
<button id="skye-tutorial-fab" type="button" style="position:fixed;right:16px;bottom:16px;z-index:10000;padding:10px 14px;border-radius:999px;border:1px solid rgba(191,238,255,.42);background:rgba(44,230,255,.2);color:#eff9ff;font-weight:700;cursor:pointer;">Start Tutorial</button>
<div id="skye-tutorial-modal" style="display:none;position:fixed;inset:0;z-index:10001;background:rgba(2,6,23,.72);"></div>
<script>
(function(){
  const fab=document.getElementById('skye-tutorial-fab');
  const modal=document.getElementById('skye-tutorial-modal');
  if(!fab||!modal) return;
  const app=(document.title||'App').replace(/Standalone|Workspace|Command Surface|Platform/gi,'').trim();
  modal.innerHTML='<div style="max-width:520px;margin:10vh auto;background:#07131a;color:#eff9ff;border:1px solid rgba(191,238,255,.32);border-radius:14px;padding:18px"><h3 style="margin:0 0 8px">'+app+' Quick Start</h3><ol style="margin:0 0 12px 18px;line-height:1.5"><li>Review auth and active workspace context.</li><li>Run one core workflow action in this app.</li><li>Save/export/share output and verify completion state.</li></ol><div style="display:flex;justify-content:flex-end"><button id="skye-tutorial-close" type="button" style="padding:8px 12px;border-radius:10px;border:1px solid rgba(191,238,255,.32);background:rgba(0,0,0,.34);color:#eff9ff;cursor:pointer;">Close</button></div></div>';
  fab.addEventListener('click',()=>{modal.style.display='block';});
  modal.addEventListener('click',(e)=>{if(e.target===modal||e.target.id==='skye-tutorial-close') modal.style.display='none';});
})();
</script>
</body>
</html>
