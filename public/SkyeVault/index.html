<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyeVault Platform</title>
  <script src="/_shared/auth-unlock.js"></script>
  <script src="/_shared/standalone-session.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
    :root { --bg:#060d13; --bg2:#0d1d27; --line:rgba(44,230,255,.34); --line2:rgba(191,238,255,.2); --text:#f6fbff; --muted:#9ab6c4; --gold:#ffcb47; }
    *{box-sizing:border-box;} body{margin:0;color:var(--text);font-family:"Space Grotesk",sans-serif;background:radial-gradient(circle at 12% 0, rgba(44,230,255,.14), transparent 40%), linear-gradient(155deg,var(--bg),var(--bg2));}
    .shell{max-width:1150px;margin:0 auto;padding:16px;display:grid;gap:12px;} .topbar,.card{border:1px solid var(--line);border-radius:14px;background:rgba(7,15,21,.9);} .topbar{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
    .brand{font-family:"Orbitron",sans-serif;text-transform:uppercase;letter-spacing:.09em;} .muted{color:var(--muted);font-size:.82rem;} .chip{border:1px solid rgba(255,203,71,.42);border-radius:999px;padding:5px 10px;color:#ffe6a5;background:rgba(255,203,71,.08);font-size:.74rem;}
    .card{padding:12px;display:grid;gap:10px;} .row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;} .row.two{grid-template-columns:1fr 1fr;}
    input,select,button{width:100%;border:1px solid var(--line2);border-radius:10px;background:rgba(0,0,0,.34);color:var(--text);padding:9px 10px;font:inherit;} button{cursor:pointer;border-color:var(--line);background:rgba(44,230,255,.12);} button.primary{background:linear-gradient(135deg, rgba(255,203,71,.9), rgba(44,230,255,.78));color:#03131a;font-weight:700;border-color:rgba(255,203,71,.5);} .item{border:1px solid var(--line2);border-radius:12px;padding:10px;background:rgba(255,255,255,.03);margin-top:8px;}
    .diag{border:1px solid var(--line2);border-radius:10px;padding:8px;color:var(--muted);font-size:.8rem;}
    a{color:#d8f7ff;} @media (max-width:900px){.row{grid-template-columns:1fr 1fr;}.row.two{grid-template-columns:1fr;}} @media (max-width:560px){.row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="shell">
  <section class="topbar">
    <div>
      <div class="brand">SkyeVault Command Surface</div>
      <div class="muted">Secrets inventory with scoped records and rotation operations.</div>
      <div class="muted"><a href="/index.html?app=SkyeVault">Return to IDE</a></div>
    </div>
    <div class="chip" id="meta">ws_id=primary-workspace</div>
  </section>

  <section class="card">
    <div class="row"><input id="email" placeholder="email"/><input id="password" type="password" placeholder="password"/><input id="org" value="SkyeVault Org"/><button id="login">Login or Signup</button></div>
    <div class="row"><input id="ws" placeholder="workspace"/><input id="label" placeholder="Secret label"/><select id="scope"><option>workspace</option><option>org</option><option>deploy</option></select><button class="primary" id="add">Register</button></div>
    <div class="row"><input id="requester" placeholder="requester email"/><input id="reason" placeholder="access reason"/><select id="approvalDecision"><option value="approved">approve</option><option value="denied">deny</option></select><button id="applyApproval">Apply Approval</button></div>
    <div class="row two"><input id="rotationDays" type="number" min="1" value="30" placeholder="Rotation every N days"/><button id="runScheduler">Run Rotation Scheduler</button></div>
    <div class="row two"><button id="applyPlaybooks">Apply Scope Playbooks</button><button id="recordUsage">Record Usage Attestation</button></div>
    <div class="row two"><button id="startBreakGlass">Start Break-Glass Session</button><button id="endBreakGlass">End Break-Glass Session</button></div>
    <div class="diag" id="rotationAlerts">Rotation alerts pending scheduler run.</div>
    <div class="diag" id="approvalInfo">Approval workflow pending action.</div>
    <div class="diag" id="attestationInfo">Usage attestation log empty.</div>
    <div class="diag" id="breakGlassInfo">No break-glass sessions active.</div>
    <div class="row two"><button id="load">Load</button><button id="save">Save</button></div>
    <div class="muted" id="status">Ready.</div>
  </section>

  <section class="card" id="list"></section>
</div>
<script>
const qs=new URLSearchParams(location.search);document.getElementById('ws').value=qs.get('ws_id')||'primary-workspace';document.getElementById('meta').textContent=`ws_id=${document.getElementById('ws').value}`;
let secrets=[];const status=document.getElementById('status');function setStatus(t){status.textContent=t}
const rotationAlerts=document.getElementById('rotationAlerts');
const approvalInfo=document.getElementById('approvalInfo');
const attestationInfo=document.getElementById('attestationInfo');
const breakGlassInfo=document.getElementById('breakGlassInfo');
const playbookByScope={workspace:30,org:14,deploy:7};
async function call(path,opt={}){if(window.SkyeStandaloneSession?.request)return window.SkyeStandaloneSession.request(path,opt,{appId:'skyevault',prompt:false});const r=await fetch(path,{credentials:'include',...opt});const t=await r.text();let d={};try{d=t?JSON.parse(t):{}}catch{d={raw:t}}if(!r.ok)throw new Error(d.error||path+' failed ('+r.status+')');return d}
async function auth(){const email=document.getElementById('email').value.trim();const password=document.getElementById('password').value;const org=document.getElementById('org').value.trim()||'SkyeVault Org';if(window.SkyeStandaloneSession?.ensureSignedIn)return window.SkyeStandaloneSession.ensureSignedIn({appId:'skyevault',email,password,orgName:org,labelPrefix:'skyevault'});if(!email||!password)throw new Error('email/password required')}
async function load(){await auth();const ws=document.getElementById('ws').value.trim();const d=await call('/api/app-record-list?ws_id='+encodeURIComponent(ws)+'&app=SkyeVault&limit=1');secrets=Array.isArray(d.records)&&d.records[0]&&d.records[0].payload&&Array.isArray(d.records[0].payload.secrets)?d.records[0].payload.secrets:[];render();setStatus('Loaded vault model.')}
async function save(){await auth();const ws=document.getElementById('ws').value.trim();await call('/api/app-record-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ws_id:ws,app:'SkyeVault',title:'SkyeVault Secrets',model:{secrets}})});setStatus('Saved vault model.')}
function add(){const label=document.getElementById('label').value.trim();if(!label)return setStatus('label required');const intervalDays=Math.max(1,Number(document.getElementById('rotationDays').value||30));secrets.unshift({id:'vault-'+Date.now(),label,scope:document.getElementById('scope').value,owner:'owner',last_rotated:new Date().toISOString().slice(0,10),status:'active',redacted_value:'****',rotation_days:intervalDays,next_due:new Date(Date.now()+intervalDays*86400000).toISOString().slice(0,10)});document.getElementById('label').value='';render()}
function runScheduler(){
  const today=new Date().toISOString().slice(0,10);
  let due=0;
  secrets=secrets.map((s)=>{
    const nextDue=s.next_due||today;
    const overdue=nextDue<today;
    if(overdue) due+=1;
    return {...s,status:overdue?'rotation_due':s.status};
  });
  rotationAlerts.textContent = due ? `Rotation scheduler: ${due} secret(s) overdue.` : 'Rotation scheduler: all secrets within policy window.';
  render();
}
function applyApproval(){
  if(!secrets.length){setStatus('No secret selected. Register one first.');return;}
  const requester=document.getElementById('requester').value.trim();
  const reason=document.getElementById('reason').value.trim();
  const decision=document.getElementById('approvalDecision').value;
  if(!requester||!reason){setStatus('requester and reason required');return;}
  const rec={requester,reason,decision,at:new Date().toISOString()};
  const head=secrets[0];
  head.approvals=(head.approvals||[]);
  head.approvals.unshift(rec);
  head.access_state=decision==='approved'?'approved':'blocked';
  approvalInfo.textContent=`Approval workflow: ${requester} ${decision} for ${head.label}.`;
  render();
}
function applyPlaybooks(){
  secrets=secrets.map((s)=>{
    const days=playbookByScope[s.scope]||30;
    return {...s,rotation_days:days,next_due:new Date(Date.now()+days*86400000).toISOString().slice(0,10)};
  });
  setStatus('Scope playbooks applied (workspace=30, org=14, deploy=7).');
  render();
}
function recordUsage(){
  if(!secrets.length){setStatus('No secret available to attest.');return;}
  const requester=document.getElementById('requester').value.trim()||'unknown@local';
  const reason=document.getElementById('reason').value.trim()||'operational-use';
  const head=secrets[0];
  head.attestations=(head.attestations||[]);
  head.attestations.unshift({actor:requester,purpose:reason,at:new Date().toISOString(),scope:head.scope});
  attestationInfo.textContent=`Usage attestation entries: ${head.attestations.length} (latest actor=${requester}).`;
  render();
}
function startBreakGlass(){
  if(!secrets.length){setStatus('No secret available for break-glass.');return;}
  const requester=document.getElementById('requester').value.trim()||'unknown@local';
  const reason=document.getElementById('reason').value.trim()||'critical-incident';
  const durationMin=30;
  const now=Date.now();
  const head=secrets[0];
  head.break_glass_sessions=(head.break_glass_sessions||[]);
  head.break_glass_sessions.unshift({
    id:'bg-'+now,
    actor:requester,
    reason,
    start_at:new Date(now).toISOString(),
    end_at:new Date(now+durationMin*60000).toISOString(),
    status:'active',
  });
  breakGlassInfo.textContent=`Break-glass active for ${head.label} by ${requester} until ${new Date(now+durationMin*60000).toISOString()}.`;
  render();
}
function endBreakGlass(){
  if(!secrets.length){setStatus('No secret available for break-glass close.');return;}
  const head=secrets[0];
  const sessions=head.break_glass_sessions||[];
  const active=sessions.find((s)=>s.status==='active');
  if(!active){setStatus('No active break-glass session to close.');return;}
  active.status='closed';
  active.closed_at=new Date().toISOString();
  breakGlassInfo.textContent=`Break-glass session ${active.id} closed at ${active.closed_at}.`;
  render();
}
function render(){const list=document.getElementById('list');list.innerHTML='';secrets.forEach(s=>{const item=document.createElement('div');item.className='item';item.innerHTML='<strong>'+s.label+'</strong><div class="muted">scope='+s.scope+' owner='+(s.owner||'n/a')+' last_rotated='+s.last_rotated+' next_due='+(s.next_due||'n/a')+'</div>';const row=document.createElement('div');row.className='row two';row.style.marginTop='8px';const st=document.createElement('select');['active','rotation_due'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;if(v===s.status)o.selected=true;st.appendChild(o)});st.onchange=()=>{secrets=secrets.map(x=>x.id===s.id?{...x,status:st.value}:x)};const rot=document.createElement('button');rot.textContent='Rotate';rot.onclick=()=>{const days=Math.max(1,Number(s.rotation_days||30));secrets=secrets.map(x=>x.id===s.id?{...x,last_rotated:new Date().toISOString().slice(0,10),status:'active',next_due:new Date(Date.now()+days*86400000).toISOString().slice(0,10)}:x);render()};row.appendChild(st);row.appendChild(rot);item.appendChild(row);list.appendChild(item);})}
document.getElementById('login').onclick=()=>auth().then(()=>setStatus('Session ready.')).catch(e=>setStatus(e.message));document.getElementById('load').onclick=()=>load().catch(e=>setStatus(e.message));document.getElementById('save').onclick=()=>save().catch(e=>setStatus(e.message));document.getElementById('add').onclick=add;render();
document.getElementById('runScheduler').onclick=runScheduler;
document.getElementById('applyApproval').onclick=applyApproval;
document.getElementById('applyPlaybooks').onclick=applyPlaybooks;
document.getElementById('recordUsage').onclick=recordUsage;
document.getElementById('startBreakGlass').onclick=startBreakGlass;
document.getElementById('endBreakGlass').onclick=endBreakGlass;
</script>
<button id="skye-tutorial-fab" type="button" style="position:fixed;right:16px;bottom:16px;z-index:10000;padding:10px 14px;border-radius:999px;border:1px solid rgba(191,238,255,.42);background:rgba(44,230,255,.2);color:#eff9ff;font-weight:700;cursor:pointer;">Start Tutorial</button>
<div id="skye-tutorial-modal" style="display:none;position:fixed;inset:0;z-index:10001;background:rgba(2,6,23,.72);"></div>
<script>
(function(){
  const fab=document.getElementById('skye-tutorial-fab');
  const modal=document.getElementById('skye-tutorial-modal');
  if(!fab||!modal) return;
  const app=(document.title||'App').replace(/Standalone|Workspace|Command Surface|Platform/gi,'').trim();
  modal.innerHTML='<div style="max-width:520px;margin:10vh auto;background:#07131a;color:#eff9ff;border:1px solid rgba(191,238,255,.32);border-radius:14px;padding:18px"><h3 style="margin:0 0 8px">'+app+' Quick Start</h3><ol style="margin:0 0 12px 18px;line-height:1.5"><li>Review auth and active workspace context.</li><li>Run one core workflow action in this app.</li><li>Save/export/share output and verify completion state.</li></ol><div style="display:flex;justify-content:flex-end"><button id="skye-tutorial-close" type="button" style="padding:8px 12px;border-radius:10px;border:1px solid rgba(191,238,255,.32);background:rgba(0,0,0,.34);color:#eff9ff;cursor:pointer;">Close</button></div></div>';
  fab.addEventListener('click',()=>{modal.style.display='block';});
  modal.addEventListener('click',(e)=>{if(e.target===modal||e.target.id==='skye-tutorial-close') modal.style.display='none';});
})();
</script>
</body>
</html>
