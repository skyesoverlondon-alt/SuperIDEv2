<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lex-Orbit Legal Navigator MVP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root{
      --bg:#03070b;
      --panel:rgba(7,14,18,.40);
      --panel-2:rgba(9,18,23,.58);
      --line:rgba(255,255,255,.09);
      --soft:rgba(255,255,255,.04);
      --text:#f5fffd;
      --muted:#8ba3a0;
      --green:#10b981;
      --green-2:#34d399;
      --gold:#f59e0b;
      --red:#fb7185;
      --blue:#38bdf8;
      --shadow:0 30px 80px rgba(0,0,0,.45);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:radial-gradient(circle at top, #07231d 0%, #071116 34%, #02060a 100%);
      color:var(--text);
      overflow:hidden;
    }
    #bg{position:fixed; inset:0; width:100%; height:100%; z-index:-2}
    .veil{
      position:fixed; inset:0; z-index:-1;
      background:
        radial-gradient(circle at 18% 16%, rgba(16,185,129,.14), transparent 24%),
        radial-gradient(circle at 84% 18%, rgba(56,189,248,.08), transparent 23%),
        radial-gradient(circle at 50% 88%, rgba(52,211,153,.08), transparent 20%),
        linear-gradient(180deg, rgba(1,4,6,.10), rgba(1,4,6,.42));
      pointer-events:none;
    }
    .shell{
      height:100%;
      display:grid;
      grid-template-columns: 320px minmax(0,1fr) 400px;
      gap:18px;
      padding:18px;
    }
    .panel{
      background:var(--panel);
      backdrop-filter:blur(16px) saturate(135%);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden; min-height:0;
    }
    .scroll{height:100%; overflow:auto}
    .scroll::-webkit-scrollbar{width:8px}
    .scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14); border-radius:999px}
    .brand{
      display:flex; align-items:center; gap:14px;
      padding:20px 18px 14px; border-bottom:1px solid var(--line);
    }
    .core{
      width:54px; height:54px; border-radius:50%;
      background:radial-gradient(circle at 34% 34%, #dcfff5 0, var(--green-2) 18%, rgba(16,185,129,.22) 42%, rgba(16,185,129,.06) 64%, transparent 70%);
      box-shadow:0 0 36px rgba(16,185,129,.22);
      animation: drift 5s ease-in-out infinite;
    }
    @keyframes drift{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-5px)}
    }
    .eyebrow{
      margin:0 0 6px; font-size:11px; letter-spacing:.34em; text-transform:uppercase; color:rgba(52,211,153,.88);
    }
    h1,h2,h3,p{margin:0}
    .brand h1{font-size:24px; letter-spacing:-.03em}
    .brand p{font-size:13px; color:var(--muted); margin-top:4px}
    .inner{padding:18px}
    .section-title{font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:#d1fae5; margin-bottom:12px}
    .stats{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px}
    .stat{
      padding:14px; border-radius:18px; background:linear-gradient(180deg, rgba(255,255,255,.028), rgba(255,255,255,.012));
      border:1px solid rgba(255,255,255,.07);
    }
    .stat .value{font-size:28px; font-weight:800; letter-spacing:-.04em}
    .stat .label{font-size:12px; color:var(--muted); margin-top:4px}
    .actions{display:grid; gap:10px}
    .row{display:flex; gap:10px}
    .row > *{flex:1}
    button,input,textarea,select{font:inherit}
    .btn{
      width:100%; border:none; cursor:pointer; border-radius:16px; padding:14px 14px; font-weight:700;
      display:inline-flex; align-items:center; justify-content:center; gap:10px; transition:transform .18s ease, background .18s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg, var(--green), #0ea5a3); color:#031411}
    .btn-secondary{background:rgba(255,255,255,.034); color:#e5fdf6; border:1px solid rgba(255,255,255,.12)}
    .btn-danger{background:rgba(251,113,133,.12); color:#fecdd3; border:1px solid rgba(251,113,133,.2)}
    .input,.select,.textarea{
      width:100%; padding:12px 14px; border-radius:14px; outline:none; color:white;
      background:rgba(255,255,255,.022); border:1px solid rgba(255,255,255,.12);
    }
    .input:focus,.select:focus,.textarea:focus{
      border-color:rgba(52,211,153,.5); box-shadow:0 0 0 4px rgba(16,185,129,.1);
    }
    .toolbar{
      display:grid; grid-template-columns:minmax(200px,1.2fr) repeat(3,minmax(120px,.55fr)) auto auto;
      gap:10px; padding:18px; border-bottom:1px solid var(--line); align-items:center;
    }
    .matter-list{display:grid; gap:12px; padding:18px}
    .matter-card{
      padding:16px; border-radius:20px; background:linear-gradient(180deg, rgba(255,255,255,.038), rgba(255,255,255,.015));
      border:1px solid rgba(255,255,255,.08); cursor:pointer; transition:transform .18s ease, border-color .18s ease;
      position:relative; overflow:hidden;
    }
    .matter-card:hover{transform:translateY(-2px); border-color:rgba(52,211,153,.3)}
    .matter-card.active{border-color:rgba(52,211,153,.54); box-shadow:0 0 0 1px rgba(52,211,153,.18) inset}
    .matter-accent{position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--green)}
    .card-top{display:flex; justify-content:space-between; gap:12px}
    .title{font-size:15px; font-weight:700; line-height:1.3}
    .muted{color:var(--muted)}
    .small{font-size:12px}
    .chip-row{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px}
    .chip{
      display:inline-flex; align-items:center; gap:6px;
      font-size:11px; padding:7px 10px; border-radius:999px;
      background:rgba(255,255,255,.032); color:#dcfce7; border:1px solid rgba(255,255,255,.11)
    }
    .badge-critical{color:#fecdd3}
    .badge-high{color:#fde68a}
    .detail-head{
      padding:18px; border-bottom:1px solid var(--line);
      display:flex; justify-content:space-between; gap:12px; align-items:flex-start;
    }
    .detail-body{padding:18px; display:grid; gap:16px}
    .meta-grid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px}
    .meta-card{
      padding:14px; border-radius:18px; background:rgba(255,255,255,.022); border:1px solid rgba(255,255,255,.12);
    }
    .meta-card small{display:block; color:var(--muted); margin-bottom:6px}
    .notes{
      white-space:pre-wrap; line-height:1.6; font-size:14px; color:#ecfdf5;
      background:rgba(255,255,255,.018); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:14px; min-height:120px;
    }
    .mini-actions{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px}
    .mini-btn{
      border:none; cursor:pointer; padding:12px 10px; border-radius:14px; background:rgba(255,255,255,.03);
      color:white; border:1px solid var(--line); font-weight:700;
    }
    .mini-btn:hover{background:rgba(255,255,255,.09)}
    .table-block{
      background:rgba(255,255,255,.018); border:1px solid rgba(255,255,255,.12); border-radius:18px; overflow:hidden;
    }
    table{width:100%; border-collapse:collapse}
    th,td{padding:12px 14px; text-align:left; font-size:13px}
    th{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#bbf7d0; background:rgba(255,255,255,.016)}
    tr + tr td{border-top:1px solid rgba(255,255,255,.05)}
    .empty{padding:20px; color:var(--muted); line-height:1.6}
    .pill{
      padding:8px 12px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      background:rgba(255,255,255,.07); border:1px solid var(--line);
    }
    .timeline{display:grid; gap:10px}
    .timeline-item{
      padding:12px 14px; border-radius:16px; background:rgba(255,255,255,.022); border:1px solid rgba(255,255,255,.12);
      display:flex; justify-content:space-between; gap:14px; align-items:flex-start;
    }
    .modal{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center;
      background:rgba(1,6,8,.46); backdrop-filter:blur(10px); padding:18px; z-index:30;
    }
    .modal.show{display:flex}
    .modal-card{
      width:min(860px, 100%); max-height:calc(100vh - 36px); overflow:auto;
      border-radius:28px; background:linear-gradient(180deg, rgba(8,18,22,.84), rgba(6,11,15,.88));
      border:1px solid var(--line); box-shadow:var(--shadow);
    }
    .modal-head{padding:20px 22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center}
    .form-grid{padding:22px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px}
    .full{grid-column:1 / -1}
    .label{display:block; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#d1fae5; margin-bottom:8px}
    .footer-actions{display:flex; justify-content:space-between; gap:12px; padding:0 22px 22px}
    .icon-btn{
      width:42px; height:42px; border:none; border-radius:14px; cursor:pointer;
      background:rgba(255,255,255,.03); color:white; border:1px solid var(--line);
    }
    .summary-list{display:grid; gap:8px}
    .summary-item{
      display:flex; justify-content:space-between; gap:10px; padding:11px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.018); font-size:13px;
    }
    @media (max-width: 1320px){
      .shell{grid-template-columns:300px minmax(0,1fr)}
      .detail-panel{grid-column:1 / -1}
    }
    @media (max-width: 980px){
      body{overflow:auto}
      .shell{grid-template-columns:1fr; height:auto}
      .toolbar{grid-template-columns:1fr 1fr}
      .toolbar > .grow{grid-column:1 / -1}
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="veil"></div>

  <div class="shell">
    <aside class="panel">
      <div class="scroll">
        <div class="brand">
          <div class="core"></div>
          <div>
            <p class="eyebrow">Docket Navigation System</p>
            <h1>Lex-Orbit MVP</h1>
            <p>Matter management, deadlines, billables, and export/import in one file.</p>
          </div>
        </div>

        <div class="inner">
          <div class="section-title">Case Control</div>
          <div class="actions">
            <button class="btn btn-primary" id="newMatterBtn">+ File New Matter</button>
            <div class="row">
              <button class="btn btn-secondary" id="exportBtn">Export JSON</button>
              <button class="btn btn-secondary" id="importBtn">Import JSON</button>
              <input type="file" id="importFile" accept="application/json" hidden />
            </div>
            <button class="btn btn-danger" id="resetBtn">Reset Demo Docket</button>
          </div>

          <div class="stats" id="statsGrid" style="margin-top:18px"></div>

          <div style="margin-top:22px">
            <div class="section-title">Practice Areas</div>
            <div id="practiceSummary" class="summary-list"></div>
          </div>

          <div style="margin-top:22px">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px">
              <div class="section-title" style="margin:0">Deadline Window</div>
              <div class="pill" id="deadlinePill">0 next 7 days</div>
            </div>
            <div id="upcomingList" class="timeline"></div>
          </div>
        </div>
      </div>
    </aside>

    <main class="panel">
      <div class="scroll">
        <div class="toolbar">
          <input class="input grow" id="searchInput" placeholder="Search matter, client, notes, court, docket..." />
          <select class="select" id="statusFilter">
            <option value="all">All Statuses</option>
            <option value="intake">Intake</option>
            <option value="active">Active</option>
            <option value="filing">Filing</option>
            <option value="hearing">Hearing</option>
            <option value="resolved">Resolved</option>
          </select>
          <select class="select" id="urgencyFilter">
            <option value="all">All Urgency</option>
            <option value="1">Standard</option>
            <option value="2">Priority</option>
            <option value="3">Critical</option>
          </select>
          <select class="select" id="practiceFilter">
            <option value="all">All Practice Areas</option>
          </select>
          <button class="icon-btn" id="clearFiltersBtn" title="Clear filters">✦</button>
          <button class="icon-btn" id="refreshOrbitBtn" title="Refresh orbit">↻</button>
        </div>

        <div class="matter-list" id="matterList"></div>
      </div>
    </main>

    <aside class="panel detail-panel">
      <div class="scroll" id="detailPanel"></div>
    </aside>
  </div>

  <div class="modal" id="matterModal">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div class="eyebrow" style="margin-bottom:4px">Matter Intake</div>
          <h2 id="modalTitle">File New Matter</h2>
        </div>
        <button class="icon-btn" id="closeModalBtn">✕</button>
      </div>

      <form id="matterForm">
        <div class="form-grid">
          <div class="full">
            <label class="label" for="matterTitle">Matter Title</label>
            <input class="input" id="matterTitle" required placeholder="Smith v. Global Corp" />
          </div>
          <div>
            <label class="label" for="matterClient">Client</label>
            <input class="input" id="matterClient" placeholder="Client or represented party" />
          </div>
          <div>
            <label class="label" for="matterPractice">Practice Area</label>
            <input class="input" id="matterPractice" placeholder="Litigation, Compliance, Employment..." />
          </div>
          <div>
            <label class="label" for="matterStatus">Status</label>
            <select class="select" id="matterStatus">
              <option value="intake">Intake</option>
              <option value="active">Active</option>
              <option value="filing">Filing</option>
              <option value="hearing">Hearing</option>
              <option value="resolved">Resolved</option>
            </select>
          </div>
          <div>
            <label class="label" for="matterUrgency">Urgency</label>
            <select class="select" id="matterUrgency">
              <option value="1">Standard</option>
              <option value="2">Priority</option>
              <option value="3">Critical</option>
            </select>
          </div>
          <div>
            <label class="label" for="matterDeadline">Next Deadline</label>
            <input class="input" id="matterDeadline" type="date" />
          </div>
          <div>
            <label class="label" for="matterCourt">Court / Forum</label>
            <input class="input" id="matterCourt" placeholder="Maricopa County Superior Court" />
          </div>
          <div>
            <label class="label" for="matterDocket">Docket / File No.</label>
            <input class="input" id="matterDocket" placeholder="CV2026-000123" />
          </div>
          <div>
            <label class="label" for="matterRate">Billable Rate</label>
            <input class="input" id="matterRate" type="number" min="0" step="25" placeholder="350" />
          </div>
          <div>
            <label class="label" for="matterHours">Initial Hours</label>
            <input class="input" id="matterHours" type="number" min="0" step=".25" placeholder="1.5" />
          </div>
          <div class="full">
            <label class="label" for="matterNextAction">Next Action</label>
            <input class="input" id="matterNextAction" placeholder="Draft motion to dismiss and confirm service." />
          </div>
          <div class="full">
            <label class="label" for="matterNotes">Matter Notes</label>
            <textarea class="textarea" id="matterNotes" rows="7" placeholder="Facts, exposure, posture, risks, deadlines, strategy..."></textarea>
          </div>
        </div>
        <div class="footer-actions">
          <button type="button" class="btn btn-danger" id="deleteMatterBtn" style="max-width:180px; opacity:0; pointer-events:none">Delete Matter</button>
          <div class="row" style="max-width:360px; width:100%">
            <button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Matter</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="timeModal">
    <div class="modal-card" style="width:min(560px, 100%)">
      <div class="modal-head">
        <div>
          <div class="eyebrow" style="margin-bottom:4px">Billable Entry</div>
          <h2>Add Time Entry</h2>
        </div>
        <button class="icon-btn" id="closeTimeModalBtn">✕</button>
      </div>
      <form id="timeForm">
        <div class="form-grid" style="grid-template-columns:1fr 1fr">
          <div>
            <label class="label" for="entryDate">Date</label>
            <input class="input" id="entryDate" type="date" />
          </div>
          <div>
            <label class="label" for="entryHours">Hours</label>
            <input class="input" id="entryHours" type="number" min="0.25" step="0.25" required placeholder="1.5" />
          </div>
          <div class="full">
            <label class="label" for="entryDescription">Description</label>
            <textarea class="textarea" id="entryDescription" rows="4" placeholder="Research, draft, hearing prep, call, review..."></textarea>
          </div>
        </div>
        <div class="footer-actions">
          <div></div>
          <div class="row" style="max-width:340px; width:100%">
            <button type="button" class="btn btn-secondary" id="cancelTimeModalBtn">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Entry</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'lex_orbit_mvp_state_v1';

    function addDays(days){
      const d = new Date();
      d.setDate(d.getDate() + days);
      return d.toISOString().slice(0,10);
    }

    const defaultState = () => ({
      matters: [
        {
          id: crypto.randomUUID(),
          title: 'Doe v. Apex Logistics',
          client: 'Jane Doe',
          practice: 'Employment',
          status: 'active',
          urgency: 3,
          deadline: addDays(3),
          court: 'Maricopa County Superior Court',
          docket: 'CV2026-00412',
          rate: 375,
          nextAction: 'Finalize demand letter and confirm wage records.',
          notes: 'High urgency wage dispute with documentation already in hand. Prepare initial damages summary.',
          createdAt: new Date().toISOString(),
          timeEntries: [
            { id: crypto.randomUUID(), date: addDays(-1), hours: 1.5, description: 'Reviewed intake packet and employment records.' },
            { id: crypto.randomUUID(), date: addDays(0), hours: 0.75, description: 'Client strategy call.' }
          ]
        },
        {
          id: crypto.randomUUID(),
          title: 'Acme Compliance Review',
          client: 'Acme Manufacturing',
          practice: 'Compliance',
          status: 'filing',
          urgency: 2,
          deadline: addDays(7),
          court: 'Administrative Review',
          docket: 'CMP-2026-88',
          rate: 300,
          nextAction: 'Submit response packet and update internal checklist.',
          notes: 'Routine but time sensitive filing package. Needs final exhibits bundled.',
          createdAt: new Date().toISOString(),
          timeEntries: [
            { id: crypto.randomUUID(), date: addDays(-2), hours: 2.25, description: 'Prepared compliance response draft.' }
          ]
        },
        {
          id: crypto.randomUUID(),
          title: 'Nguyen Lease Negotiation',
          client: 'Nguyen Holdings',
          practice: 'Commercial',
          status: 'resolved',
          urgency: 1,
          deadline: addDays(-4),
          court: 'Private Negotiation',
          docket: 'NEG-2026-14',
          rate: 290,
          nextAction: 'Archive executed documents.',
          notes: 'Matter resolved successfully. Final packet ready for records.',
          createdAt: new Date().toISOString(),
          timeEntries: [
            { id: crypto.randomUUID(), date: addDays(-5), hours: 1.0, description: 'Redlined final lease changes.' }
          ]
        }
      ]
    });

    let state = loadState();
    let selectedMatterId = state.matters[0]?.id || null;
    let editingMatterId = null;

    const els = {
      statsGrid: document.getElementById('statsGrid'),
      practiceSummary: document.getElementById('practiceSummary'),
      deadlinePill: document.getElementById('deadlinePill'),
      upcomingList: document.getElementById('upcomingList'),
      matterList: document.getElementById('matterList'),
      detailPanel: document.getElementById('detailPanel'),
      searchInput: document.getElementById('searchInput'),
      statusFilter: document.getElementById('statusFilter'),
      urgencyFilter: document.getElementById('urgencyFilter'),
      practiceFilter: document.getElementById('practiceFilter'),
      importFile: document.getElementById('importFile'),
      matterModal: document.getElementById('matterModal'),
      timeModal: document.getElementById('timeModal'),
      deleteMatterBtn: document.getElementById('deleteMatterBtn'),
      modalTitle: document.getElementById('modalTitle')
    };

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return defaultState();
        const parsed = JSON.parse(raw);
        if(!parsed.matters || !Array.isArray(parsed.matters)) return defaultState();
        return parsed;
      }catch(err){
        console.warn('Failed to load Lex-Orbit state', err);
        return defaultState();
      }
    }

    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeHtml(value){
      return String(value ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#39;');
    }

    function getSelectedMatter(){
      return state.matters.find(m => m.id === selectedMatterId) || null;
    }

    function formatDate(dateStr){
      if(!dateStr) return '—';
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
    }

    function daysUntil(dateStr){
      if(!dateStr) return null;
      const today = new Date();
      today.setHours(0,0,0,0);
      const due = new Date(dateStr + 'T00:00:00');
      return Math.round((due - today) / 86400000);
    }

    function urgencyLabel(value){
      return ({1:'Standard',2:'Priority',3:'Critical'})[value] || 'Unknown';
    }

    function statusLabel(value){
      return ({
        intake:'Intake',
        active:'Active',
        filing:'Filing',
        hearing:'Hearing',
        resolved:'Resolved'
      })[value] || value;
    }

    function matterHours(matter){
      return (matter.timeEntries || []).reduce((sum, entry) => sum + Number(entry.hours || 0), 0);
    }

    function matterRevenue(matter){
      return matterHours(matter) * Number(matter.rate || 0);
    }

    function filterMatters(){
      const search = els.searchInput.value.trim().toLowerCase();
      const status = els.statusFilter.value;
      const urgency = els.urgencyFilter.value;
      const practice = els.practiceFilter.value;

      return state.matters.filter(matter => {
        const matchesSearch = !search || [
          matter.title, matter.client, matter.practice, matter.notes, matter.court, matter.docket, matter.nextAction
        ].join(' ').toLowerCase().includes(search);

        const matchesStatus = status === 'all' || matter.status === status;
        const matchesUrgency = urgency === 'all' || String(matter.urgency) === urgency;
        const matchesPractice = practice === 'all' || matter.practice === practice;
        return matchesSearch && matchesStatus && matchesUrgency && matchesPractice;
      });
    }

    function renderStats(){
      const total = state.matters.length;
      const active = state.matters.filter(m => ['active','filing','hearing'].includes(m.status)).length;
      const critical = state.matters.filter(m => m.urgency === 3).length;
      const deadlineSoon = state.matters.filter(m => {
        const delta = daysUntil(m.deadline);
        return delta !== null && delta <= 7 && delta >= 0;
      }).length;
      const revenue = state.matters.reduce((sum, m) => sum + matterRevenue(m), 0);

      els.statsGrid.innerHTML = [
        { value: total, label: 'Total Matters' },
        { value: active, label: 'Active Docket' },
        { value: critical, label: 'Critical Matters' },
        { value: `$${revenue.toLocaleString(undefined, {maximumFractionDigits:0})}`, label: 'Billable Value' }
      ].map(stat => `
        <div class="stat">
          <div class="value">${stat.value}</div>
          <div class="label">${stat.label}</div>
        </div>
      `).join('');
    }

    function renderPracticeSummary(){
      const map = new Map();
      state.matters.forEach(m => {
        const key = m.practice?.trim() || 'Unassigned';
        if(!map.has(key)) map.set(key, { count:0, revenue:0 });
        const item = map.get(key);
        item.count += 1;
        item.revenue += matterRevenue(m);
      });
      const entries = [...map.entries()].sort((a,b) => b[1].count - a[1].count);
      els.practiceSummary.innerHTML = entries.length ? entries.map(([name, meta]) => `
        <div class="summary-item">
          <div>
            <div style="font-weight:700">${escapeHtml(name)}</div>
            <div class="muted">${meta.count} matter${meta.count === 1 ? '' : 's'}</div>
          </div>
          <button class="mini-btn" style="padding:8px 12px" onclick="setPracticeFilter('${escapeHtml(name).replaceAll('&#39;', "\\'")}')">$${Math.round(meta.revenue).toLocaleString()}</button>
        </div>
      `).join('') : `<div class="empty">Practice summaries appear as soon as matters exist.</div>`;

      const current = els.practiceFilter.value;
      els.practiceFilter.innerHTML = `<option value="all">All Practice Areas</option>` + entries.map(([name]) => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('');
      els.practiceFilter.value = entries.some(([name]) => name === current) ? current : 'all';
    }

    function renderUpcoming(){
      const upcoming = state.matters
        .filter(m => {
          const delta = daysUntil(m.deadline);
          return delta !== null && delta <= 14;
        })
        .sort((a,b) => (daysUntil(a.deadline) ?? 999) - (daysUntil(b.deadline) ?? 999))
        .slice(0, 6);

      const nextSeven = state.matters.filter(m => {
        const delta = daysUntil(m.deadline);
        return delta !== null && delta <= 7 && delta >= 0;
      }).length;
      els.deadlinePill.textContent = `${nextSeven} next 7 days`;

      els.upcomingList.innerHTML = upcoming.length ? upcoming.map(m => {
        const delta = daysUntil(m.deadline);
        const dueText = delta < 0 ? `${Math.abs(delta)}d overdue` : delta === 0 ? 'Due today' : `In ${delta}d`;
        return `
          <div class="timeline-item">
            <div>
              <div style="font-weight:700">${escapeHtml(m.title)}</div>
              <div class="muted small" style="margin-top:4px">${escapeHtml(m.client || 'No client')}</div>
            </div>
            <div class="pill ${m.urgency === 3 ? 'badge-critical' : m.urgency === 2 ? 'badge-high' : ''}">${escapeHtml(dueText)}</div>
          </div>
        `;
      }).join('') : `<div class="empty">No deadlines in the current near-term window. For a legal dashboard, that is suspiciously peaceful.</div>`;
    }

    function renderMatterList(){
      const matters = filterMatters().sort((a,b) => {
        const ad = daysUntil(a.deadline); const bd = daysUntil(b.deadline);
        return (ad ?? 999) - (bd ?? 999);
      });

      els.matterList.innerHTML = matters.length ? matters.map(matter => {
        const delta = daysUntil(matter.deadline);
        const deadlineText = delta === null ? 'No deadline'
          : delta < 0 ? `${Math.abs(delta)} day${Math.abs(delta) === 1 ? '' : 's'} overdue`
          : delta === 0 ? 'Due today'
          : `Due in ${delta} day${delta === 1 ? '' : 's'}`;
        return `
          <article class="matter-card ${selectedMatterId === matter.id ? 'active' : ''}" onclick="selectMatter('${matter.id}')">
            <div class="matter-accent" style="background:${matter.urgency === 3 ? '#fb7185' : matter.urgency === 2 ? '#f59e0b' : '#10b981'}"></div>
            <div class="card-top">
              <div>
                <div class="title">${escapeHtml(matter.title)}</div>
                <div class="muted small" style="margin-top:6px">${escapeHtml(matter.client || 'No client')} • ${escapeHtml(matter.practice || 'Unassigned')}</div>
              </div>
              <div class="chip ${matter.urgency === 3 ? 'badge-critical' : matter.urgency === 2 ? 'badge-high' : ''}">${urgencyLabel(matter.urgency)}</div>
            </div>
            <div class="chip-row">
              <span class="chip">${statusLabel(matter.status)}</span>
              <span class="chip">${escapeHtml(deadlineText)}</span>
              <span class="chip">${matterHours(matter).toFixed(2)} hrs</span>
              <span class="chip">$${Math.round(matterRevenue(matter)).toLocaleString()}</span>
            </div>
          </article>
        `;
      }).join('') : `<div class="empty">No matters match the current filters.</div>`;
    }

    function renderDetail(){
      const matter = getSelectedMatter();
      if(!matter){
        els.detailPanel.innerHTML = `
          <div class="detail-head">
            <div>
              <div class="eyebrow" style="margin-bottom:4px">Matter Detail</div>
              <h2>No matter selected</h2>
            </div>
          </div>
          <div class="detail-body">
            <div class="empty">Select a matter to inspect deadlines, billables, and the working notes. Tiny digital courthouse, slightly less powdered wig.</div>
          </div>
        `;
        return;
      }

      const delta = daysUntil(matter.deadline);
      const dueText = delta === null ? 'No deadline'
        : delta < 0 ? `${Math.abs(delta)} day${Math.abs(delta) === 1 ? '' : 's'} overdue`
        : delta === 0 ? 'Due today'
        : `Due in ${delta} day${delta === 1 ? '' : 's'}`;

      const entries = [...(matter.timeEntries || [])].sort((a,b) => new Date(b.date) - new Date(a.date));

      els.detailPanel.innerHTML = `
        <div class="detail-head">
          <div>
            <div class="eyebrow" style="margin-bottom:6px">Matter Readout</div>
            <h2 style="font-size:28px; line-height:1.18">${escapeHtml(matter.title)}</h2>
            <p class="muted" style="margin-top:8px">${escapeHtml(matter.client || 'No client')} • ${escapeHtml(matter.practice || 'Unassigned')}</p>
          </div>
          <button class="btn btn-secondary" style="width:auto; padding:12px 14px" onclick="openMatterModal('${matter.id}')">Edit</button>
        </div>

        <div class="detail-body">
          <div class="meta-grid">
            <div class="meta-card"><small>Status</small><strong>${statusLabel(matter.status)}</strong></div>
            <div class="meta-card"><small>Urgency</small><strong>${urgencyLabel(matter.urgency)}</strong></div>
            <div class="meta-card"><small>Next Deadline</small><strong>${escapeHtml(dueText)}</strong></div>
            <div class="meta-card"><small>Court / Forum</small><strong>${escapeHtml(matter.court || '—')}</strong></div>
            <div class="meta-card"><small>Docket / File</small><strong>${escapeHtml(matter.docket || '—')}</strong></div>
            <div class="meta-card"><small>Billable Rate</small><strong>$${Number(matter.rate || 0).toLocaleString()}</strong></div>
            <div class="meta-card"><small>Logged Hours</small><strong>${matterHours(matter).toFixed(2)} hrs</strong></div>
            <div class="meta-card"><small>Estimated Value</small><strong>$${Math.round(matterRevenue(matter)).toLocaleString()}</strong></div>
          </div>

          <div>
            <div class="section-title">Next Action</div>
            <div class="notes">${escapeHtml(matter.nextAction || 'No next action captured yet.')}</div>
          </div>

          <div>
            <div class="section-title">Matter Notes</div>
            <div class="notes">${escapeHtml(matter.notes || 'No notes captured yet.')}</div>
          </div>

          <div>
            <div class="section-title">Quick Actions</div>
            <div class="mini-actions">
              <button class="mini-btn" onclick="cycleStatus('${matter.id}', -1)">← Previous Stage</button>
              <button class="mini-btn" onclick="cycleStatus('${matter.id}', 1)">Next Stage →</button>
              <button class="mini-btn" onclick="openTimeModal('${matter.id}')">Add Time Entry</button>
            </div>
          </div>

          <div>
            <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px">
              <div class="section-title" style="margin:0">Time Entries</div>
              <div class="pill">${entries.length} logged</div>
            </div>
            <div class="table-block">
              ${entries.length ? `
                <table>
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Hours</th>
                      <th>Description</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${entries.map(entry => `
                      <tr>
                        <td>${formatDate(entry.date)}</td>
                        <td>${Number(entry.hours).toFixed(2)}</td>
                        <td>${escapeHtml(entry.description || '—')}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              ` : `<div class="empty">No billable entries yet. Add one and the meter begins humming.</div>`}
            </div>
          </div>
        </div>
      `;
    }

    function renderAll(){
      renderStats();
      renderPracticeSummary();
      renderUpcoming();
      renderMatterList();
      renderDetail();
    }

    function openMatterModal(matterId = null){
      editingMatterId = matterId;
      const matter = matterId ? state.matters.find(m => m.id === matterId) : null;
      els.modalTitle.textContent = matter ? 'Edit Matter' : 'File New Matter';
      document.getElementById('matterTitle').value = matter?.title || '';
      document.getElementById('matterClient').value = matter?.client || '';
      document.getElementById('matterPractice').value = matter?.practice || '';
      document.getElementById('matterStatus').value = matter?.status || 'intake';
      document.getElementById('matterUrgency').value = String(matter?.urgency || 2);
      document.getElementById('matterDeadline').value = matter?.deadline || '';
      document.getElementById('matterCourt').value = matter?.court || '';
      document.getElementById('matterDocket').value = matter?.docket || '';
      document.getElementById('matterRate').value = matter?.rate || '';
      document.getElementById('matterHours').value = '';
      document.getElementById('matterNextAction').value = matter?.nextAction || '';
      document.getElementById('matterNotes').value = matter?.notes || '';

      els.deleteMatterBtn.style.opacity = matter ? '1' : '0';
      els.deleteMatterBtn.style.pointerEvents = matter ? 'auto' : 'none';
      els.matterModal.classList.add('show');
    }

    function closeMatterModal(){
      editingMatterId = null;
      els.matterModal.classList.remove('show');
    }

    function upsertMatter(event){
      event.preventDefault();
      const hoursValue = Number(document.getElementById('matterHours').value || 0);
      const payload = {
        title: document.getElementById('matterTitle').value.trim(),
        client: document.getElementById('matterClient').value.trim(),
        practice: document.getElementById('matterPractice').value.trim() || 'Unassigned',
        status: document.getElementById('matterStatus').value,
        urgency: Number(document.getElementById('matterUrgency').value),
        deadline: document.getElementById('matterDeadline').value || '',
        court: document.getElementById('matterCourt').value.trim(),
        docket: document.getElementById('matterDocket').value.trim(),
        rate: Number(document.getElementById('matterRate').value || 0),
        nextAction: document.getElementById('matterNextAction').value.trim(),
        notes: document.getElementById('matterNotes').value.trim()
      };
      if(!payload.title) return;

      if(editingMatterId){
        const matter = state.matters.find(m => m.id === editingMatterId);
        if(matter){
          Object.assign(matter, payload);
          if(hoursValue > 0){
            matter.timeEntries = matter.timeEntries || [];
            matter.timeEntries.push({
              id: crypto.randomUUID(),
              date: new Date().toISOString().slice(0,10),
              hours: hoursValue,
              description: 'Initial hours logged during matter update.'
            });
          }
        }
        selectedMatterId = editingMatterId;
      }else{
        const matter = {
          id: crypto.randomUUID(),
          ...payload,
          createdAt: new Date().toISOString(),
          timeEntries: hoursValue > 0 ? [{
            id: crypto.randomUUID(),
            date: new Date().toISOString().slice(0,10),
            hours: hoursValue,
            description: 'Initial logged hours.'
          }] : []
        };
        state.matters.unshift(matter);
        selectedMatterId = matter.id;
      }

      saveState();
      renderAll();
      rebuildOrbit();
      closeMatterModal();
    }

    function deleteMatter(){
      if(!editingMatterId) return;
      state.matters = state.matters.filter(m => m.id !== editingMatterId);
      if(selectedMatterId === editingMatterId){
        selectedMatterId = state.matters[0]?.id || null;
      }
      saveState();
      renderAll();
      rebuildOrbit();
      closeMatterModal();
    }

    function selectMatter(matterId){
      selectedMatterId = matterId;
      renderMatterList();
      renderDetail();
    }

    function cycleStatus(matterId, delta){
      const flow = ['intake','active','filing','hearing','resolved'];
      const matter = state.matters.find(m => m.id === matterId);
      if(!matter) return;
      const index = Math.max(0, Math.min(flow.length - 1, flow.indexOf(matter.status) + delta));
      matter.status = flow[index];
      saveState();
      renderAll();
      rebuildOrbit();
    }

    function setPracticeFilter(practice){
      els.practiceFilter.value = practice;
      renderMatterList();
    }

    function clearFilters(){
      els.searchInput.value = '';
      els.statusFilter.value = 'all';
      els.urgencyFilter.value = 'all';
      els.practiceFilter.value = 'all';
      renderMatterList();
    }

    function exportData(){
      const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `lex-orbit-export-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(file){
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try{
          const parsed = JSON.parse(reader.result);
          if(!parsed.matters || !Array.isArray(parsed.matters)) throw new Error('Invalid file');
          state = parsed;
          selectedMatterId = state.matters[0]?.id || null;
          saveState();
          renderAll();
          rebuildOrbit();
        }catch(err){
          alert('That import file is not valid Lex-Orbit data.');
        }
      };
      reader.readAsText(file);
    }

    function resetDemoData(){
      if(!confirm('Reset Lex-Orbit to the starter docket?')) return;
      state = defaultState();
      selectedMatterId = state.matters[0]?.id || null;
      saveState();
      renderAll();
      rebuildOrbit();
    }

    let timeMatterId = null;
    function openTimeModal(matterId){
      timeMatterId = matterId;
      document.getElementById('entryDate').value = new Date().toISOString().slice(0,10);
      document.getElementById('entryHours').value = '';
      document.getElementById('entryDescription').value = '';
      els.timeModal.classList.add('show');
    }
    function closeTimeModal(){
      timeMatterId = null;
      els.timeModal.classList.remove('show');
    }
    function saveTimeEntry(event){
      event.preventDefault();
      if(!timeMatterId) return;
      const matter = state.matters.find(m => m.id === timeMatterId);
      if(!matter) return;
      const hours = Number(document.getElementById('entryHours').value || 0);
      if(hours <= 0) return;
      matter.timeEntries = matter.timeEntries || [];
      matter.timeEntries.unshift({
        id: crypto.randomUUID(),
        date: document.getElementById('entryDate').value || new Date().toISOString().slice(0,10),
        hours,
        description: document.getElementById('entryDescription').value.trim()
      });
      saveState();
      renderAll();
      closeTimeModal();
    }

    document.getElementById('newMatterBtn').addEventListener('click', () => openMatterModal());
    document.getElementById('closeModalBtn').addEventListener('click', closeMatterModal);
    document.getElementById('cancelModalBtn').addEventListener('click', closeMatterModal);
    document.getElementById('matterForm').addEventListener('submit', upsertMatter);
    els.deleteMatterBtn.addEventListener('click', deleteMatter);

    document.getElementById('closeTimeModalBtn').addEventListener('click', closeTimeModal);
    document.getElementById('cancelTimeModalBtn').addEventListener('click', closeTimeModal);
    document.getElementById('timeForm').addEventListener('submit', saveTimeEntry);

    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', () => els.importFile.click());
    els.importFile.addEventListener('change', e => importData(e.target.files[0]));
    document.getElementById('resetBtn').addEventListener('click', resetDemoData);

    els.searchInput.addEventListener('input', renderMatterList);
    els.statusFilter.addEventListener('change', renderMatterList);
    els.urgencyFilter.addEventListener('change', renderMatterList);
    els.practiceFilter.addEventListener('change', renderMatterList);
    document.getElementById('clearFiltersBtn').addEventListener('click', clearFilters);

    els.matterModal.addEventListener('click', (e) => { if(e.target === els.matterModal) closeMatterModal(); });
    els.timeModal.addEventListener('click', (e) => { if(e.target === els.timeModal) closeTimeModal(); });

    window.selectMatter = selectMatter;
    window.openMatterModal = openMatterModal;
    window.cycleStatus = cycleStatus;
    window.openTimeModal = openTimeModal;
    window.setPracticeFilter = setPracticeFilter;

    // --- Three.js ---
    let scene, camera, renderer, starField, coreMesh;
    let orbitNodes = [];

    function initThree(){
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 4, 22);

      renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('bg'),
        antialias:true,
        alpha:true
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);

      const coreGeo = new THREE.IcosahedronGeometry(3, 1);
      const coreMat = new THREE.MeshBasicMaterial({ color:0x10b981, wireframe:true, transparent:true, opacity:.68 });
      coreMesh = new THREE.Mesh(coreGeo, coreMat);
      scene.add(coreMesh);

      const glowGeo = new THREE.SphereGeometry(3.6, 24, 24);
      const glowMat = new THREE.MeshBasicMaterial({ color:0x10b981, transparent:true, opacity:.06 });
      scene.add(new THREE.Mesh(glowGeo, glowMat));

      const starGeo = new THREE.BufferGeometry();
      const count = 1500;
      const positions = new Float32Array(count * 3);
      for(let i=0; i<count*3; i++){
        positions[i] = (Math.random() - 0.5) * 120;
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const starMat = new THREE.PointsMaterial({ color:0x9fffe5, size:.05, transparent:true, opacity:.34 });
      starField = new THREE.Points(starGeo, starMat);
      scene.add(starField);

      rebuildOrbit();
      animate();
    }

    function clearOrbit(){
      orbitNodes.forEach(item => {
        scene.remove(item.group);
        item.group.traverse(obj => {
          if(obj.geometry) obj.geometry.dispose?.();
          if(obj.material) obj.material.dispose?.();
        });
      });
      orbitNodes = [];
    }

    function rebuildOrbit(){
      if(!scene) return;
      clearOrbit();
      const matters = state.matters.slice(0, 10);
      matters.forEach((matter, index) => {
        const group = new THREE.Group();
        const radius = 5.4 + (matter.urgency * 2.25) + (index * 0.3);
        const color = matter.urgency === 3 ? 0xfb7185 : matter.urgency === 2 ? 0xf59e0b : 0x10b981;

        const torusGeo = new THREE.TorusGeometry(radius, 0.014, 10, 120);
        const torusMat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:.1 });
        const orbit = new THREE.Mesh(torusGeo, torusMat);
        orbit.rotation.x = Math.PI / 2;
        group.add(orbit);

        const nodeGeo = matter.urgency === 3 ? new THREE.TetrahedronGeometry(.4) : new THREE.BoxGeometry(.38,.38,.38);
        const nodeMat = new THREE.MeshBasicMaterial({ color, wireframe:true });
        const node = new THREE.Mesh(nodeGeo, nodeMat);
        group.add(node);

        scene.add(group);
        orbitNodes.push({
          group,
          node,
          radius,
          speed: 0.12 + (matter.urgency * 0.04),
          vertical: 0.45 + (index % 3) * 0.12,
          phase: index * 1.4 + Math.random()
        });
      });
    }

    function animate(){
      requestAnimationFrame(animate);
      const time = performance.now() * 0.0005;
      if(coreMesh){
        coreMesh.rotation.x += 0.0028;
        coreMesh.rotation.y += 0.0034;
        const pulse = 1 + Math.sin(time * 4) * 0.03;
        coreMesh.scale.set(pulse, pulse, pulse);
      }
      if(starField) starField.rotation.y += 0.00014;

      orbitNodes.forEach(item => {
        const angle = time * item.speed * 12 + item.phase;
        item.node.position.x = Math.cos(angle) * item.radius;
        item.node.position.z = Math.sin(angle) * item.radius;
        item.node.position.y = Math.sin(angle * 1.2) * item.vertical;
        item.node.rotation.x += 0.018;
        item.node.rotation.y += 0.018;
      });

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      if(!camera || !renderer) return;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.getElementById('refreshOrbitBtn').addEventListener('click', rebuildOrbit);

    renderAll();
    initThree();
  </script>
</body>
</html>
