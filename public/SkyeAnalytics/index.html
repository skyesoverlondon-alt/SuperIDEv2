<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkyeAnalytics Platform</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
:root{--bg:#060d13;--panel:#09151d;--line:rgba(44,230,255,.32);--text:#eff9ff;--muted:#9eb8c8;--gold:#ffcb47}*{box-sizing:border-box}
body{margin:0;font-family:"Space Grotesk",sans-serif;background:radial-gradient(circle at 10% 0,rgba(44,230,255,.16),transparent 36%),radial-gradient(circle at 88% 2%,rgba(255,203,71,.14),transparent 42%),linear-gradient(155deg,#060d13,#0d1d27);color:var(--text)}
.wrap{max-width:1200px;margin:0 auto;padding:14px;display:grid;gap:12px}.card{border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,rgba(8,18,24,.94),rgba(7,14,20,.9));padding:12px;box-shadow:0 10px 28px rgba(0,0,0,.28)}
.row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}input,button{width:100%;border:1px solid rgba(191,238,255,.22);border-radius:10px;background:rgba(0,0,0,.34);color:var(--text);padding:9px 10px}button{cursor:pointer;background:rgba(44,230,255,.12);border-color:var(--line)}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.kpi{border:1px solid rgba(191,238,255,.22);border-radius:10px;padding:10px;background:rgba(255,255,255,.03)}.kpi strong{font-size:1.3rem;color:var(--gold)}
.item{border:1px solid rgba(191,238,255,.22);border-radius:10px;padding:9px;margin-top:8px;background:rgba(255,255,255,.03)}.muted{color:var(--muted);font-size:.84rem}
@media (max-width:900px){.row,.kpis{grid-template-columns:1fr 1fr}}
</style></head><body><div class="wrap">
<section class="card"><h1 style="margin:0;font-family:'Orbitron',sans-serif;letter-spacing:.09em;text-transform:uppercase">SkyeAnalytics Command Surface</h1><div class="muted">Standalone telemetry dashboard across chat, mail, tasks, and workspace activity.</div><div style="margin-top:8px"><a href="/index.html?app=SkyeAnalytics">Return to IDE</a></div></section>
<section class="card">
<div class="row"><input id="email" placeholder="email"/><input id="password" type="password" placeholder="password"/><input id="org" value="SkyeAnalytics Org"/><button id="login">Login or Signup</button></div>
<div class="row" style="margin-top:8px"><input id="ws" placeholder="workspace"/><button id="refresh">Refresh Metrics</button><div></div><div></div></div><div class="muted" id="status">Ready.</div>
</section>
<section class="card"><div class="kpis" id="kpis"></div></section>
<section class="card"><h3 style="margin:0 0 6px">Recent Records</h3><div id="recent"></div></section>
</div>
<script>
const qs=new URLSearchParams(location.search);document.getElementById('ws').value=qs.get('ws_id')||'primary-workspace';const status=document.getElementById('status');
function setStatus(t){status.textContent=t}
async function call(path,opt={}){const r=await fetch(path,{credentials:'include',...opt});const t=await r.text();let d={};try{d=t?JSON.parse(t):{}}catch{d={raw:t}}if(!r.ok)throw new Error(d.error||path+' failed ('+r.status+')');return d}
async function auth(){const email=document.getElementById('email').value.trim();const password=document.getElementById('password').value;const org=document.getElementById('org').value.trim()||'SkyeAnalytics Org';if(!email||!password)throw new Error('email/password required');try{await call('/api/auth-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})})}catch{const signup=await call('/api/auth-signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password,orgName:org})});if(signup?.kaixu_token?.token){localStorage.setItem('kx.api.accessToken',signup.kaixu_token.token);localStorage.setItem('kx.api.tokenEmail',signup.kaixu_token.locked_email||email.toLowerCase())}}}
async function refresh(){
  await auth();
  const ws=document.getElementById('ws').value.trim();
  const [chat,mail,tasks,notes,forms,vault,cal,events] = await Promise.all([
    call('/api/skychat-list?limit=20&channel=general').catch(()=>({records:[]})),
    call('/api/skymail-list?limit=20').catch(()=>({records:[]})),
    call('/api/skyetasks-list?ws_id='+encodeURIComponent(ws)+'&limit=1').catch(()=>({records:[]})),
    call('/api/app-record-list?ws_id='+encodeURIComponent(ws)+'&app=SkyeNotes&limit=1').catch(()=>({records:[]})),
    call('/api/app-record-list?ws_id='+encodeURIComponent(ws)+'&app=SkyeForms&limit=1').catch(()=>({records:[]})),
    call('/api/app-record-list?ws_id='+encodeURIComponent(ws)+'&app=SkyeVault&limit=1').catch(()=>({records:[]})),
    call('/api/app-record-list?ws_id='+encodeURIComponent(ws)+'&app=SkyeCalendar&limit=1').catch(()=>({records:[]})),
    call('/api/sknore-events?ws_id='+encodeURIComponent(ws)+'&limit=20').catch(()=>({events:[]})),
  ]);
  const taskRows = Array.isArray(tasks.records) && tasks.records[0] && Array.isArray(tasks.records[0].payload) ? tasks.records[0].payload : [];
  const notesRows = Array.isArray(notes.records) && notes.records[0] && notes.records[0].payload && Array.isArray(notes.records[0].payload.notes) ? notes.records[0].payload.notes : [];
  const formRows = Array.isArray(forms.records) && forms.records[0] && forms.records[0].payload && Array.isArray(forms.records[0].payload.questions) ? forms.records[0].payload.questions : [];
  const vaultRows = Array.isArray(vault.records) && vault.records[0] && vault.records[0].payload && Array.isArray(vault.records[0].payload.secrets) ? vault.records[0].payload.secrets : [];
  const calRows = Array.isArray(cal.records) && cal.records[0] && cal.records[0].payload && Array.isArray(cal.records[0].payload.events) ? cal.records[0].payload.events : [];
  const kpis = [
    ['Chat Messages', Array.isArray(chat.records)?chat.records.length:0],
    ['Mail Records', Array.isArray(mail.records)?mail.records.length:0],
    ['Open Tasks', taskRows.filter(t=>t.status!=='done').length],
    ['Calendar Events', calRows.length],
    ['Notes', notesRows.length],
    ['Form Questions', formRows.length],
    ['Vault Secrets', vaultRows.length],
    ['SKNore Blocks', Array.isArray(events.events)?events.events.length:0],
  ];
  const k = document.getElementById('kpis'); k.innerHTML='';
  kpis.forEach(([label,val])=>{const el=document.createElement('div');el.className='kpi';el.innerHTML='<div>'+label+'</div><strong>'+val+'</strong>';k.appendChild(el);});
  const recent=[...(chat.records||[]),...(mail.records||[])].slice(0,10);
  const r=document.getElementById('recent');r.innerHTML='';
  recent.forEach(x=>{const item=document.createElement('div');item.className='item';item.innerHTML='<strong>'+ (x.app||'record') +'</strong><div class="muted">'+(x.title||'n/a')+'</div>';r.appendChild(item);});
  setStatus('Metrics refreshed.');
}

document.getElementById('login').onclick=()=>auth().then(()=>setStatus('Session ready.')).catch(e=>setStatus(e.message));
document.getElementById('refresh').onclick=()=>refresh().catch(e=>setStatus(e.message));
</script></body></html>
