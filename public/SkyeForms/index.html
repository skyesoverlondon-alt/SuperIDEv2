<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyeForms Platform</title>
  <script src="/_shared/auth-unlock.js"></script>
  <script src="/_shared/standalone-session.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
    :root { --bg:#060d13; --bg2:#0d1d27; --line:rgba(44,230,255,.34); --line2:rgba(191,238,255,.2); --text:#f6fbff; --muted:#9ab6c4; --gold:#ffcb47; }
    *{box-sizing:border-box;} body{margin:0;color:var(--text);font-family:"Space Grotesk",sans-serif;background:radial-gradient(circle at 86% 0, rgba(255,203,71,.15), transparent 40%), linear-gradient(155deg,var(--bg),var(--bg2));}
    .shell{max-width:1150px;margin:0 auto;padding:16px;display:grid;gap:12px;} .topbar,.card{border:1px solid var(--line);border-radius:14px;background:rgba(7,15,21,.9);} .topbar{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
    .brand{font-family:"Orbitron",sans-serif;text-transform:uppercase;letter-spacing:.09em;} .muted{color:var(--muted);font-size:.82rem;} .chip{border:1px solid rgba(255,203,71,.42);border-radius:999px;padding:5px 10px;color:#ffe6a5;background:rgba(255,203,71,.08);font-size:.74rem;}
    .card{padding:12px;display:grid;gap:10px;} .row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;} .row.two{grid-template-columns:1fr 1fr;}
    input,select,button,textarea{width:100%;border:1px solid var(--line2);border-radius:10px;background:rgba(0,0,0,.34);color:var(--text);padding:9px 10px;font:inherit;} button{cursor:pointer;border-color:var(--line);background:rgba(44,230,255,.12);} button.primary{background:linear-gradient(135deg, rgba(255,203,71,.9), rgba(44,230,255,.78));color:#03131a;font-weight:700;border-color:rgba(255,203,71,.5);} .item{border:1px solid var(--line2);border-radius:12px;padding:10px;background:rgba(255,255,255,.03);margin-top:8px;}
    .diag{border:1px solid var(--line2);border-radius:10px;padding:8px;color:var(--muted);font-size:.8rem;}
    a{color:#d8f7ff;} @media (max-width:900px){.row{grid-template-columns:1fr 1fr;}.row.two{grid-template-columns:1fr;}} @media (max-width:560px){.row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="shell">
  <section class="topbar">
    <div>
      <div class="brand">SkyeForms Command Surface</div>
      <div class="muted">Standalone form schema builder with persistent app model storage.</div>
      <div class="muted"><a href="/index.html?app=SkyeForms">Return to IDE</a></div>
    </div>
    <div class="chip" id="meta">ws_id=primary-workspace</div>
  </section>

  <section class="card">
    <div class="row">
      <input id="email" placeholder="email"/><input id="password" type="password" placeholder="password"/><input id="org" value="SkyeForms Org"/><button id="login">Login or Signup</button>
    </div>
    <div class="row">
      <input id="ws" placeholder="workspace"/><input id="prompt" placeholder="Question prompt"/>
      <select id="type"><option>short_text</option><option>long_text</option><option>select</option></select>
      <button class="primary" id="add">Add Question</button>
    </div>
    <div class="row two"><button id="load">Load</button><button id="save">Save</button></div>
    <div class="row two"><button id="routeResponses">Route Responses</button><button id="exportArchive">Export Certified Archive</button></div>
    <div class="diag" id="logicDiagnostics">Conditional logic diagnostics pending.</div>
    <div class="diag" id="abuseDiagnostics">Anti-abuse heuristics pending.</div>
    <div class="diag" id="versionDiagnostics">Form versioning initialized.</div>
    <div class="muted" id="status">Ready.</div>
  </section>

  <section class="card" id="list"></section>
</div>
<script>
const qs=new URLSearchParams(location.search);document.getElementById('ws').value=qs.get('ws_id')||'primary-workspace';document.getElementById('meta').textContent=`ws_id=${document.getElementById('ws').value}`;
let questions=[];const status=document.getElementById('status');function setStatus(t){status.textContent=t}
const logicDiagnostics=document.getElementById('logicDiagnostics');
const abuseDiagnostics=document.getElementById('abuseDiagnostics');
const versionDiagnostics=document.getElementById('versionDiagnostics');
let formVersions=[];
async function call(path,opt={}){if(window.SkyeStandaloneSession?.request)return window.SkyeStandaloneSession.request(path,opt,{appId:'skyeforms',prompt:false});const r=await fetch(path,{credentials:'include',...opt});const t=await r.text();let d={};try{d=t?JSON.parse(t):{}}catch{d={raw:t}}if(!r.ok)throw new Error(d.error||path+' failed ('+r.status+')');return d}
async function auth(){const email=document.getElementById('email').value.trim();const password=document.getElementById('password').value;const org=document.getElementById('org').value.trim()||'SkyeForms Org';if(window.SkyeStandaloneSession?.ensureSignedIn)return window.SkyeStandaloneSession.ensureSignedIn({appId:'skyeforms',email,password,orgName:org,labelPrefix:'skyeforms'});if(!email||!password)throw new Error('email/password required')}
async function load(){await auth();const ws=document.getElementById('ws').value.trim();const d=await call('/api/app-record-list?ws_id='+encodeURIComponent(ws)+'&app=SkyeForms&limit=1');questions=Array.isArray(d.records)&&d.records[0]&&d.records[0].payload&&Array.isArray(d.records[0].payload.questions)?d.records[0].payload.questions:[];render();setStatus('Loaded forms model.')}
async function save(){await auth();const ws=document.getElementById('ws').value.trim();await call('/api/app-record-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ws_id:ws,app:'SkyeForms',title:'SkyeForms Questions',model:{questions}})});setStatus('Saved forms model.')}
function snapshotVersion(reason){
  formVersions.unshift({
    id:'ver-'+Date.now(),
    at:new Date().toISOString(),
    reason,
    questions:JSON.parse(JSON.stringify(questions)),
  });
  formVersions=formVersions.slice(0,20);
  versionDiagnostics.textContent=`Form versioning: ${formVersions.length} snapshot(s) available. Latest reason=${reason}`;
}
function rollbackLatest(){
  if(!formVersions.length){setStatus('No form version to rollback.');return;}
  const prev=formVersions[0];
  questions=JSON.parse(JSON.stringify(prev.questions));
  setStatus(`Rolled back to ${prev.id}`);
  render();
}
function add(){const p=document.getElementById('prompt').value.trim();if(!p)return setStatus('prompt required');snapshotVersion('before-add-question');questions.unshift({id:'form-'+Date.now(),prompt:p,type:document.getElementById('type').value,required:false,owner:'owner',condition:{depends_on:'',equals:''},response_route:'ops-queue'});document.getElementById('prompt').value='';render()}
function runAntiAbuse(){
  const issues=[];
  questions.forEach((q,idx)=>{
    const prompt=String(q.prompt||'');
    if(prompt.length>180) issues.push(`q${idx+1}: prompt too long`);
    if(/(password|ssn|credit card|secret)/i.test(prompt)) issues.push(`q${idx+1}: sensitive prompt keyword`);
    if(/(.)\1{5,}/.test(prompt)) issues.push(`q${idx+1}: repeated character pattern`);
  });
  abuseDiagnostics.textContent=issues.length?`Anti-abuse findings: ${issues.join(' | ')}`:'Anti-abuse findings: no obvious abuse patterns.';
}
function routeResponses(){
  let highRisk=0;
  questions=questions.map((q)=>{
    const sensitive=/(password|ssn|secret|token)/i.test(String(q.prompt||''));
    if(sensitive) highRisk+=1;
    return {...q,response_route:sensitive?'security-review':'ops-queue'};
  });
  setStatus(`Response routing complete. security-review=${highRisk}, ops-queue=${questions.length-highRisk}`);
  render();
}
function exportCertifiedArchive(){
  const payload={
    app:'SkyeForms',
    ws_id:document.getElementById('ws').value.trim(),
    exported_at:new Date().toISOString(),
    questions,
    cert_hash:'cert-'+Math.abs(JSON.stringify(questions).split('').reduce((a,ch)=>((a<<5)-a)+ch.charCodeAt(0),0)),
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const link=document.createElement('a');
  link.href=URL.createObjectURL(blob);
  link.download='skyeforms-certified-response-archive.json';
  link.click();
  setStatus('Certified response archive exported.');
}
function renderDiagnostics(){
  const ids = new Set(questions.map((q)=>q.id));
  const issues=[];
  questions.forEach((q)=>{
    if(q.condition?.depends_on && !ids.has(q.condition.depends_on)) issues.push(`Missing dependency target for ${q.prompt}`);
    if(q.condition?.depends_on===q.id) issues.push(`Self dependency found in ${q.prompt}`);
  });
  logicDiagnostics.textContent = issues.length ? `Logic diagnostics: ${issues.join(' | ')}` : 'Logic diagnostics: no conditional wiring conflicts.';
}
function render(){const list=document.getElementById('list');list.innerHTML='';questions.forEach(q=>{const item=document.createElement('div');item.className='item';item.innerHTML='<strong>'+q.prompt+'</strong><div class="muted">type='+q.type+'</div>';const row=document.createElement('div');row.className='row two';row.style.marginTop='8px';const sel=document.createElement('select');['short_text','long_text','select'].forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;if(t===q.type)o.selected=true;sel.appendChild(o)});sel.onchange=()=>{questions=questions.map(x=>x.id===q.id?{...x,type:sel.value}:x)};const req=document.createElement('button');req.textContent=q.required?'Required':'Optional';req.onclick=()=>{questions=questions.map(x=>x.id===q.id?{...x,required:!x.required}:x);render()};row.appendChild(sel);row.appendChild(req);item.appendChild(row);
const route=document.createElement('div');route.className='muted';route.style.marginTop='6px';route.textContent='route='+(q.response_route||'ops-queue');item.appendChild(route);
const condRow=document.createElement('div');condRow.className='row two';condRow.style.marginTop='8px';
const dep=document.createElement('select');const none=document.createElement('option');none.value='';none.textContent='condition: always visible';dep.appendChild(none);questions.filter(x=>x.id!==q.id).forEach((x)=>{const o=document.createElement('option');o.value=x.id;o.textContent='depends on: '+x.prompt.slice(0,28);if((q.condition?.depends_on||'')===x.id)o.selected=true;dep.appendChild(o)});
dep.onchange=()=>{questions=questions.map(x=>x.id===q.id?{...x,condition:{...(x.condition||{}),depends_on:dep.value}}:x);render();};
const eq=document.createElement('input');eq.placeholder='show when answer equals...';eq.value=q.condition?.equals||'';eq.onchange=()=>{questions=questions.map(x=>x.id===q.id?{...x,condition:{...(x.condition||{}),equals:eq.value}}:x);renderDiagnostics();};
condRow.appendChild(dep);condRow.appendChild(eq);item.appendChild(condRow);
list.appendChild(item);});renderDiagnostics();}
document.getElementById('login').onclick=()=>auth().then(()=>setStatus('Session ready.')).catch(e=>setStatus(e.message));document.getElementById('load').onclick=()=>load().catch(e=>setStatus(e.message));document.getElementById('save').onclick=()=>save().catch(e=>setStatus(e.message));document.getElementById('add').onclick=add;render();
document.getElementById('routeResponses').onclick=routeResponses;
document.getElementById('exportArchive').onclick=exportCertifiedArchive;
document.getElementById('save').onclick=()=>{snapshotVersion('manual-save');save().catch(e=>setStatus(e.message));};
document.getElementById('add').ondblclick=rollbackLatest;
document.getElementById('prompt').addEventListener('blur',runAntiAbuse);
</script>
<button id="skye-tutorial-fab" type="button" style="position:fixed;right:16px;bottom:16px;z-index:10000;padding:10px 14px;border-radius:999px;border:1px solid rgba(191,238,255,.42);background:rgba(44,230,255,.2);color:#eff9ff;font-weight:700;cursor:pointer;">Start Tutorial</button>
<div id="skye-tutorial-modal" style="display:none;position:fixed;inset:0;z-index:10001;background:rgba(2,6,23,.72);"></div>
<script>
(function(){
  const fab=document.getElementById('skye-tutorial-fab');
  const modal=document.getElementById('skye-tutorial-modal');
  if(!fab||!modal) return;
  const app=(document.title||'App').replace(/Standalone|Workspace|Command Surface|Platform/gi,'').trim();
  modal.innerHTML='<div style="max-width:520px;margin:10vh auto;background:#07131a;color:#eff9ff;border:1px solid rgba(191,238,255,.32);border-radius:14px;padding:18px"><h3 style="margin:0 0 8px">'+app+' Quick Start</h3><ol style="margin:0 0 12px 18px;line-height:1.5"><li>Review auth and active workspace context.</li><li>Run one core workflow action in this app.</li><li>Save/export/share output and verify completion state.</li></ol><div style="display:flex;justify-content:flex-end"><button id="skye-tutorial-close" type="button" style="padding:8px 12px;border-radius:10px;border:1px solid rgba(191,238,255,.32);background:rgba(0,0,0,.34);color:#eff9ff;cursor:pointer;">Close</button></div></div>';
  fab.addEventListener('click',()=>{modal.style.display='block';});
  modal.addEventListener('click',(e)=>{if(e.target===modal||e.target.id==='skye-tutorial-close') modal.style.display='none';});
})();
</script>
</body>
</html>
