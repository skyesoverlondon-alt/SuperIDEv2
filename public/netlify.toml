[build]
  publish = "."
  command = "echo 'no build'"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/intake"
  to = "/.netlify/functions/intake"
  status = 200

[[redirects]]
  from = "/api/admin/login"
  to = "/.netlify/functions/admin-login"
  status = 200

[[redirects]]
  from = "/api/admin/submissions"
  to = "/.netlify/functions/admin-submissions"
  status = 200

[[redirects]]
  from = "/api/admin/submission/*"
  to = "/.netlify/functions/admin-submission/:splat"
  status = 200

[[redirects]]
  from = "/api/admin/export"
  to = "/.netlify/functions/admin-export"
  status = 200

[[redirects]]
  from = "/api/admin/file/*"
  to = "/.netlify/functions/admin-file/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
