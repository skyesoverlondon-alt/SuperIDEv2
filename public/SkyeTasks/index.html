<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyeTasks Platform</title>
  <script src="/_shared/correlation.js"></script>
  <script src="/_shared/auth-unlock.js"></script>
  <script src="/_shared/standalone-session.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
    :root { --bg:#060d13; --panel:#09151d; --line:rgba(44,230,255,.32); --text:#eefbff; --muted:#9db8c8; }
    *{box-sizing:border-box} body{margin:0;font-family:"Space Grotesk",sans-serif;background:radial-gradient(circle at 20% 0, rgba(44,230,255,.15), transparent 35%), radial-gradient(circle at 94% 6%, rgba(255,203,71,.14), transparent 42%), linear-gradient(155deg,#060d13,#0d1d27);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:14px;display:grid;gap:12px}
    .card{border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg, rgba(8,18,24,.94), rgba(7,14,20,.9));padding:12px;box-shadow:0 10px 28px rgba(0,0,0,.28)}
    .row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    input,select,button{width:100%;padding:9px 10px;border:1px solid rgba(191,238,255,.22);border-radius:10px;background:rgba(0,0,0,.34);color:var(--text)}
    button{cursor:pointer;background:rgba(44,230,255,.12);border-color:var(--line)}
    .board{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .col{border:1px solid rgba(191,238,255,.22);border-radius:10px;padding:10px;background:rgba(255,255,255,.03)}
    .item{border:1px solid rgba(191,238,255,.22);border-radius:10px;padding:8px;margin-top:8px;background:rgba(255,255,255,.03)}
    .muted{color:var(--muted);font-size:.84rem}
    .insights{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .insight{border:1px solid rgba(191,238,255,.22);border-radius:10px;padding:10px;background:rgba(255,255,255,.03);min-height:130px}
    .insight h3{margin:0 0 8px 0;font-size:.8rem;letter-spacing:.06em;text-transform:uppercase}
    .line{font-size:.78rem;margin-bottom:6px}
    .line.warn{color:#ffb6b6}
    .line.ok{color:#bff0c8}
    @media (max-width: 900px){ .row{grid-template-columns:1fr 1fr;} .board{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <h1 style="margin:0;font-family:'Orbitron',sans-serif;letter-spacing:.09em;text-transform:uppercase">SkyeTasks Command Surface</h1>
      <div class="muted">Task board with due dates auto-consumed by SkyeCalendar.</div>
      <div style="margin-top:8px"><a href="/index.html?app=SkyeTasks">Return to IDE</a></div>
    </section>

    <section class="card">
      <div class="row">
        <input id="email" placeholder="email@company.com" />
        <input id="password" type="password" placeholder="password" />
        <input id="org" value="SkyeTasks Org" placeholder="Org" />
        <button id="login">Login or Signup</button>
      </div>
      <div class="row" style="margin-top:8px;grid-template-columns: 1fr 1fr 1fr 1fr;">
        <input id="ws" placeholder="Workspace ID" />
        <input id="title" placeholder="Task title" />
        <input id="assignee" placeholder="Assignee" />
        <button id="add">Add Task</button>
      </div>
      <div class="row" style="margin-top:8px;grid-template-columns:1fr 1fr 1fr 1fr;">
        <select id="priority"><option>low</option><option selected>medium</option><option>high</option></select>
        <input id="due" type="date" />
        <button id="load">Load</button>
        <button id="save">Save</button>
      </div>
      <div class="row" style="margin-top:8px;grid-template-columns:1fr 1fr 1fr 1fr;">
        <input id="dependsOn" placeholder="Depends on task id" />
        <input id="blockedReason" placeholder="Blocked reason (optional)" />
        <input id="escalationChannel" placeholder="Escalation channel" value="task-escalations" />
        <button id="escalateBlocked">Escalate Blocked</button>
      </div>
      <div class="row" style="margin-top:8px;grid-template-columns:1fr 1fr 1fr 1fr;">
        <select id="slaTemplate">
          <option value="sev2" selected>sev2 - standard breach</option>
          <option value="sev1">sev1 - customer impact</option>
          <option value="sev0">sev0 - executive critical</option>
        </select>
        <input id="slaRouteChannel" placeholder="SLA route channel" value="task-sla-routing" />
        <select id="defaultQualityTemplate">
          <option value="light" selected>quality: light</option>
          <option value="standard">quality: standard</option>
          <option value="strict">quality: strict</option>
        </select>
        <button id="routeSla">Route SLA Breaches</button>
      </div>
      <div class="muted" id="status">Ready.</div>
    </section>

    <section class="card board" id="board"></section>
    <section class="card insights">
      <div class="insight">
        <h3>Dependency Graph</h3>
        <div id="dependencyGraph" class="muted">No dependency links yet.</div>
      </div>
      <div class="insight">
        <h3>Workload Balancer</h3>
        <div id="workloadSuggestions" class="muted">No workload suggestions yet.</div>
      </div>
      <div class="insight">
        <h3>Completion Quality</h3>
        <div id="qualityPanel" class="muted">No completion quality data yet.</div>
      </div>
    </section>
  </div>

<script>
const qs = new URLSearchParams(location.search);
document.getElementById('ws').value = qs.get('ws_id') || 'primary-workspace';
let model = [];
const statusEl = document.getElementById('status');
function setStatus(t){ statusEl.textContent = t; }
const SLA_TEMPLATES = {
  sev2: 'Standard breach route: notify team lead and shift board within 24h.',
  sev1: 'Customer-impact breach route: notify manager, add incident channel, rebalance assignees now.',
  sev0: 'Executive-critical route: notify leadership, freeze non-critical backlog, initiate hourly review cadence.'
};

function getAccessAuthHeaders(){
  if (window.SkyeStandaloneSession?.authHeaders) return window.SkyeStandaloneSession.authHeaders('skyetasks');
  const token = (window.SkyeAuthUnlock?.readToken?.() || '').trim();
  const email = (window.SkyeAuthUnlock?.readTokenEmail?.() || '').trim().toLowerCase();
  const corr = window.SkyeCorrelation?.nextId?.('skyetasks') || window.SkyeCorrelation?.next?.('skyetasks') || '';
  const headers = {};
  if (token) headers.Authorization = `Bearer ${token}`;
  if (email) headers['X-Token-Email'] = email;
  if (corr) headers['X-Correlation-Id'] = corr;
  return headers;
}

function mergeAuthHeaders(headers = {}){
  return { ...getAccessAuthHeaders(), ...headers };
}

async function call(path, options={}){
  if (window.SkyeStandaloneSession?.request) {
    return window.SkyeStandaloneSession.request(path, options, { appId:'skyetasks', prompt:false });
  }
  const r = await fetch(path, { credentials:'include', ...options, headers: mergeAuthHeaders(options.headers || {}) });
  const t = await r.text();
  let d={}; try{ d=t?JSON.parse(t):{}; }catch{ d={raw:t}; }
  if(!r.ok) throw new Error(d.error || path + ' failed (' + r.status + ')');
  return d;
}
async function auth(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const org = document.getElementById('org').value.trim() || 'SkyeTasks Org';
  if (window.SkyeStandaloneSession?.ensureSignedIn) {
    return window.SkyeStandaloneSession.ensureSignedIn({ appId:'skyetasks', email, password, orgName:org, labelPrefix:'skyetasks' });
  }
  if(!email || !password) throw new Error('email/password required');
}

async function load(){
  await auth();
  const ws = document.getElementById('ws').value.trim();
  const data = await call('/api/skyetasks-list?ws_id=' + encodeURIComponent(ws) + '&limit=1');
  model = Array.isArray(data.records) && data.records[0] && Array.isArray(data.records[0].payload) ? data.records[0].payload : [];
  render();
  setStatus('Loaded tasks.');
}

async function save(){
  await auth();
  const ws = document.getElementById('ws').value.trim();
  await call('/api/skyetasks-save', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ ws_id: ws, title:'SkyeTasks Board', model })
  });
  setStatus('Saved tasks.');
}

function add(){
  const title = document.getElementById('title').value.trim();
  if(!title) return setStatus('Task title required');
  const defaultQualityTemplate = document.getElementById('defaultQualityTemplate').value;
  model.unshift({
    id: 'task-' + Date.now(), title,
    description:'', status:'backlog', priority:document.getElementById('priority').value,
    assignee: document.getElementById('assignee').value.trim() || 'unassigned',
    due_at: document.getElementById('due').value || '',
    depends_on: document.getElementById('dependsOn').value.trim(),
    blocked_reason: document.getElementById('blockedReason').value.trim(),
    quality_template: defaultQualityTemplate,
    quality_notes: '',
    updated_at: new Date().toISOString()
  });
  document.getElementById('title').value='';
  document.getElementById('dependsOn').value='';
  document.getElementById('blockedReason').value='';
  render();
}

function update(id, patch){ model = model.map(t => t.id === id ? { ...t, ...patch, updated_at:new Date().toISOString() } : t); }

function buildIdempotencyKey(prefix, parts){
  const payload = [prefix].concat(parts || []).join('|');
  let hash = 0;
  for (let i = 0; i < payload.length; i += 1) {
    hash = ((hash << 5) - hash + payload.charCodeAt(i)) | 0;
  }
  return `${prefix}:${Math.abs(hash)}`;
}

async function escalateBlocked(){
  await auth();
  const channel = document.getElementById('escalationChannel').value.trim() || 'task-escalations';
  const blocked = model.filter((task) => String(task.blocked_reason || '').trim());
  if (!blocked.length) return setStatus('No blocked tasks to escalate.');
  const summary = blocked.slice(0, 8).map((task) => `${task.title} (${task.assignee || 'unassigned'}) -> ${task.blocked_reason}`).join(' | ');
  const idempotencyKey = buildIdempotencyKey('skyetasks-escalation', [ws.value.trim(), channel, summary]);
  await call('/api/skychat-notify', {
    method: 'POST',
    headers: { 'Content-Type':'application/json' },
    body: JSON.stringify({ ws_id: ws.value.trim(), channel, message: `Blocked tasks escalation: ${summary}`, source: 'SkyeTasks Escalation', idempotency_key: idempotencyKey })
  });
  setStatus(`Escalated ${blocked.length} blocked task(s) to #${channel}.`);
}

async function routeSlaBreaches(){
  await auth();
  const today = new Date().toISOString().slice(0, 10);
  const breached = model.filter((task) => task.status !== 'done' && task.due_at && String(task.due_at) < today);
  if (!breached.length) return setStatus('No SLA breaches to route.');
  const templateKey = document.getElementById('slaTemplate').value;
  const routeChannel = document.getElementById('slaRouteChannel').value.trim() || 'task-sla-routing';
  const templateText = SLA_TEMPLATES[templateKey] || SLA_TEMPLATES.sev2;
  const summary = breached.slice(0, 8).map((task) => `${task.title} [owner=${task.assignee || 'n/a'} due=${task.due_at}]`).join(' | ');
  const idempotencyKey = buildIdempotencyKey('skyetasks-sla-routing', [document.getElementById('ws').value.trim(), routeChannel, templateKey, summary]);
  await call('/api/skychat-notify', {
    method: 'POST',
    headers: { 'Content-Type':'application/json' },
    body: JSON.stringify({
      ws_id: document.getElementById('ws').value.trim(),
      channel: routeChannel,
      message: `SLA breach routing (${templateKey}): ${templateText} :: ${summary}`,
      source: 'SkyeTasks SLA Router',
      idempotency_key: idempotencyKey
    })
  });
  setStatus(`Routed ${breached.length} SLA breach task(s) via ${templateKey} to #${routeChannel}.`);
}

function traceRootCause(task, taskMap, seen = new Set()) {
  if (!task || !task.depends_on) return null;
  const dep = taskMap.get(task.depends_on);
  if (!dep || seen.has(dep.id)) return null;
  seen.add(dep.id);
  if (String(dep.blocked_reason || '').trim()) return dep;
  return traceRootCause(dep, taskMap, seen);
}

function renderDependencyGraph() {
  const host = document.getElementById('dependencyGraph');
  if (!host) return;
  const taskMap = new Map(model.map((task) => [String(task.id), task]));
  const rows = model.filter((task) => task.depends_on).map((task) => {
    const dep = taskMap.get(String(task.depends_on));
    const root = traceRootCause(task, taskMap);
    return { task, dep, root };
  });
  if (!rows.length) {
    host.className = 'muted';
    host.textContent = 'No dependency links yet.';
    return;
  }
  host.className = '';
  host.innerHTML = rows.slice(0, 12).map(({ task, dep, root }) => {
    const depTitle = dep ? dep.title : 'missing dependency';
    const detail = root ? `root block: ${root.title}` : (dep && dep.blocked_reason ? `root block: ${dep.title}` : 'clear');
    const cls = root || (dep && dep.blocked_reason) ? 'warn' : 'ok';
    return `<div class="line ${cls}"><strong>${task.title}</strong> <= ${depTitle}<br /><span class="muted">${detail}</span></div>`;
  }).join('');
}

function renderWorkloadSuggestions() {
  const host = document.getElementById('workloadSuggestions');
  if (!host) return;
  if (!model.length) {
    host.className = 'muted';
    host.textContent = 'No workload suggestions yet.';
    return;
  }
  const weights = { low: 1, medium: 2, high: 3 };
  const loadByOwner = new Map();
  model.filter((task) => task.status !== 'done').forEach((task) => {
    const owner = String(task.assignee || 'unassigned');
    const next = (loadByOwner.get(owner) || 0) + (weights[task.priority] || 2);
    loadByOwner.set(owner, next);
  });
  const rows = Array.from(loadByOwner.entries()).sort((a, b) => b[1] - a[1]);
  if (!rows.length) {
    host.className = 'muted';
    host.textContent = 'No active workload.';
    return;
  }
  const heavy = rows[0];
  const light = rows[rows.length - 1];
  host.className = '';
  host.innerHTML = rows.slice(0, 8).map(([owner, score]) => (`<div class="line"><strong>${owner}</strong> load=${score}</div>`)).join('') +
    `<div class="line ${heavy[1] - light[1] >= 3 ? 'warn' : 'ok'}"><span class="muted">Suggestion: move one medium/high task from ${heavy[0]} to ${light[0]}.</span></div>`;
}

function renderQualityPanel() {
  const host = document.getElementById('qualityPanel');
  if (!host) return;
  const done = model.filter((task) => task.status === 'done');
  if (!done.length) {
    host.className = 'muted';
    host.textContent = 'No completion quality data yet.';
    return;
  }
  const withTemplate = done.filter((task) => task.quality_template).length;
  const withNotes = done.filter((task) => String(task.quality_notes || '').trim()).length;
  const coverage = Math.round((withTemplate / done.length) * 100);
  const evidence = Math.round((withNotes / done.length) * 100);
  host.className = '';
  host.innerHTML =
    `<div class="line"><strong>Completed:</strong> ${done.length}</div>` +
    `<div class="line"><strong>Template coverage:</strong> ${coverage}%</div>` +
    `<div class="line"><strong>Evidence notes:</strong> ${evidence}%</div>` +
    done.slice(0, 4).map((task) => `<div class="line muted">${task.title} :: ${task.quality_template || 'none'}</div>`).join('');
}

function renderInsights(){
  renderDependencyGraph();
  renderWorkloadSuggestions();
  renderQualityPanel();
}

function render(){
  const cols = ['backlog','doing','done'];
  const board = document.getElementById('board');
  board.innerHTML = '';
  cols.forEach(col => {
    const c = document.createElement('div'); c.className = 'col'; c.innerHTML = '<strong>' + col.toUpperCase() + '</strong>';
    model.filter(t => t.status === col).forEach(t => {
      const item = document.createElement('div'); item.className='item';
      item.innerHTML = '<strong>' + t.title + '</strong><div class="muted">owner=' + (t.assignee||'n/a') + ' priority=' + t.priority + (t.depends_on ? (' depends_on=' + t.depends_on) : '') + '</div>';
      const row = document.createElement('div'); row.className='row'; row.style.gridTemplateColumns='1fr 1fr'; row.style.marginTop='6px';
      const sel = document.createElement('select'); ['backlog','doing','done'].forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; if(s===t.status)o.selected=true; sel.appendChild(o);});
      sel.onchange = () => { update(t.id, { status: sel.value }); render(); };
      const due = document.createElement('input'); due.type='date'; due.value=t.due_at || ''; due.onchange=()=>{ update(t.id,{due_at:due.value}); };
      row.appendChild(sel); row.appendChild(due);
      item.appendChild(row);
      const blocked = document.createElement('input'); blocked.placeholder='Blocked reason'; blocked.value=t.blocked_reason || ''; blocked.style.marginTop='6px';
      blocked.onchange=()=>{ update(t.id,{blocked_reason:blocked.value}); };
      item.appendChild(blocked);
      const qualityRow = document.createElement('div'); qualityRow.className='row'; qualityRow.style.gridTemplateColumns='1fr 1fr'; qualityRow.style.marginTop='6px';
      const qualityTemplate = document.createElement('select');
      ['light','standard','strict'].forEach((tpl) => {
        const o = document.createElement('option');
        o.value = tpl;
        o.textContent = tpl;
        if ((t.quality_template || 'light') === tpl) o.selected = true;
        qualityTemplate.appendChild(o);
      });
      qualityTemplate.onchange = () => { update(t.id, { quality_template: qualityTemplate.value }); renderInsights(); };
      const qualityNotes = document.createElement('input');
      qualityNotes.placeholder = 'Completion quality evidence';
      qualityNotes.value = t.quality_notes || '';
      qualityNotes.onchange = () => { update(t.id, { quality_notes: qualityNotes.value }); renderInsights(); };
      qualityRow.appendChild(qualityTemplate);
      qualityRow.appendChild(qualityNotes);
      item.appendChild(qualityRow);
      c.appendChild(item);
    });
    board.appendChild(c);
  });
  renderInsights();
}

document.getElementById('login').onclick = () => auth().then(()=>setStatus('Session ready.')).catch(e=>setStatus(e.message));
document.getElementById('load').onclick = () => load().catch(e=>setStatus(e.message));
document.getElementById('save').onclick = () => save().catch(e=>setStatus(e.message));
document.getElementById('add').onclick = add;
document.getElementById('escalateBlocked').onclick = () => escalateBlocked().catch(e=>setStatus(e.message));
document.getElementById('routeSla').onclick = () => routeSlaBreaches().catch(e=>setStatus(e.message));
render();
</script>
<button id="skye-tutorial-fab" type="button" style="position:fixed;right:16px;bottom:16px;z-index:10000;padding:10px 14px;border-radius:999px;border:1px solid rgba(191,238,255,.42);background:rgba(44,230,255,.2);color:#eff9ff;font-weight:700;cursor:pointer;">Start Tutorial</button>
<div id="skye-tutorial-modal" style="display:none;position:fixed;inset:0;z-index:10001;background:rgba(2,6,23,.72);"></div>
<script>
(function(){
  const fab=document.getElementById('skye-tutorial-fab');
  const modal=document.getElementById('skye-tutorial-modal');
  if(!fab||!modal) return;
  const app=(document.title||'App').replace(/Standalone|Workspace|Command Surface|Platform/gi,'').trim();
  modal.innerHTML='<div style="max-width:520px;margin:10vh auto;background:#07131a;color:#eff9ff;border:1px solid rgba(191,238,255,.32);border-radius:14px;padding:18px"><h3 style="margin:0 0 8px">'+app+' Quick Start</h3><ol style="margin:0 0 12px 18px;line-height:1.5"><li>Review auth and active workspace context.</li><li>Run one core workflow action in this app.</li><li>Save/export/share output and verify completion state.</li></ol><div style="display:flex;justify-content:flex-end"><button id="skye-tutorial-close" type="button" style="padding:8px 12px;border-radius:10px;border:1px solid rgba(191,238,255,.32);background:rgba(0,0,0,.34);color:#eff9ff;cursor:pointer;">Close</button></div></div>';
  fab.addEventListener('click',()=>{modal.style.display='block';});
  modal.addEventListener('click',(e)=>{if(e.target===modal||e.target.id==='skye-tutorial-close') modal.style.display='none';});
})();
</script>
</body>
</html>
