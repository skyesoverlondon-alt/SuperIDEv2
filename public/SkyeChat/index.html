<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyeChat Workspace</title>
  <script src="/_shared/correlation.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
    :root {
      --bg: #060d13;
      --panel: #09151d;
      --border: rgba(44,230,255,0.32);
      --text: #eff9ff;
      --muted: #9eb8c8;
      --gold: #ffcb47;
      --accent: #2ce6ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Space Grotesk", sans-serif; color: var(--text); background: radial-gradient(circle at 8% 0, rgba(44,230,255,0.16), transparent 36%), radial-gradient(circle at 92% 2%, rgba(255,203,71,0.14), transparent 42%), linear-gradient(155deg, #060d13, #0d1d27); }
    .shell { display: grid; grid-template-rows: 64px 1fr; min-height: 100vh; }
    .top { display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-bottom:1px solid var(--border); background: rgba(3,10,14,0.78); backdrop-filter: blur(10px); }
    .brand { font-family: "Orbitron", sans-serif; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .brand span { color: var(--gold); }
    .top a, .top button { color: var(--text); background: rgba(0,0,0,0.28); border:1px solid rgba(191,238,255,0.24); border-radius:8px; padding:7px 10px; text-decoration:none; cursor:pointer; }
    .main { display:grid; grid-template-columns: 350px 1fr; gap:12px; padding:12px; }
    .card { background: linear-gradient(180deg, rgba(8,18,24,0.94), rgba(7,14,20,0.9)); border:1px solid var(--border); border-radius:12px; padding:12px; box-shadow: 0 10px 28px rgba(0,0,0,0.28); }
    h2 { margin:0 0 10px; font-size:14px; text-transform:uppercase; letter-spacing:.06em; color:var(--gold); }
    label { font-size:11px; text-transform:uppercase; color:var(--muted); display:block; margin:9px 0 5px; }
    input, textarea { width:100%; background:rgba(0,0,0,0.34); color:var(--text); border:1px solid rgba(191,238,255,0.22); border-radius:8px; padding:9px 10px; }
    textarea { min-height:110px; resize:vertical; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    button { background:rgba(44,230,255,0.12); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 10px; cursor:pointer; }
    button.primary { background:linear-gradient(120deg, rgba(44,230,255,0.22), rgba(255,203,71,0.22)); border-color:rgba(44,230,255,0.42); }
    .feed { display:flex; flex-direction:column; gap:8px; max-height:75vh; overflow:auto; }
    .msg { border:1px solid rgba(191,238,255,0.22); border-radius:10px; padding:10px; background: rgba(255,255,255,.03); }
    .meta { color:var(--muted); font-size:12px; margin-top:4px; }
    .status { font-size:12px; color:var(--gold); margin-top:8px; white-space:pre-wrap; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .diag { border:1px solid rgba(191,238,255,0.22); border-radius:10px; padding:8px; color:var(--muted); font-size:11px; margin-top:8px; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="brand">Skye<span>Chat</span> Workspace</div>
      <div style="display:flex;gap:8px;">
        <a href="/index.html">Back to IDE</a>
        <button id="logoutBtn" type="button">Logout</button>
      </div>
    </header>

    <main class="main">
      <section class="card">
        <h2>Account</h2>
        <div class="row">
          <input id="email" placeholder="email@company.com" />
          <input id="orgName" placeholder="Organization" />
        </div>
        <input id="password" type="password" placeholder="Password" style="margin-top:8px;" />
        <div class="actions">
          <button id="signupBtn" type="button">Create Account</button>
          <button id="loginBtn" type="button">Login</button>
          <button id="meBtn" type="button">Refresh Session</button>
        </div>
        <label>kAIxU Access Key</label>
        <input id="apiKey" type="password" placeholder="kx_at_..." />
        <label>Token Email</label>
        <input id="tokenEmail" placeholder="user@company.com" />
        <div class="actions">
          <button id="saveKeyBtn" type="button">Save Key</button>
          <button id="clearKeyBtn" type="button">Clear Key</button>
        </div>

        <h2 style="margin-top:14px;">Chat Profile</h2>
        <label>Display name</label>
        <input id="displayName" placeholder="Display name" />
        <label>Handle</label>
        <input id="handle" placeholder="@handle" />
        <div class="actions">
          <button id="saveProfileBtn" type="button">Save Profile</button>
        </div>

        <h2 style="margin-top:14px;">.skye Package</h2>
        <label>Passphrase (required for secure .skye)</label>
        <input id="skyePassphrase" type="password" placeholder="Enter passphrase" />
        <label>Passphrase hint (optional)</label>
        <input id="skyeHint" placeholder="Never include the real passphrase" />
        <div class="actions">
          <button id="exportSkyeBtn" type="button">Export .skye</button>
          <button id="importSkyeBtn" type="button">Import .skye</button>
        </div>
        <input id="importSkyeInput" type="file" accept=".skye" style="display:none;" />

        <h2 style="margin-top:14px;">Room Composer</h2>
        <label>Channel</label>
        <input id="channel" value="general" />
        <label>Message</label>
        <textarea id="message" placeholder="Message to room"></textarea>
        <div class="actions">
          <button class="primary" id="postBtn" type="button">Post Message</button>
          <button id="kaixuBtn" type="button">Post + Ask kAIxU</button>
          <button id="loadBtn" type="button">Reload Channel</button>
        </div>
        <h2 style="margin-top:14px;">Moderation Controls</h2>
        <div class="row">
          <select id="roomLock">
            <option value="off">Room lock: off</option>
            <option value="on">Room lock: on</option>
          </select>
          <input id="slowMode" type="number" min="0" value="0" placeholder="Slow mode seconds" />
        </div>
        <div class="actions">
          <button id="applyModeration" type="button">Apply Moderation</button>
        </div>
        <div class="status" id="status"></div>
      </section>

      <section class="card">
        <h2>Room Feed</h2>
        <label>Filter channel</label>
        <input id="filterChannel" value="general" />
        <label>Search</label>
        <input id="search" placeholder="search messages or source" />
        <div class="actions">
          <button id="applyFilterBtn" type="button">Apply Filter</button>
        </div>
        <div class="diag" id="healthPanel">Room health panel pending feed load.</div>
        <div class="feed" id="feed"></div>
      </section>
    </main>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const feedEl = document.getElementById('feed');
    const healthPanel = document.getElementById('healthPanel');
    const chatState = { records: [] };
    const moderationState = {
      lock: localStorage.getItem('skyechat.moderation.lock') || 'off',
      slowMode: Number(localStorage.getItem('skyechat.moderation.slow') || 0),
      lastPostAt: 0,
    };
    const query = new URLSearchParams(window.location.search);
    const wsId = query.get('ws_id') || 'primary-workspace';
    const initialChannel = query.get('channel') || 'general';

    document.getElementById('channel').value = initialChannel;
    document.getElementById('filterChannel').value = initialChannel;

    if (query.get('embed') === '1') {
      document.querySelector('.top a').setAttribute('href', `/index.html?app=SkyeChat&ws_id=${encodeURIComponent(wsId)}`);
    }

    function setStatus(text) { statusEl.textContent = text || ''; }

    function buildIdempotencyKey(prefix, parts) {
      const payload = [prefix].concat(parts || []).join('|');
      let hash = 0;
      for (let i = 0; i < payload.length; i += 1) {
        hash = ((hash << 5) - hash + payload.charCodeAt(i)) | 0;
      }
      return `${prefix}:${Math.abs(hash)}`;
    }

    function renderHealthPanel(records) {
      const rows = Array.isArray(records) ? records : [];
      const unresolved = rows.filter((record) => /\?$/.test(String(record?.payload?.message || '').trim())).length;
      const actionItems = rows.filter((record) => /(todo|action|follow up)/i.test(String(record?.payload?.message || ''))).length;
      const channels = new Set(rows.map((record) => String(record?.payload?.channel || '').trim()).filter(Boolean));
      healthPanel.textContent = `Health: messages=${rows.length}, unresolved_questions=${unresolved}, action_items=${actionItems}, active_channels=${channels.size}`;
    }

    function hydrateModerationInputs() {
      document.getElementById('roomLock').value = moderationState.lock;
      document.getElementById('slowMode').value = String(moderationState.slowMode || 0);
    }

    async function applyModeration() {
      moderationState.lock = document.getElementById('roomLock').value;
      moderationState.slowMode = Math.max(0, Number(document.getElementById('slowMode').value || 0));
      localStorage.setItem('skyechat.moderation.lock', moderationState.lock);
      localStorage.setItem('skyechat.moderation.slow', String(moderationState.slowMode));
      const idempotencyKey = buildIdempotencyKey('skyechat-moderation', [wsId, moderationState.lock, String(moderationState.slowMode)]);
      await call('/api/skychat-notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ws_id: wsId,
          channel: document.getElementById('channel').value.trim() || 'general',
          source: 'SkyeChat Moderation',
          message: `Moderation updated: lock=${moderationState.lock}, slow_mode=${moderationState.slowMode}s`,
          idempotency_key: idempotencyKey,
        }),
      });
      setStatus(`Moderation saved: lock=${moderationState.lock}, slow=${moderationState.slowMode}s`);
    }

    function getAccessAuthHeaders() {
      const token = (localStorage.getItem('kx.api.accessToken') || '').trim();
      const email = (localStorage.getItem('kx.api.tokenEmail') || '').trim().toLowerCase();
      const corr = window.SkyeCorrelation && window.SkyeCorrelation.next ? window.SkyeCorrelation.next('skychat') : '';
      const headers = {};
      if (token) headers.Authorization = `Bearer ${token}`;
      if (email) headers['X-Token-Email'] = email;
      if (corr) headers['X-Correlation-Id'] = corr;
      return headers;
    }

    function hydrateAuthInputs() {
      document.getElementById('apiKey').value = localStorage.getItem('kx.api.accessToken') || '';
      document.getElementById('tokenEmail').value = localStorage.getItem('kx.api.tokenEmail') || '';
    }

    function saveAuthInputs() {
      const token = document.getElementById('apiKey').value.trim();
      const email = document.getElementById('tokenEmail').value.trim().toLowerCase();
      localStorage.setItem('kx.api.accessToken', token);
      localStorage.setItem('kx.api.tokenEmail', email);
      setStatus('Saved kAIxU key context for SkyeChat.');
    }

    function clearAuthInputs() {
      localStorage.removeItem('kx.api.accessToken');
      localStorage.removeItem('kx.api.tokenEmail');
      hydrateAuthInputs();
      setStatus('Cleared kAIxU key context.');
    }

    async function call(path, options = {}) {
      const authHeaders = getAccessAuthHeaders();
      const mergedHeaders = { ...(options.headers || {}), ...authHeaders };
      const res = await fetch(path, { credentials: 'include', ...options, headers: mergedHeaders });
      let data = {};
      try { data = await res.json(); } catch {}
      if (!res.ok) throw new Error(data?.error || `${path} failed (${res.status})`);
      return data;
    }

    function bytesToBase64(bytes) {
      let bin = '';
      for (let i = 0; i < bytes.length; i += 1) bin += String.fromCharCode(bytes[i]);
      return btoa(bin);
    }

    function base64ToBytes(value) {
      const bin = atob(value);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i += 1) out[i] = bin.charCodeAt(i);
      return out;
    }

    async function deriveKey(passphrase, saltBytes) {
      const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(passphrase), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: saltBytes, iterations: 120000, hash: 'SHA-256' },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function encryptSkye(plainText, passphrase) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const key = await deriveKey(passphrase, salt);
      const cipherBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plainText));
      return {
        cipher: bytesToBase64(new Uint8Array(cipherBuf)),
        iv: bytesToBase64(iv),
        salt: bytesToBase64(salt),
      };
    }

    async function decryptSkye(block, passphrase) {
      const key = await deriveKey(passphrase, base64ToBytes(block.salt));
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: base64ToBytes(block.iv) }, key, base64ToBytes(block.cipher));
      return new TextDecoder().decode(plain);
    }

    function buildSecureEnvelope(primary, hint) {
      return {
        format: 'skye-secure-v1',
        encrypted: true,
        alg: 'AES-256-GCM',
        kdf: 'PBKDF2-SHA256',
        iterations: 120000,
        exportedAt: new Date().toISOString(),
        hint: hint || '',
        payload: { primary },
      };
    }

    function encodeSecureEnvelope(envelope) {
      const marker = new TextEncoder().encode('SKYESEC1');
      const payload = new TextEncoder().encode(JSON.stringify(envelope));
      return new Blob([marker, new Uint8Array([0]), payload], { type: 'application/octet-stream' });
    }

    async function readSecureEnvelope(file) {
      const bytes = new Uint8Array(await file.arrayBuffer());
      const marker = new TextEncoder().encode('SKYESEC1');
      const hasMarker = bytes.length > marker.length + 1 && marker.every((v, i) => bytes[i] === v) && bytes[marker.length] === 0;
      if (!hasMarker) throw new Error('Invalid .skye file marker.');
      const raw = new TextDecoder().decode(bytes.slice(marker.length + 1));
      const envelope = JSON.parse(raw);
      if (!envelope || envelope.format !== 'skye-secure-v1' || envelope.encrypted !== true) throw new Error('Unsupported .skye envelope.');
      if (envelope.alg !== 'AES-256-GCM' || envelope.kdf !== 'PBKDF2-SHA256' || Number(envelope.iterations) !== 120000) {
        throw new Error('Invalid .skye encryption metadata.');
      }
      if (!envelope.payload || !envelope.payload.primary) throw new Error('Missing encrypted payload.');
      return envelope;
    }

    function collectSkyeState() {
      return {
        meta: {
          app_id: 'SkyeChat',
          app_version: '1.0.0',
          workspace_id: wsId,
          title: 'SkyeChat Workspace Snapshot',
          owner: document.getElementById('email').value || null,
          schema_version: 1,
        },
        state: {
          profile: {
            display_name: document.getElementById('displayName').value,
            handle: document.getElementById('handle').value,
          },
          compose: {
            channel: document.getElementById('channel').value,
            message: document.getElementById('message').value,
          },
          filters: {
            filter_channel: document.getElementById('filterChannel').value,
            search: document.getElementById('search').value,
          },
          feed_records: chatState.records,
        },
        assets: [],
      };
    }

    function applySkyeState(payload) {
      if (!payload?.meta || payload.meta.app_id !== 'SkyeChat') throw new Error('This .skye file is not for SkyeChat.');
      const schemaVersion = Number(payload?.meta?.schema_version || 1);
      if (!Number.isFinite(schemaVersion) || schemaVersion > 1) throw new Error(`Unsupported .skye schema version for SkyeChat: ${schemaVersion}`);
      const s = payload.state || {};
      const p = s.profile || {};
      const compose = s.compose || {};
      const filters = s.filters || {};
      if (typeof p.display_name === 'string') document.getElementById('displayName').value = p.display_name;
      if (typeof p.handle === 'string') document.getElementById('handle').value = p.handle;
      if (typeof compose.channel === 'string') document.getElementById('channel').value = compose.channel;
      if (typeof compose.message === 'string') document.getElementById('message').value = compose.message;
      if (typeof filters.filter_channel === 'string') document.getElementById('filterChannel').value = filters.filter_channel;
      if (typeof filters.search === 'string') document.getElementById('search').value = filters.search;
      if (Array.isArray(s.feed_records)) chatState.records = s.feed_records;
    }

    async function exportSkyeFile() {
      const passphrase = document.getElementById('skyePassphrase').value.trim();
      const hint = document.getElementById('skyeHint').value.trim();
      if (passphrase.length < 6) throw new Error('Passphrase must be at least 6 characters.');
      const payload = collectSkyeState();
      const encrypted = await encryptSkye(JSON.stringify(payload), passphrase);
      const envelope = buildSecureEnvelope(encrypted, hint);
      const blob = encodeSecureEnvelope(envelope);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `SkyeChat-${Date.now()}.skye`;
      a.click();
      URL.revokeObjectURL(a.href);
      setStatus('Exported secure .skye package for SkyeChat.');
    }

    async function importSkyeFile(file) {
      const envelope = await readSecureEnvelope(file);
      const passphrase = prompt(`Enter passphrase to open .skye${envelope.hint ? ` (hint: ${envelope.hint})` : ''}`) || '';
      if (!passphrase.trim()) throw new Error('Passphrase is required.');
      const plain = await decryptSkye(envelope.payload.primary, passphrase.trim());
      const payload = JSON.parse(plain);
      const mode = (prompt('Import mode: type merge or replace', 'merge') || 'merge').trim().toLowerCase();
      applySkyeState(payload);
      if (mode === 'merge') {
        const imported = Array.isArray(payload?.state?.feed_records) ? payload.state.feed_records : [];
        const merged = [...imported, ...chatState.records];
        const unique = [];
        const seen = new Set();
        merged.forEach((item) => {
          const key = JSON.stringify(item);
          if (seen.has(key)) return;
          seen.add(key);
          unique.push(item);
        });
        chatState.records = unique;
      }
      setStatus('Imported secure .skye package for SkyeChat.');
      await loadFeed();
    }

    async function refreshMe() {
      const me = await call('/api/auth-me');
      if (me?.email) {
        document.getElementById('email').value = me.email;
        setStatus(`Signed in as ${me.email}`);
      } else {
        setStatus('Not signed in. Create account or login to use SkyeChat workspace.');
      }
    }

    async function signup() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const orgName = document.getElementById('orgName').value.trim() || 'SkyeChat Org';
      const signup = await call('/api/auth-signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, orgName }),
      });
      if (signup?.kaixu_token?.token) {
        localStorage.setItem('kx.api.accessToken', signup.kaixu_token.token);
        localStorage.setItem('kx.api.tokenEmail', signup.kaixu_token.locked_email || email.toLowerCase());
      }
      await refreshMe();
      await loadProfile();
      await loadFeed();
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      await call('/api/auth-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      await refreshMe();
      await loadProfile();
      await loadFeed();
    }

    async function logout() {
      await call('/api/auth-logout', { method: 'POST' });
      setStatus('Logged out.');
      feedEl.innerHTML = '';
    }

    async function saveProfile() {
      const displayName = document.getElementById('displayName').value.trim();
      const handle = document.getElementById('handle').value.trim();
      await call('/api/app-profile-set', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ app: 'SkyeChat', title: displayName || handle || 'SkyeChat Profile', profile: { display_name: displayName, handle } }),
      });
      setStatus('SkyeChat profile saved.');
    }

    async function loadProfile() {
      const data = await call('/api/app-profile-get?app=SkyeChat');
      const p = data?.profile?.payload || {};
      if (p?.display_name) document.getElementById('displayName').value = p.display_name;
      if (p?.handle) document.getElementById('handle').value = p.handle;
    }

    async function postMessage() {
      if (moderationState.lock === 'on') throw new Error('Room is locked by moderator policy.');
      const now = Date.now();
      if (moderationState.slowMode > 0 && (now - moderationState.lastPostAt) < moderationState.slowMode * 1000) {
        throw new Error(`Slow mode active. Wait ${moderationState.slowMode}s between posts.`);
      }
      const channel = document.getElementById('channel').value.trim();
      const message = document.getElementById('message').value.trim();
      const displayName = document.getElementById('displayName').value.trim() || 'SkyeChat User';
      const idempotencyKey = buildIdempotencyKey('skyechat-post', [wsId, channel, message, displayName]);
      await call('/api/skychat-notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ws_id: wsId, channel, message, source: `SkyeChat Workspace · ${displayName}`, idempotency_key: idempotencyKey }),
      });
      moderationState.lastPostAt = now;
      setStatus(`Posted to #${channel}`);
      await loadFeed();
    }

    async function postWithKaixu() {
      const channel = document.getElementById('channel').value.trim();
      const message = document.getElementById('message').value.trim();
      await call('/api/skychat-kaixu', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ channel, message, ws_id: wsId }),
      });
      setStatus(`Posted + kAIxU response in #${channel}`);
      await loadFeed();
    }

    async function loadFeed() {
      const channel = document.getElementById('filterChannel').value.trim();
      const query = document.getElementById('search').value.trim();
      const qs = new URLSearchParams();
      qs.set('limit', '50');
      if (channel) qs.set('channel', channel);
      if (query) qs.set('q', query);
      const data = await call(`/api/skychat-list?${qs.toString()}`);
      const records = Array.isArray(data?.records) ? data.records : [];
      chatState.records = records;
      renderHealthPanel(records);
      feedEl.innerHTML = records.map((record) => {
        const payload = record?.payload || {};
        const c = payload?.channel || 'general';
        const m = payload?.message || record?.title || '(empty)';
        const s = payload?.source || 'unknown';
        return `<div class="msg"><strong>#${c}</strong><div>${m}</div><div class="meta">source: ${s}</div></div>`;
      }).join('') || '<div class="meta">No messages found.</div>';
    }

    hydrateAuthInputs();

    document.getElementById('signupBtn').onclick = () => signup().catch((e) => setStatus(e.message));
    document.getElementById('loginBtn').onclick = () => login().catch((e) => setStatus(e.message));
    document.getElementById('meBtn').onclick = () => refreshMe().then(loadProfile).catch((e) => setStatus(e.message));
    document.getElementById('saveKeyBtn').onclick = () => saveAuthInputs();
    document.getElementById('clearKeyBtn').onclick = () => clearAuthInputs();
    document.getElementById('saveProfileBtn').onclick = () => saveProfile().catch((e) => setStatus(e.message));
    document.getElementById('postBtn').onclick = () => postMessage().catch((e) => setStatus(e.message));
    document.getElementById('kaixuBtn').onclick = () => postWithKaixu().catch((e) => setStatus(e.message));
    document.getElementById('loadBtn').onclick = () => loadFeed().catch((e) => setStatus(e.message));
    document.getElementById('applyFilterBtn').onclick = () => loadFeed().catch((e) => setStatus(e.message));
    document.getElementById('applyModeration').onclick = () => applyModeration().catch((e) => setStatus(e.message));
    document.getElementById('logoutBtn').onclick = () => logout().catch((e) => setStatus(e.message));
    document.getElementById('exportSkyeBtn').onclick = () => exportSkyeFile().catch((e) => setStatus(e.message));
    document.getElementById('importSkyeBtn').onclick = () => document.getElementById('importSkyeInput').click();
    document.getElementById('importSkyeInput').addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      event.target.value = '';
      if (!file) return;
      importSkyeFile(file).catch((e) => setStatus(e.message));
    });

    hydrateModerationInputs();
    refreshMe().then(loadProfile).then(loadFeed).catch((e) => setStatus(e.message));
  </script>
