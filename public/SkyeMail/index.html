<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyeMail Workspace</title>
    <script src="/_shared/correlation.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
    :root {
      --bg: #060d13;
      --panel: #09151d;
      --panel2: #0e1b24;
      --border: rgba(44,230,255,0.32);
      --text: #eff9ff;
      --muted: #9eb8c8;
      --gold: #ffcb47;
      --accent: #2ce6ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Space Grotesk", sans-serif; color: var(--text); background: radial-gradient(circle at 8% 0, rgba(44,230,255,0.16), transparent 36%), radial-gradient(circle at 92% 2%, rgba(255,203,71,0.14), transparent 42%), linear-gradient(155deg, #060d13, #0d1d27); }
    .shell { display: grid; grid-template-rows: 64px 1fr; min-height: 100vh; }
    .top { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border); background: rgba(3,10,14,0.78); backdrop-filter: blur(10px); }
    .brand { font-family: "Orbitron", sans-serif; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .brand span { color: var(--gold); }
    .top a, .top button { color: var(--text); background: rgba(0,0,0,0.28); border: 1px solid rgba(191,238,255,0.24); border-radius: 8px; padding: 7px 10px; text-decoration: none; cursor: pointer; }
    .main { display: grid; grid-template-columns: 340px 1fr; gap: 12px; padding: 12px; }
    .card { background: linear-gradient(180deg, rgba(8,18,24,0.94), rgba(7,14,20,0.9)); border: 1px solid var(--border); border-radius: 12px; padding: 12px; box-shadow: 0 10px 28px rgba(0,0,0,0.28); }
    h2 { margin: 0 0 10px; font-size: 14px; text-transform: uppercase; color: var(--gold); letter-spacing: .06em; }
    label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); display: block; margin: 10px 0 5px; }
    input, textarea { width: 100%; background: rgba(0,0,0,0.34); color: var(--text); border: 1px solid rgba(191,238,255,0.22); border-radius: 8px; padding: 9px 10px; }
    textarea { min-height: 110px; resize: vertical; }
    .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    button { background: rgba(44,230,255,0.12); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; cursor: pointer; }
    button.primary { background: linear-gradient(120deg, rgba(44,230,255,0.22), rgba(255,203,71,0.22)); border-color: rgba(44,230,255,0.42); }
    .inbox { display: flex; flex-direction: column; gap: 8px; max-height: 72vh; overflow: auto; }
    .item { border: 1px solid rgba(191,238,255,0.22); border-radius: 10px; padding: 10px; background: rgba(255,255,255,0.03); }
    .meta { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .auth { display: grid; gap: 8px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .status { font-size: 12px; color: var(--gold); margin-top: 8px; white-space: pre-wrap; }
    .diag { font-size: 11px; color: var(--muted); border: 1px solid rgba(191,238,255,0.2); border-radius: 8px; padding: 8px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="brand">Skye<span>Mail</span> Workspace</div>
      <div style="display:flex;gap:8px;">
        <a href="/index.html">Back to IDE</a>
        <button id="logoutBtn" type="button">Logout</button>
      </div>
    </header>

    <main class="main">
      <section class="card">
        <h2>Account</h2>
        <div class="auth">
          <div class="row">
            <input id="email" placeholder="email@company.com" />
            <input id="orgName" placeholder="Organization" />
          </div>
          <input id="password" type="password" placeholder="Password" />
          <div class="actions">
            <button id="signupBtn" type="button">Create Account</button>
            <button id="loginBtn" type="button">Login</button>
            <button id="meBtn" type="button">Refresh Session</button>
          </div>
          <label>kAIxU Access Key</label>
          <input id="apiKey" type="password" placeholder="kx_at_..." />
          <label>Token Email</label>
          <input id="tokenEmail" placeholder="user@company.com" />
          <div class="actions">
            <button id="saveKeyBtn" type="button">Save Key</button>
            <button id="clearKeyBtn" type="button">Clear Key</button>
          </div>
        </div>

        <h2 style="margin-top:14px;">Mailbox Profile</h2>
        <label>SkyeMail address local-part</label>
        <input id="addressLocal" placeholder="yourname" />
        <label>Display name</label>
        <input id="displayName" placeholder="Your Name" />
        <div class="actions">
          <button id="saveProfileBtn" type="button">Save Mailbox Profile</button>
        </div>

        <h2 style="margin-top:14px;">.skye Package</h2>
        <label>Passphrase (required for secure .skye)</label>
        <input id="skyePassphrase" type="password" placeholder="Enter passphrase" />
        <label>Passphrase hint (optional)</label>
        <input id="skyeHint" placeholder="Never include the real passphrase" />
        <div class="actions">
          <button id="exportSkyeBtn" type="button">Export .skye</button>
          <button id="importSkyeBtn" type="button">Import .skye</button>
        </div>
        <input id="importSkyeInput" type="file" accept=".skye" style="display:none;" />

        <h2 style="margin-top:14px;">Compose</h2>
        <label>To</label>
        <input id="to" placeholder="recipient@example.com" />
        <label>Subject</label>
        <input id="subject" placeholder="Subject" />
        <label>Body</label>
        <textarea id="body" placeholder="Message"></textarea>
        <label>SkyeChat hook channel (optional)</label>
        <input id="channel" placeholder="general" />
        <div class="actions">
          <button class="primary" id="sendBtn" type="button">Send Mail</button>
          <button id="retryFailedBtn" type="button">Retry Failed</button>
          <button id="reloadBtn" type="button">Reload Inbox</button>
        </div>
        <div class="diag" id="deliveryPanel">Delivery lifecycle: no records yet.</div>
        <div class="status" id="status"></div>
      </section>

      <section class="card">
        <h2>Inbox Workspace</h2>
        <label>Search</label>
        <input id="search" placeholder="subject, recipient, body" />
        <div class="row" style="margin-top:8px;">
          <select id="statusFilter">
            <option value="all">Status: all</option>
            <option value="queued">queued</option>
            <option value="sent">sent</option>
            <option value="failed">failed</option>
          </select>
          <select id="channelFilter">
            <option value="all">Channel hook: all</option>
            <option value="hooked">hooked only</option>
            <option value="none">no hook</option>
          </select>
        </div>
        <div class="row" style="margin-top:8px;">
          <input id="dateFrom" type="date" />
          <input id="dateTo" type="date" />
        </div>
        <div class="actions">
          <button id="searchBtn" type="button">Apply Search</button>
        </div>
        <div class="inbox" id="inbox"></div>
      </section>
    </main>
  </div>

  <script>
    const state = {
      me: null,
      cursor: null,
      wsId: new URLSearchParams(window.location.search).get('ws_id') || 'primary-workspace',
      inboxRecords: [],
      deliveryRecords: JSON.parse(localStorage.getItem('skymail.delivery.records') || '[]'),
    };

    const statusEl = document.getElementById('status');
    const inboxEl = document.getElementById('inbox');
    const deliveryPanel = document.getElementById('deliveryPanel');
    const query = new URLSearchParams(window.location.search);

    if (query.get('embed') === '1') {
      document.querySelector('.top a').setAttribute('href', `/index.html?app=SkyeMail&ws_id=${encodeURIComponent(state.wsId)}`);
    }

    function persistDeliveryRecords() {
      localStorage.setItem('skymail.delivery.records', JSON.stringify(state.deliveryRecords.slice(0, 80)));
    }

    function renderDeliveryPanel() {
      const rows = state.deliveryRecords.slice(0, 8);
      if (!rows.length) {
        deliveryPanel.textContent = 'Delivery lifecycle: no records yet.';
        return;
      }
      const counts = rows.reduce((acc, row) => {
        acc[row.status] = (acc[row.status] || 0) + 1;
        return acc;
      }, {});
      deliveryPanel.textContent = `Delivery lifecycle: queued=${counts.queued || 0}, sent=${counts.sent || 0}, failed=${counts.failed || 0} | recent=${rows.map((r) => r.subject + ':' + r.status).join(' | ')}`;
    }

    function setStatus(text) {
      statusEl.textContent = text || '';
    }

    function buildIdempotencyKey(prefix, parts) {
      const payload = [prefix].concat(parts || []).join('|');
      let hash = 0;
      for (let i = 0; i < payload.length; i += 1) {
        hash = ((hash << 5) - hash + payload.charCodeAt(i)) | 0;
      }
      return `${prefix}:${Math.abs(hash)}`;
    }

    function getAccessAuthHeaders() {
      const token = (localStorage.getItem('kx.api.accessToken') || '').trim();
      const email = (localStorage.getItem('kx.api.tokenEmail') || '').trim().toLowerCase();
      const corr = window.SkyeCorrelation && window.SkyeCorrelation.next ? window.SkyeCorrelation.next('skyemail') : '';
      const headers = {};
      if (token) headers.Authorization = `Bearer ${token}`;
      if (email) headers['X-Token-Email'] = email;
      if (corr) headers['X-Correlation-Id'] = corr;
      return headers;
    }

    function hydrateAuthInputs() {
      document.getElementById('apiKey').value = localStorage.getItem('kx.api.accessToken') || '';
      document.getElementById('tokenEmail').value = localStorage.getItem('kx.api.tokenEmail') || '';
    }

    function saveAuthInputs() {
      const token = document.getElementById('apiKey').value.trim();
      const email = document.getElementById('tokenEmail').value.trim().toLowerCase();
      localStorage.setItem('kx.api.accessToken', token);
      localStorage.setItem('kx.api.tokenEmail', email);
      setStatus('Saved kAIxU key context for SkyeMail.');
    }

    function clearAuthInputs() {
      localStorage.removeItem('kx.api.accessToken');
      localStorage.removeItem('kx.api.tokenEmail');
      hydrateAuthInputs();
      setStatus('Cleared kAIxU key context.');
    }

    async function call(path, options = {}) {
      const authHeaders = getAccessAuthHeaders();
      const mergedHeaders = { ...(options.headers || {}), ...authHeaders };
      const res = await fetch(path, { credentials: 'include', ...options, headers: mergedHeaders });
      let data = {};
      try { data = await res.json(); } catch {}
      if (!res.ok) throw new Error(data?.error || `${path} failed (${res.status})`);
      return data;
    }

    function bytesToBase64(bytes) {
      let bin = '';
      for (let i = 0; i < bytes.length; i += 1) bin += String.fromCharCode(bytes[i]);
      return btoa(bin);
    }

    function base64ToBytes(value) {
      const bin = atob(value);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i += 1) out[i] = bin.charCodeAt(i);
      return out;
    }

    async function deriveKey(passphrase, saltBytes) {
      const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(passphrase), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: saltBytes, iterations: 120000, hash: 'SHA-256' },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function encryptSkye(plainText, passphrase) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const key = await deriveKey(passphrase, salt);
      const cipherBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(plainText));
      return {
        cipher: bytesToBase64(new Uint8Array(cipherBuf)),
        iv: bytesToBase64(iv),
        salt: bytesToBase64(salt),
      };
    }

    async function decryptSkye(block, passphrase) {
      const key = await deriveKey(passphrase, base64ToBytes(block.salt));
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: base64ToBytes(block.iv) }, key, base64ToBytes(block.cipher));
      return new TextDecoder().decode(plain);
    }

    function buildSecureEnvelope(primary, hint) {
      return {
        format: 'skye-secure-v1',
        encrypted: true,
        alg: 'AES-256-GCM',
        kdf: 'PBKDF2-SHA256',
        iterations: 120000,
        exportedAt: new Date().toISOString(),
        hint: hint || '',
        payload: { primary },
      };
    }

    function encodeSecureEnvelope(envelope) {
      const marker = new TextEncoder().encode('SKYESEC1');
      const payload = new TextEncoder().encode(JSON.stringify(envelope));
      return new Blob([marker, new Uint8Array([0]), payload], { type: 'application/octet-stream' });
    }

    async function readSecureEnvelope(file) {
      const bytes = new Uint8Array(await file.arrayBuffer());
      const marker = new TextEncoder().encode('SKYESEC1');
      const hasMarker = bytes.length > marker.length + 1 && marker.every((v, i) => bytes[i] === v) && bytes[marker.length] === 0;
      if (!hasMarker) throw new Error('Invalid .skye file marker.');
      const raw = new TextDecoder().decode(bytes.slice(marker.length + 1));
      const envelope = JSON.parse(raw);
      if (!envelope || envelope.format !== 'skye-secure-v1' || envelope.encrypted !== true) throw new Error('Unsupported .skye envelope.');
      if (envelope.alg !== 'AES-256-GCM' || envelope.kdf !== 'PBKDF2-SHA256' || Number(envelope.iterations) !== 120000) {
        throw new Error('Invalid .skye encryption metadata.');
      }
      if (!envelope.payload || !envelope.payload.primary) throw new Error('Missing encrypted payload.');
      return envelope;
    }

    function collectSkyeState() {
      return {
        meta: {
          app_id: 'SkyeMail',
          app_version: '1.0.0',
          workspace_id: state.wsId,
          title: 'SkyeMail Workspace Snapshot',
          owner: state.me?.email || null,
          schema_version: 1,
        },
        state: {
          profile: {
            mailbox_address: `${document.getElementById('addressLocal').value.trim()}@skymail.local`,
            display_name: document.getElementById('displayName').value.trim(),
          },
          compose: {
            to: document.getElementById('to').value,
            subject: document.getElementById('subject').value,
            text: document.getElementById('body').value,
            channel: document.getElementById('channel').value,
          },
          search: document.getElementById('search').value,
          inbox_records: state.inboxRecords,
        },
        assets: [],
      };
    }

    function applySkyeState(payload) {
      if (!payload?.meta || payload.meta.app_id !== 'SkyeMail') throw new Error('This .skye file is not for SkyeMail.');
      const schemaVersion = Number(payload?.meta?.schema_version || 1);
      if (!Number.isFinite(schemaVersion) || schemaVersion > 1) throw new Error(`Unsupported .skye schema version for SkyeMail: ${schemaVersion}`);
      const s = payload.state || {};
      const profile = s.profile || {};
      const compose = s.compose || {};
      if (typeof profile.mailbox_address === 'string' && profile.mailbox_address.includes('@')) {
        document.getElementById('addressLocal').value = profile.mailbox_address.split('@')[0];
      }
      if (typeof profile.display_name === 'string') document.getElementById('displayName').value = profile.display_name;
      if (typeof compose.to === 'string') document.getElementById('to').value = compose.to;
      if (typeof compose.subject === 'string') document.getElementById('subject').value = compose.subject;
      if (typeof compose.text === 'string') document.getElementById('body').value = compose.text;
      if (typeof compose.channel === 'string') document.getElementById('channel').value = compose.channel;
      if (typeof s.search === 'string') document.getElementById('search').value = s.search;
      if (Array.isArray(s.inbox_records)) state.inboxRecords = s.inbox_records;
    }

    async function exportSkyeFile() {
      const passphrase = document.getElementById('skyePassphrase').value.trim();
      const hint = document.getElementById('skyeHint').value.trim();
      if (passphrase.length < 6) throw new Error('Passphrase must be at least 6 characters.');
      const payload = collectSkyeState();
      const encrypted = await encryptSkye(JSON.stringify(payload), passphrase);
      const envelope = buildSecureEnvelope(encrypted, hint);
      const blob = encodeSecureEnvelope(envelope);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `SkyeMail-${Date.now()}.skye`;
      a.click();
      URL.revokeObjectURL(a.href);
      setStatus('Exported secure .skye package for SkyeMail.');
    }

    async function importSkyeFile(file) {
      const envelope = await readSecureEnvelope(file);
      const passphrase = prompt(`Enter passphrase to open .skye${envelope.hint ? ` (hint: ${envelope.hint})` : ''}`) || '';
      if (!passphrase.trim()) throw new Error('Passphrase is required.');
      const plain = await decryptSkye(envelope.payload.primary, passphrase.trim());
      const payload = JSON.parse(plain);
      const mode = (prompt('Import mode: type merge or replace', 'merge') || 'merge').trim().toLowerCase();
      applySkyeState(payload);
      if (mode === 'merge') {
        const imported = Array.isArray(payload?.state?.inbox_records) ? payload.state.inbox_records : [];
        const merged = [...imported, ...state.inboxRecords];
        const unique = [];
        const seen = new Set();
        merged.forEach((item) => {
          const key = JSON.stringify(item);
          if (seen.has(key)) return;
          seen.add(key);
          unique.push(item);
        });
        state.inboxRecords = unique;
      }
      setStatus('Imported secure .skye package for SkyeMail.');
      await loadInbox(false);
    }

    async function refreshMe() {
      const me = await call('/api/auth-me');
      state.me = me;
      if (me?.email) {
        setStatus(`Signed in as ${me.email}`);
        document.getElementById('email').value = me.email;
      } else {
        setStatus('Not signed in. Create account or login to use SkyeMail workspace.');
      }
    }

    async function saveProfile() {
      const local = document.getElementById('addressLocal').value.trim().toLowerCase();
      const displayName = document.getElementById('displayName').value.trim();
      if (!local) throw new Error('Address local-part is required.');
      const profile = {
        mailbox_address: `${local}@skymail.local`,
        display_name: displayName || local,
        workspace_id: state.wsId,
      };
      await call('/api/app-profile-set', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ app: 'SkyeMail', title: profile.mailbox_address, profile }),
      });
      setStatus(`Mailbox profile saved: ${profile.mailbox_address}`);
    }

    async function loadProfile() {
      const data = await call('/api/app-profile-get?app=SkyeMail');
      const profile = data?.profile?.payload || {};
      if (profile?.mailbox_address) {
        const local = String(profile.mailbox_address).split('@')[0] || '';
        document.getElementById('addressLocal').value = local;
        const search = document.getElementById('search');
        if (search && !search.value.trim()) search.value = profile.mailbox_address;
      }
      if (profile?.display_name) {
        document.getElementById('displayName').value = profile.display_name;
      }
    }

    async function sendMail() {
      const to = document.getElementById('to').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const text = document.getElementById('body').value.trim();
      const channel = document.getElementById('channel').value.trim();
      const local = document.getElementById('addressLocal').value.trim().toLowerCase();
      const fromAlias = local ? `${local}@skymail.local` : '';
      const idempotencyKey = buildIdempotencyKey('skymail-send', [state.wsId, to, subject, text, channel, fromAlias]);
      const eventId = 'mail-' + Date.now();
      state.deliveryRecords.unshift({ id: eventId, subject, to, status: 'queued', at: new Date().toISOString(), channel: channel || '' });
      persistDeliveryRecords();
      renderDeliveryPanel();
      const data = await call('/api/skymail-send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to, subject, text, channel, from_alias: fromAlias, ws_id: state.wsId, idempotency_key: idempotencyKey }),
      });
      const delivered = data?.ok !== false;
      state.deliveryRecords = state.deliveryRecords.map((row) => row.id === eventId ? { ...row, status: delivered ? 'sent' : 'failed' } : row);
      persistDeliveryRecords();
      renderDeliveryPanel();
      setStatus(`Mail sent via ${data?.provider || 'provider'} (record=${data?.mail_record_id || 'n/a'})`);
      await loadInbox();
    }

    async function retryFailed() {
      const failed = state.deliveryRecords.find((row) => row.status === 'failed');
      if (!failed) {
        setStatus('No failed deliveries to retry.');
        return;
      }
      document.getElementById('to').value = failed.to || '';
      document.getElementById('subject').value = failed.subject || '';
      document.getElementById('body').value = document.getElementById('body').value || 'Retry delivery triggered from lifecycle queue.';
      await sendMail();
    }

    async function loadInbox(append = false) {
      const q = document.getElementById('search').value.trim();
      const mailbox = q.includes('@') ? q.toLowerCase() : '';
      const qs = new URLSearchParams();
      qs.set('limit', '50');
      if (q && !mailbox) qs.set('q', q);
      if (mailbox) qs.set('mailbox', mailbox);
      if (append && state.cursor) qs.set('before', state.cursor);
      const data = await call(`/api/skymail-list?${qs.toString()}`);
      const records = Array.isArray(data?.records) ? data.records : [];
      const search = document.getElementById('search').value.trim().toLowerCase();
      const statusFilter = document.getElementById('statusFilter').value;
      const channelFilter = document.getElementById('channelFilter').value;
      const dateFrom = document.getElementById('dateFrom').value;
      const dateTo = document.getElementById('dateTo').value;

      const filtered = records.filter((record) => {
        const payload = record?.payload || {};
        const subject = String(payload?.subject || record?.title || '').toLowerCase();
        const body = String(payload?.text || '').toLowerCase();
        const toAddr = String(payload?.to || '').toLowerCase();
        const created = String(record?.created_at || '');
        const dateIso = created ? created.slice(0, 10) : '';
        const hasHook = !!String(payload?.channel || '').trim();
        const lifecycle = state.deliveryRecords.find((row) => row.subject === (payload?.subject || record?.title || '') && row.to === (payload?.to || ''));
        const lifecycleStatus = lifecycle?.status || 'sent';

        if (search && !`${subject} ${body} ${toAddr}`.includes(search)) return false;
        if (statusFilter !== 'all' && lifecycleStatus !== statusFilter) return false;
        if (channelFilter === 'hooked' && !hasHook) return false;
        if (channelFilter === 'none' && hasHook) return false;
        if (dateFrom && dateIso && dateIso < dateFrom) return false;
        if (dateTo && dateIso && dateIso > dateTo) return false;
        return true;
      });

      state.inboxRecords = filtered;
      state.cursor = data?.page?.next_before || null;

      const items = filtered.map((record) => {
        const payload = record?.payload || {};
        const to = payload?.to || 'unknown';
        const fromAlias = payload?.from_alias || 'noreply@skymail.local';
        const subject = payload?.subject || record?.title || '(no subject)';
        const body = payload?.text || '';
        const lifecycle = state.deliveryRecords.find((row) => row.subject === subject && row.to === to);
        const lifecycleStatus = lifecycle?.status || 'sent';
        return `<div class="item"><strong>${subject}</strong><div class="meta">from ${fromAlias} to ${to}</div><div class="meta">status=${lifecycleStatus}</div><div class="meta">${body}</div></div>`;
      }).join('');

      if (!append) inboxEl.innerHTML = items || '<div class="meta">No mail records found.</div>';
      else inboxEl.insertAdjacentHTML('beforeend', items);
    }

    async function signup() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const orgName = document.getElementById('orgName').value.trim() || 'SkyeMail Org';
      const signup = await call('/api/auth-signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, orgName }),
      });
      if (signup?.kaixu_token?.token) {
        localStorage.setItem('kx.api.accessToken', signup.kaixu_token.token);
        localStorage.setItem('kx.api.tokenEmail', signup.kaixu_token.locked_email || email.toLowerCase());
      }
      await refreshMe();
      await loadProfile();
      await loadInbox();
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      await call('/api/auth-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      await refreshMe();
      await loadProfile();
      await loadInbox();
    }

    async function logout() {
      await call('/api/auth-logout', { method: 'POST' });
      setStatus('Logged out.');
      inboxEl.innerHTML = '';
    }

    hydrateAuthInputs();

    document.getElementById('signupBtn').onclick = () => signup().catch((e) => setStatus(e.message));
    document.getElementById('loginBtn').onclick = () => login().catch((e) => setStatus(e.message));
    document.getElementById('meBtn').onclick = () => refreshMe().then(loadProfile).catch((e) => setStatus(e.message));
    document.getElementById('saveKeyBtn').onclick = () => saveAuthInputs();
    document.getElementById('clearKeyBtn').onclick = () => clearAuthInputs();
    document.getElementById('sendBtn').onclick = () => sendMail().catch((e) => setStatus(e.message));
    document.getElementById('retryFailedBtn').onclick = () => retryFailed().catch((e) => setStatus(e.message));
    document.getElementById('reloadBtn').onclick = () => loadInbox(false).catch((e) => setStatus(e.message));
    document.getElementById('searchBtn').onclick = () => loadInbox(false).catch((e) => setStatus(e.message));
    document.getElementById('saveProfileBtn').onclick = () => saveProfile().catch((e) => setStatus(e.message));
    document.getElementById('logoutBtn').onclick = () => logout().catch((e) => setStatus(e.message));
    document.getElementById('exportSkyeBtn').onclick = () => exportSkyeFile().catch((e) => setStatus(e.message));
    document.getElementById('importSkyeBtn').onclick = () => document.getElementById('importSkyeInput').click();
    document.getElementById('importSkyeInput').addEventListener('change', (event) => {
      const file = event.target.files?.[0];
      event.target.value = '';
      if (!file) return;
      importSkyeFile(file).catch((e) => setStatus(e.message));
    });

    renderDeliveryPanel();
    refreshMe().then(loadProfile).then(() => loadInbox(false)).catch((e) => setStatus(e.message));
  </script>
<button id="skye-tutorial-fab" type="button" style="position:fixed;right:16px;bottom:16px;z-index:10000;padding:10px 14px;border-radius:999px;border:1px solid rgba(191,238,255,.42);background:rgba(44,230,255,.2);color:#eff9ff;font-weight:700;cursor:pointer;">Start Tutorial</button>

<script>
(function(){
  const fab=document.getElementById('skye-tutorial-fab');
  const modal=document.getElementById('skye-tutorial-modal');
  if(!fab||!modal) return;
  const app=(document.title||'App').replace(/Standalone|Workspace|Command Surface|Platform/gi,'').trim();
  modal.innerHTML='<div style="max-width:520px;margin:10vh auto;background:#07131a;color:#eff9ff;border:1px solid rgba(191,238,255,.32);border-radius:14px;padding:18px"><h3 style="margin:0 0 8px">'+app+' Quick Start</h3><ol style="margin:0 0 12px 18px;line-height:1.5"><li>Review auth and active workspace context.</li><li>Run one core workflow action in this app.</li><li>Save/export/share output and verify completion state.</li></ol><div style="display:flex;justify-content:flex-end"><button id="skye-tutorial-close" type="button" style="padding:8px 12px;border-radius:10px;border:1px solid rgba(191,238,255,.32);background:rgba(0,0,0,.34);color:#eff9ff;cursor:pointer;">Close</button></div></div>';
  fab.addEventListener('click',()=>{modal.style.display='block';});
  modal.addEventListener('click',(e)=>{if(e.target===modal||e.target.id==='skye-tutorial-close') modal.style.display='none';});
})();
</script>
