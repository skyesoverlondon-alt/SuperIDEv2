<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyeDrive Standalone</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
    :root { --bg:#060d13; --bg2:#0d1d27; --line:rgba(44,230,255,.34); --line2:rgba(191,238,255,.2); --text:#f6fbff; --muted:#9ab6c4; --gold:#ffcb47; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Space Grotesk",sans-serif; color:var(--text); background:radial-gradient(circle at 80% 0, rgba(255,203,71,.14), transparent 40%), linear-gradient(155deg,var(--bg),var(--bg2)); }
    .shell { max-width:1100px; margin:0 auto; padding:16px; display:grid; gap:12px; }
    .topbar, .panel { border:1px solid var(--line); border-radius:14px; background:rgba(7,15,21,.9); }
    .topbar { padding:12px 14px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; align-items:center; }
    .brand { font-family:"Orbitron",sans-serif; text-transform:uppercase; letter-spacing:.09em; }
    .meta { color:var(--muted); font-size:.82rem; }
    .chip { border:1px solid rgba(255,203,71,.42); border-radius:999px; padding:5px 10px; color:#ffe6a5; background:rgba(255,203,71,.08); font-size:.74rem; }
    .panel { padding:12px; display:grid; gap:10px; }
    .form { display:grid; gap:8px; grid-template-columns: 1.4fr .9fr .9fr auto; }
    .list { display:grid; gap:8px; }
    .item { border:1px solid var(--line2); border-radius:12px; padding:10px; background:rgba(255,255,255,.03); display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    button, input, select { border-radius:10px; border:1px solid var(--line2); background:rgba(0,0,0,.34); color:var(--text); padding:9px 10px; font:inherit; }
    button { cursor:pointer; border-color:var(--line); background:rgba(44,230,255,.12); }
    button.primary { background:linear-gradient(135deg, rgba(255,203,71,.9), rgba(44,230,255,.78)); color:#03131a; font-weight:700; border-color:rgba(255,203,71,.5); }
    .status { color:var(--muted); font-size:.82rem; }
    .diag { border:1px solid var(--line2); border-radius:10px; padding:8px; color:var(--muted); font-size:.8rem; }
    @media (max-width:860px){ .form{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="brand">SkyeDrive Command Surface</div>
        <div class="meta">Asset register and version tracking</div>
      </div>
      <div class="chip" id="meta">ws_id=default</div>
    </header>
    <section class="panel">
      <div class="form">
        <input id="name" placeholder="Asset name" />
        <select id="kind">
          <option value="doc">doc</option>
          <option value="sheet">sheet</option>
          <option value="slide">slide</option>
          <option value="zip">zip</option>
          <option value="other">other</option>
        </select>
        <input id="owner" placeholder="Owner" value="owner@skye.local" />
        <button class="primary" id="add">Add</button>
      </div>
      <div class="form" style="grid-template-columns:1fr auto;">
        <input id="uploadFile" type="file" />
        <button id="uploadBtn">Upload File</button>
      </div>
      <div class="diag" id="compareInfo">Version compare panel: select an item to inspect versions.</div>
      <div class="list" id="list"></div>
      <div class="status" id="status"></div>
    </section>
  </div>

<script>
const qs = new URLSearchParams(location.search);
const ws = qs.get("ws_id") || "default";
document.getElementById("meta").textContent = `ws_id=${ws}`;
const key = `skye.drive.${ws}`;
let items = JSON.parse(localStorage.getItem(key) || "[]");
const list = document.getElementById("list");
const status = document.getElementById("status");
const compareInfo = document.getElementById("compareInfo");

function save() {
  localStorage.setItem(key, JSON.stringify(items));
  status.textContent = `Saved ${new Date().toLocaleString()}`;
}

function render() {
  list.innerHTML = "";
  items.forEach((x, i) => {
    const d = document.createElement("div");
    d.className = "item";
    d.innerHTML = `
      <div>
        <strong>${x.name}</strong><br>
        <span class="status">kind=${x.kind} · owner=${x.owner} · version=${x.version} · size=${x.size || 0}b</span>
      </div>
      <div>
        <button data-i="${i}">Bump Version</button>
        <button data-compare="${i}">Compare</button>
        <button data-restore="${i}">Restore Prev</button>
      </div>
    `;
    d.querySelector("button[data-i]").onclick = () => {
      items[i].version += 1;
      items[i].versions = items[i].versions || [];
      items[i].versions.unshift({ version: items[i].version, at: new Date().toISOString(), size: items[i].size || 0, checksum: items[i].checksum || '' });
      save();
      render();
    };
    d.querySelector("button[data-compare]").onclick = () => compareVersions(i);
    d.querySelector("button[data-restore]").onclick = () => restorePrevious(i);
    list.appendChild(d);
  });
}

function checksumText(text) {
  let hash = 0;
  for (let i = 0; i < text.length; i += 1) hash = ((hash << 5) - hash) + text.charCodeAt(i);
  return 'h' + Math.abs(hash);
}

function compareVersions(index) {
  const item = items[index];
  const versions = item.versions || [];
  if (versions.length < 2) {
    compareInfo.textContent = `${item.name}: not enough versions to compare.`;
    return;
  }
  const latest = versions[0];
  const prev = versions[1];
  compareInfo.textContent = `${item.name} compare: v${prev.version} -> v${latest.version} | size ${prev.size}b -> ${latest.size}b | checksum ${prev.checksum} -> ${latest.checksum}`;
}

function restorePrevious(index) {
  const item = items[index];
  const versions = item.versions || [];
  if (versions.length < 2) {
    status.textContent = 'No previous version available to restore.';
    return;
  }
  const prev = versions[1];
  item.version = prev.version;
  item.size = prev.size;
  item.checksum = prev.checksum;
  item.at = new Date().toISOString();
  versions.unshift({ version: item.version, at: item.at, size: item.size, checksum: item.checksum });
  save();
  render();
  status.textContent = `${item.name} restored to v${prev.version}.`;
}

document.getElementById("add").onclick = () => {
  const n = document.getElementById("name");
  const kind = document.getElementById("kind").value;
  const owner = document.getElementById("owner").value.trim() || "owner@skye.local";
  if (!n.value.trim()) return;
  items.unshift({ name: n.value.trim(), kind, owner, version: 1, at: new Date().toISOString() });
  n.value = "";
  render();
  save();
};

document.getElementById('uploadBtn').onclick = async () => {
  const input = document.getElementById('uploadFile');
  const file = input.files && input.files[0];
  if (!file) {
    status.textContent = 'Choose a file first.';
    return;
  }
  const text = await file.text().catch(() => '');
  const record = {
    name: file.name,
    kind: file.type || 'file',
    owner: document.getElementById('owner').value.trim() || 'owner@skye.local',
    version: 1,
    at: new Date().toISOString(),
    size: file.size,
    checksum: checksumText(text),
    versions: [{ version: 1, at: new Date().toISOString(), size: file.size, checksum: checksumText(text) }],
  };
  items.unshift(record);
  save();
  render();
  status.textContent = `Uploaded ${file.name} (${file.size} bytes).`;
  input.value = '';
};

render();
</script>
<button id="skye-tutorial-fab" type="button" style="position:fixed;right:16px;bottom:16px;z-index:10000;padding:10px 14px;border-radius:999px;border:1px solid rgba(191,238,255,.42);background:rgba(44,230,255,.2);color:#eff9ff;font-weight:700;cursor:pointer;">Start Tutorial</button>
<div id="skye-tutorial-modal" style="display:none;position:fixed;inset:0;z-index:10001;background:rgba(2,6,23,.72);"></div>
<script>
(function(){
  const fab=document.getElementById('skye-tutorial-fab');
  const modal=document.getElementById('skye-tutorial-modal');
  if(!fab||!modal) return;
  const app=(document.title||'App').replace(/Standalone|Workspace|Command Surface|Platform/gi,'').trim();
  modal.innerHTML='<div style="max-width:520px;margin:10vh auto;background:#07131a;color:#eff9ff;border:1px solid rgba(191,238,255,.32);border-radius:14px;padding:18px"><h3 style="margin:0 0 8px">'+app+' Quick Start</h3><ol style="margin:0 0 12px 18px;line-height:1.5"><li>Review auth and active workspace context.</li><li>Run one core workflow action in this app.</li><li>Save/export/share output and verify completion state.</li></ol><div style="display:flex;justify-content:flex-end"><button id="skye-tutorial-close" type="button" style="padding:8px 12px;border-radius:10px;border:1px solid rgba(191,238,255,.32);background:rgba(0,0,0,.34);color:#eff9ff;cursor:pointer;">Close</button></div></div>';
  fab.addEventListener('click',()=>{modal.style.display='block';});
  modal.addEventListener('click',(e)=>{if(e.target===modal||e.target.id==='skye-tutorial-close') modal.style.display='none';});
})();
</script>
</body>
</html>
