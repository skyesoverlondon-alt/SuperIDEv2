<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyeDrive Standalone</title>
  <script src="/_shared/auth-unlock.js"></script>
  <script src="/_shared/standalone-session.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
    :root { --bg:#060d13; --bg2:#0d1d27; --line:rgba(44,230,255,.34); --line2:rgba(191,238,255,.2); --text:#f6fbff; --muted:#9ab6c4; --gold:#ffcb47; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Space Grotesk",sans-serif; color:var(--text); background:radial-gradient(circle at 80% 0, rgba(255,203,71,.14), transparent 40%), linear-gradient(155deg,var(--bg),var(--bg2)); }
    .shell { max-width:1100px; margin:0 auto; padding:16px; display:grid; gap:12px; }
    .topbar, .panel { border:1px solid var(--line); border-radius:14px; background:rgba(7,15,21,.9); }
    .topbar { padding:12px 14px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; align-items:center; }
    .brand { font-family:"Orbitron",sans-serif; text-transform:uppercase; letter-spacing:.09em; }
    .meta { color:var(--muted); font-size:.82rem; }
    .chip { border:1px solid rgba(255,203,71,.42); border-radius:999px; padding:5px 10px; color:#ffe6a5; background:rgba(255,203,71,.08); font-size:.74rem; }
    .panel { padding:12px; display:grid; gap:10px; }
    .form { display:grid; gap:8px; grid-template-columns: 1.4fr .9fr .9fr auto; }
    .list { display:grid; gap:8px; }
    .item { border:1px solid var(--line2); border-radius:12px; padding:10px; background:rgba(255,255,255,.03); display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    button, input, select { border-radius:10px; border:1px solid var(--line2); background:rgba(0,0,0,.34); color:var(--text); padding:9px 10px; font:inherit; }
    button { cursor:pointer; border-color:var(--line); background:rgba(44,230,255,.12); }
    button.primary { background:linear-gradient(135deg, rgba(255,203,71,.9), rgba(44,230,255,.78)); color:#03131a; font-weight:700; border-color:rgba(255,203,71,.5); }
    .status { color:var(--muted); font-size:.82rem; }
    .diag { border:1px solid var(--line2); border-radius:10px; padding:8px; color:var(--muted); font-size:.8rem; }
    .warn { color:#ffd08a; }
    @media (max-width:860px){ .form{grid-template-columns:1fr;} }
  </style>
</head>
<body data-app-id="SkyeDrive">
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="brand">SkyeDrive Command Surface</div>
        <div class="meta">Asset register and version tracking</div>
      </div>
      <div class="chip" id="meta">ws_id=default</div>
    </header>
    <section class="panel">
      <div class="form">
        <input id="name" placeholder="Asset name" />
        <select id="kind">
          <option value="doc">doc</option>
          <option value="sheet">sheet</option>
          <option value="slide">slide</option>
          <option value="zip">zip</option>
          <option value="other">other</option>
        </select>
        <input id="owner" placeholder="Owner" value="owner@skye.local" />
        <button class="primary" id="add">Add</button>
      </div>
      <div class="form" style="grid-template-columns:1fr auto;">
        <input id="uploadFile" type="file" />
        <button id="uploadBtn">Upload File</button>
      </div>
      <div class="form" style="grid-template-columns:1fr 160px auto auto;">
        <input id="shareTarget" placeholder="share target (email/team)" />
        <select id="shareRole">
          <option value="viewer">viewer</option>
          <option value="editor">editor</option>
          <option value="owner">owner</option>
        </select>
        <input id="shareExpiry" type="date" />
        <button id="applyShare">Apply Share Policy</button>
      </div>
      <div class="diag" id="compareInfo">Version compare panel: select an item to inspect versions.</div>
      <div class="diag" id="integrityInfo">Integrity check pending.</div>
      <div class="diag" id="storageInfo">Storage pressure predictor pending.</div>
      <div class="form" style="grid-template-columns:auto auto;">
        <button id="runCleanup">Cleanup Assistant (remove largest 2)</button>
        <button id="verifyNow">Verify Integrity Now</button>
      </div>
      <div class="list" id="list"></div>
      <div class="status" id="status"></div>
    </section>
  </div>

<script>
const qs = new URLSearchParams(location.search);
const ws = qs.get("ws_id") || "default";
document.getElementById("meta").textContent = `ws_id=${ws}`;
const key = `skye.drive.${ws}`;
let items = JSON.parse(localStorage.getItem(key) || "[]");
const list = document.getElementById("list");
const status = document.getElementById("status");
const compareInfo = document.getElementById("compareInfo");
const integrityInfo = document.getElementById("integrityInfo");
const storageInfo = document.getElementById("storageInfo");

function save() {
  localStorage.setItem(key, JSON.stringify(items));
  status.textContent = `Saved ${new Date().toLocaleString()}`;
}

function upsertBridgeRecord(payload) {
  if (!payload || !payload.title) return false;
  const stamp = new Date().toISOString();
  const text = String(payload.text || payload.excerpt || payload.title || '');
  const size = Number(payload.size || text.length || 0);
  const recordId = String(payload.record_id || '').trim();
  const next = {
    name: String(payload.title || 'Imported Draft').trim(),
    kind: payload.kind || 'doc',
    owner: payload.owner || 'owner@skye.local',
    version: 1,
    at: stamp,
    size,
    checksum: checksumText(text),
    versions: [{ version: 1, at: stamp, size, checksum: checksumText(text) }],
    immutable: false,
    share: null,
    integrity_state: 'ok',
    integrity_hash: checksumText(JSON.stringify(payload)),
    record_id: recordId,
    excerpt: String(payload.excerpt || '').trim(),
    source: payload.source || 'suite',
  };
  items = items.filter((entry) => String(entry.record_id || '') !== recordId || !recordId);
  items.unshift(next);
  save();
  render();
  status.textContent = `Imported ${next.name} from ${next.source || 'suite'}.`;
  return true;
}

function consumeBridgeDraft() {
  if (qs.get('bridge_import') !== '1') return;
  let payload = null;
  try {
    payload = JSON.parse(localStorage.getItem('skye.drive.bridgeDraft') || 'null');
  } catch {
    payload = null;
  }
  if (!upsertBridgeRecord(payload)) return;
  try {
    localStorage.removeItem('skye.drive.bridgeDraft');
  } catch {}
}

function render() {
  list.innerHTML = "";
  verifyIntegrityOnOpen();
  updateStoragePressure();
  items.forEach((x, i) => {
    const d = document.createElement("div");
    d.className = "item";
    d.innerHTML = `
      <div>
        <strong>${x.name}</strong><br>
        <span class="status">kind=${x.kind} · owner=${x.owner} · version=${x.version} · size=${x.size || 0}b · immutable=${x.immutable ? 'yes' : 'no'} · integrity=${x.integrity_state || 'unknown'}</span>
        <div class="status">share=${x.share?.target || 'none'} (${x.share?.role || '-'}) exp=${x.share?.expires_at || '-'}</div>
      </div>
      <div>
        <button data-i="${i}">Bump Version</button>
        <button data-compare="${i}">Compare</button>
        <button data-restore="${i}">Restore Prev</button>
        <button data-immutable="${i}">${x.immutable ? 'Unlock' : 'Lock'} Immutable</button>
      </div>
    `;
    d.querySelector("button[data-i]").onclick = () => {
      if (items[i].immutable) {
        status.textContent = `${items[i].name} is immutable. Unlock before mutating.`;
        return;
      }
      items[i].version += 1;
      items[i].versions = items[i].versions || [];
      items[i].integrity_hash = computeIntegrityHash(items[i]);
      items[i].versions.unshift({ version: items[i].version, at: new Date().toISOString(), size: items[i].size || 0, checksum: items[i].checksum || '' });
      save();
      render();
    };
    d.querySelector("button[data-compare]").onclick = () => compareVersions(i);
    d.querySelector("button[data-restore]").onclick = () => restorePrevious(i);
    d.querySelector("button[data-immutable]").onclick = () => {
      items[i].immutable = !items[i].immutable;
      items[i].integrity_hash = computeIntegrityHash(items[i]);
      save();
      render();
    };
    list.appendChild(d);
  });
}

function checksumText(text) {
  let hash = 0;
  for (let i = 0; i < text.length; i += 1) hash = ((hash << 5) - hash) + text.charCodeAt(i);
  return 'h' + Math.abs(hash);
}

function compareVersions(index) {
  const item = items[index];
  const versions = item.versions || [];
  if (versions.length < 2) {
    compareInfo.textContent = `${item.name}: not enough versions to compare.`;
    return;
  }
  const latest = versions[0];
  const prev = versions[1];
  compareInfo.textContent = `${item.name} compare: v${prev.version} -> v${latest.version} | size ${prev.size}b -> ${latest.size}b | checksum ${prev.checksum} -> ${latest.checksum}`;
}

function restorePrevious(index) {
  const item = items[index];
  if (item.immutable) {
    status.textContent = `${item.name} is immutable. Unlock before restore.`;
    return;
  }
  const versions = item.versions || [];
  if (versions.length < 2) {
    status.textContent = 'No previous version available to restore.';
    return;
  }
  const prev = versions[1];
  item.version = prev.version;
  item.size = prev.size;
  item.checksum = prev.checksum;
  item.at = new Date().toISOString();
  item.integrity_hash = computeIntegrityHash(item);
  versions.unshift({ version: item.version, at: item.at, size: item.size, checksum: item.checksum });
  save();
  render();
  status.textContent = `${item.name} restored to v${prev.version}.`;
}

function computeIntegrityHash(item) {
  const payload = [
    item.name || '',
    item.kind || '',
    item.owner || '',
    String(item.version || 0),
    String(item.size || 0),
    item.checksum || '',
    item.immutable ? '1' : '0',
    item.share?.target || '',
    item.share?.role || '',
    item.share?.expires_at || '',
  ].join('|');
  return checksumText(payload);
}

function verifyIntegrityOnOpen() {
  let failed = 0;
  items = items.map((item) => {
    if (!item.integrity_hash) {
      const seeded = { ...item, integrity_hash: computeIntegrityHash(item), integrity_state: 'seeded' };
      return seeded;
    }
    const ok = computeIntegrityHash(item) === item.integrity_hash;
    if (!ok) failed += 1;
    return { ...item, integrity_state: ok ? 'ok' : 'failed' };
  });
  integrityInfo.innerHTML = failed
    ? `<span class="warn">Integrity verify-on-open: ${failed} artifact(s) failed verification.</span>`
    : 'Integrity verify-on-open: all artifacts verified.';
}

function updateStoragePressure() {
  const maxBytes = 5 * 1024 * 1024;
  const total = items.reduce((sum, item) => sum + Number(item.size || 0), 0);
  const pct = Math.min(100, Math.round((total / maxBytes) * 100));
  const heaviest = [...items]
    .sort((a, b) => Number(b.size || 0) - Number(a.size || 0))
    .slice(0, 3)
    .map((x) => `${x.name}(${x.size || 0}b)`)
    .join(', ') || 'none';
  storageInfo.textContent = `Storage pressure: ${total} / ${maxBytes} bytes (${pct}%). Cleanup candidates: ${heaviest}`;
}

document.getElementById("add").onclick = () => {
  const n = document.getElementById("name");
  const kind = document.getElementById("kind").value;
  const owner = document.getElementById("owner").value.trim() || "owner@skye.local";
  if (!n.value.trim()) return;
  const rec = { name: n.value.trim(), kind, owner, version: 1, at: new Date().toISOString(), size: 0, checksum: checksumText(n.value.trim()), immutable: false, share: null, integrity_state: 'ok' };
  rec.integrity_hash = computeIntegrityHash(rec);
  items.unshift(rec);
  n.value = "";
  render();
  save();
};

document.getElementById('uploadBtn').onclick = async () => {
  const input = document.getElementById('uploadFile');
  const file = input.files && input.files[0];
  if (!file) {
    status.textContent = 'Choose a file first.';
    return;
  }
  const text = await file.text().catch(() => '');
  const record = {
    name: file.name,
    kind: file.type || 'file',
    owner: document.getElementById('owner').value.trim() || 'owner@skye.local',
    version: 1,
    at: new Date().toISOString(),
    size: file.size,
    checksum: checksumText(text),
    versions: [{ version: 1, at: new Date().toISOString(), size: file.size, checksum: checksumText(text) }],
    immutable: false,
    share: null,
    integrity_state: 'ok',
  };
  record.integrity_hash = computeIntegrityHash(record);
  items.unshift(record);
  save();
  render();
  status.textContent = `Uploaded ${file.name} (${file.size} bytes).`;
  input.value = '';
};

document.getElementById('applyShare').onclick = () => {
  const target = document.getElementById('shareTarget').value.trim();
  const role = document.getElementById('shareRole').value;
  const expiresAt = document.getElementById('shareExpiry').value;
  if (!items.length) {
    status.textContent = 'No artifacts available for share policy updates.';
    return;
  }
  if (!target || !expiresAt) {
    status.textContent = 'Share target and expiry are required.';
    return;
  }
  items[0].share = {
    target,
    role,
    expires_at: expiresAt,
    token: checksumText(`${items[0].name}|${target}|${role}|${expiresAt}|${Date.now()}`),
    updated_at: new Date().toISOString(),
  };
  items[0].integrity_hash = computeIntegrityHash(items[0]);
  save();
  render();
  status.textContent = `Share governance updated for ${items[0].name}.`;
};

document.getElementById('runCleanup').onclick = () => {
  if (!items.length) {
    status.textContent = 'Nothing to clean.';
    return;
  }
  const keep = [...items].sort((a, b) => Number(b.size || 0) - Number(a.size || 0));
  const removals = keep.slice(0, 2).map((x) => x.name);
  const removeSet = new Set(removals);
  items = items.filter((x) => !removeSet.has(x.name));
  save();
  render();
  status.textContent = `Cleanup assistant removed: ${removals.join(', ') || 'none'}`;
};

document.getElementById('verifyNow').onclick = () => {
  verifyIntegrityOnOpen();
  save();
  render();
  status.textContent = 'Integrity verification completed.';
};

render();
consumeBridgeDraft();
</script>
<button id="skye-tutorial-fab" type="button" style="position:fixed;right:16px;bottom:16px;z-index:10000;padding:10px 14px;border-radius:999px;border:1px solid rgba(191,238,255,.42);background:rgba(44,230,255,.2);color:#eff9ff;font-weight:700;cursor:pointer;">Start Tutorial</button>
<div id="skye-tutorial-modal" style="display:none;position:fixed;inset:0;z-index:10001;background:rgba(2,6,23,.72);"></div>
<script>
(function(){
  const fab=document.getElementById('skye-tutorial-fab');
  const modal=document.getElementById('skye-tutorial-modal');
  if(!fab||!modal) return;
  const app=(document.title||'App').replace(/Standalone|Workspace|Command Surface|Platform/gi,'').trim();
  modal.innerHTML='<div style="max-width:520px;margin:10vh auto;background:#07131a;color:#eff9ff;border:1px solid rgba(191,238,255,.32);border-radius:14px;padding:18px"><h3 style="margin:0 0 8px">'+app+' Quick Start</h3><ol style="margin:0 0 12px 18px;line-height:1.5"><li>Review auth and active workspace context.</li><li>Run one core workflow action in this app.</li><li>Save/export/share output and verify completion state.</li></ol><div style="display:flex;justify-content:flex-end"><button id="skye-tutorial-close" type="button" style="padding:8px 12px;border-radius:10px;border:1px solid rgba(191,238,255,.32);background:rgba(0,0,0,.34);color:#eff9ff;cursor:pointer;">Close</button></div></div>';
  fab.addEventListener('click',()=>{modal.style.display='block';});
  modal.addEventListener('click',(e)=>{if(e.target===modal||e.target.id==='skye-tutorial-close') modal.style.display='none';});
})();
</script>
</body>
</html>
