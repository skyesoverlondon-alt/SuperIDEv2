<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyeSlides Standalone</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap");
    :root { --bg:#060d13; --bg2:#0d1d27; --line:rgba(44,230,255,.34); --line2:rgba(191,238,255,.2); --text:#f6fbff; --muted:#9ab6c4; --gold:#ffcb47; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Space Grotesk",sans-serif; color:var(--text); background:radial-gradient(circle at 12% 0, rgba(44,230,255,.16), transparent 40%), linear-gradient(155deg,var(--bg),var(--bg2)); }
    .shell { max-width:1100px; margin:0 auto; padding:16px; display:grid; gap:12px; }
    .topbar, .panel { border:1px solid var(--line); border-radius:14px; background:rgba(7,15,21,.9); }
    .topbar { padding:12px 14px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; align-items:center; }
    .brand { font-family:"Orbitron",sans-serif; text-transform:uppercase; letter-spacing:.09em; }
    .meta { color:var(--muted); font-size:.82rem; }
    .chip { border:1px solid rgba(255,203,71,.42); border-radius:999px; padding:5px 10px; color:#ffe6a5; background:rgba(255,203,71,.08); font-size:.74rem; }
    .panel { padding:12px; display:grid; gap:10px; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; }
    button,input,textarea,select { border-radius:10px; border:1px solid var(--line2); background:rgba(0,0,0,.34); color:var(--text); padding:9px 10px; font:inherit; }
    button { cursor:pointer; border-color:var(--line); background:rgba(44,230,255,.12); }
    button.primary { background:linear-gradient(135deg, rgba(255,203,71,.9), rgba(44,230,255,.78)); color:#03131a; font-weight:700; border-color:rgba(255,203,71,.5); }
    .slides { display:grid; gap:10px; }
    .card { border:1px solid var(--line2); border-radius:12px; padding:10px; background:rgba(255,255,255,.03); display:grid; gap:8px; }
    .row { display:grid; gap:8px; grid-template-columns: 1fr 140px; }
    .status { color:var(--muted); font-size:.82rem; }
    @media (max-width:760px){ .row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="brand">SkyeSlides Command Surface</div>
        <div class="meta">Deck operations with local persistence</div>
      </div>
      <div class="chip" id="meta">ws_id=default</div>
    </header>
    <section class="panel">
      <div class="toolbar">
        <button id="add">Add Slide</button>
        <button class="primary" id="save">Save</button>
      </div>
      <div class="slides" id="slides"></div>
      <div class="status" id="status"></div>
    </section>
  </div>

<script>
const qs = new URLSearchParams(location.search);
const ws = qs.get("ws_id") || "default";
document.getElementById("meta").textContent = `ws_id=${ws}`;
const key = `skye.slides.${ws}`;
let slides = JSON.parse(localStorage.getItem(key) || "null") || [{ title: "Intro", summary: "Overview", status: "draft" }];
const wrap = document.getElementById("slides");
const status = document.getElementById("status");

function render() {
  wrap.innerHTML = "";
  slides.forEach((s, i) => {
    const c = document.createElement("div");
    c.className = "card";
    c.innerHTML = `
      <div class="row">
        <input value="${(s.title || "").replace(/"/g, "&quot;")}" placeholder="Slide title" />
        <select>
          <option value="draft" ${s.status === "draft" ? "selected" : ""}>draft</option>
          <option value="review" ${s.status === "review" ? "selected" : ""}>review</option>
          <option value="approved" ${s.status === "approved" ? "selected" : ""}>approved</option>
        </select>
      </div>
      <textarea rows="4" placeholder="Summary">${s.summary || ""}</textarea>
    `;
    const [titleInput, statusSelect, summaryInput] = c.querySelectorAll("input,select,textarea");
    titleInput.oninput = e => slides[i].title = e.target.value;
    statusSelect.onchange = e => slides[i].status = e.target.value;
    summaryInput.oninput = e => slides[i].summary = e.target.value;
    wrap.appendChild(c);
  });
}

function save() {
  localStorage.setItem(key, JSON.stringify(slides));
  status.textContent = `Saved ${new Date().toLocaleString()}`;
}

document.getElementById("add").onclick = () => { slides.push({ title: "New Slide", summary: "", status: "draft" }); render(); };
document.getElementById("save").onclick = save;
setInterval(save, 12000);
render();
</script>
</body>
</html>
